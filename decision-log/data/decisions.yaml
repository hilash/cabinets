  - id: DEC-003
    date: '2026-05-14'
    title: Priya Nair decided to ship the AI workflow beta to all 50 design-partner accounts by May 30, without a GA date
    owner: Priya Nair
    ownerTitle: VP Product
    department: Product
    rationale: AI beta NPS at 38 (target 42) — shipping to all 50 partners first extends the feedback window before GA. GA before NPS target risks negative public signal.
    consequences: GA timeline pushed to June at earliest. 3 remaining accounts onboard by May 30. Engineering focus stays on NPS-blocking onboarding issues (PROD-1142).
    reversible: true
    reversibilityNote: GA date can be pulled forward if NPS improves before May 30 — no external commitments made.
    status: decided
    reviewed: true
