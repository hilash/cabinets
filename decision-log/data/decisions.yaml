    linkedContext: ''

  - id: DEC-004
    date: '2026-05-12'
    title: Marcus Webb decided to consolidate all project management tooling onto Jira, deprecating Linear
    owner: Marcus Webb
    ownerTitle: COO
    department: Operations
    rationale: Dual-tool overhead (Jira + Linear) costs ~$2,400/mo and forces cross-team reporting into manual sync. Engineering already on Jira; Product team agreed to migrate Linear boards.
    consequences: Linear subscription cancelled by May 31. Product team to migrate all active sprints to Jira by May 28. IT to archive Linear data before termination.
    reversible: false
    reversibilityNote: Once Linear subscription is cancelled and data archived, migration is not cost-free to reverse.
    status: decided
    reviewed: true
    source: Ops Weekly · May 12, 2026 · data/raw/ops-weekly-2026-05-12.md
    linkedContext: ''

