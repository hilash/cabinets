id: weekly-legal-workload-report
name: Weekly Legal Workload Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: request-router
agentSlug: request-router
timeout: 600
prompt: |-
  Produce the weekly legal workload report from `requests/queue.csv` and the
  individual request packets in `requests/`. Write the report to
  `requests/weekly-report.md` (overwrite previous week's file).

  The report must contain:

  1. SNAPSHOT (as of Monday 08:00)
     Total open requests, broken down by: type (NDA, MSA Review, Advice, etc.),
     priority (Urgent, High, Standard, Routine), and assigned counsel.

  2. SLA PERFORMANCE (last 7 days)
     Requests closed last week: how many met SLA vs. missed? Average resolution time
     by type. Any systemic SLA pattern worth flagging (e.g., MSA reviews consistently
     over 48hr SLA).

  3. OVERDUE & AT RISK
     Full list of overdue requests and requests within 24hr of SLA breach.
     Recommended action for each.

  4. INTAKE QUALITY
     How many requests were returned to Needs Info last week? Common missing fields?
     This indicates teams that need intake guidance.

  5. WORKLOAD BY COUNSEL
     Open request count and estimated time exposure per assigned attorney.
     Flag any attorney with >10 open requests as capacity risk.

  6. RECOMMENDED PRIORITIES FOR THE WEEK
     Top 5 most urgent matters legal should focus on this week, with brief rationale.

  Keep the report concise — no more than 2 pages. Lead with the most important
  action item in one sentence.
cabinetPath: cabinet-examples/cabinets/legal-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
