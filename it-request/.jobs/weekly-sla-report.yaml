id: weekly-sla-report
name: Weekly SLA Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: it-workflow
agentSlug: it-workflow
timeout: 600
prompt: |-
  Produce the weekly IT SLA compliance report for the past 7 days.

  Read all ticket files in `/requests/` (both open and tickets closed this week).
  Compute for each priority tier (P1–P4):
    - Total tickets opened this week
    - Total tickets closed this week
    - SLA compliance rate (% closed within SLA, % still open within SLA)
    - Breach count (closed after SLA, or still open past SLA)
    - Median time-to-resolution for closed tickets

  Identify patterns:
    - Which category (Hardware/Software/Access/Network/Account/Security) had the
      most tickets? The most breaches?
    - Top 3 repeat-request patterns — are these FAQ candidates?
    - Which assignee queue has the worst SLA compliance? (don't name individuals —
      name the queue, e.g. "IT Software queue: 62% compliance")

  Check FAQ effectiveness: read `/data/faq-deflections.md`. How many requests were
  deflected this week? What was the deflection rate (deflections / (deflections + new tickets))?

  Write the full report to `/reports/sla-report-YYYY-MM-DD.md` with:
    - Executive summary (3 bullets: compliance rate, top risk, top pattern)
    - SLA table by priority tier
    - Category breakdown
    - FAQ deflection stats
    - Recommended actions (max 3, each with a named owner)

  Also update `/reports/sla-report.md` (the canonical latest report read by the queue webapp).
cabinetPath: cabinet-examples/cabinets/it-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
