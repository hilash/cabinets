id: weekly-wbr
name: Weekly Business Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: wbr-analyst
agentSlug: wbr-analyst
timeout: 1200
prompt: |-
  Produce this week's Weekly Business Review (WBR) memo and update the dashboard.

  Step 1 — WBR Analyst: Pull and compute metrics for all five functions. Write the
  structured dataset to `data/wbr-dataset-YYYY-WW.yaml` (replace YYYY-WW with ISO week).
  Required sections and metrics:

  REVENUE: ARR (total + WoW delta), net-new ARR this week, pipeline coverage ratio,
    open deals count, deals won/lost this week, win rate WoW.
  PRODUCT: Features shipped this week (Jira DONE), sprint velocity (story points),
    AI beta NPS (if updated), beta rollout progress.
  SUPPORT: Tickets opened/closed this week, CSAT score, median first-response time,
    P1 incidents, top issue category.
  ENGINEERING: PRs merged, deploy count, incident count, P1 bugs opened, on-call escalations.
  FINANCE: Cash position (if updated), burn rate, headcount vs plan, biggest spend change.

  Compute WoW delta for every numeric metric. Flag any metric that moved >20% WoW.
  If a metric is unavailable, write `status: unavailable` and note why.

  Step 2 — WBR Narrator: Read `data/wbr-dataset-YYYY-WW.yaml` and write the WBR memo
  to `data/wbr-YYYY-WW.md`. Required structure:
  - HEADER: period, prepared by, headline number (e.g. ARR this week)
  - OPENING: 2–3 sentences naming the cross-functional theme of the week
  - REVENUE section with narrative + key metrics
  - PRODUCT section
  - SUPPORT section
  - ENGINEERING section
  - FINANCE section
  - COMPETITIVE PULSE: (from competitor-watch job, if run; else note "see competitor-watch job")
  - DECISIONS NEEDED: max 3, each with who decides / what / by when

  Archive copy to `data/archive/wbr-YYYY-WW.md`.
  Update the review dashboard at `review/index.html` with this week's metrics.

  Rules:
  - Every number in the memo traces to a sourced field in the dataset.
  - No section is omitted; use "no material change" for quiet sections.
  - The memo is complete, forwarding-ready, no editing needed.
cabinetPath: cabinets/weekly-business-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
