id: competitor-watch
name: WBR Competitor Watch
enabled: true
schedule: 30 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: wbr-analyst
agentSlug: wbr-analyst
timeout: 900
prompt: |-
  Produce the weekly competitor-watch section for this week's WBR.

  Pull competitive signals from the Competitive Intelligence cabinet:
  - Read `../competitive-intelligence/signals/log.md` for signals from the last 7 days.
  - Read `../competitive-intelligence/briefing/` for the current weekly briefing.

  From those sources, surface the 3 most material competitive signals relevant to the WBR:
  - Which competitors moved, what they did (pricing / product / positioning / funding).
  - For each: the implication for revenue (deals, renewals, pipeline), product, or
    messaging THIS WEEK — not generic observations.
  - A "so what for us" line per signal.

  Write the output to `data/competitor-watch.md` with:
  1. Top 3 signals (what happened · source · implication for us)
  2. One-sentence competitive headline for the WBR opening
  3. Recommended actions for CS / Sales this week if applicable

  Then append the competitive pulse section to the current week's WBR memo at
  `data/wbr-YYYY-WW.md` under the "Competitive Pulse" header.

  Cross-reference the full competitive landscape in `../competitive-intelligence`
  for tier rankings and competitor profiles.

  Rules:
  - Only material signals make the cut. Minor blog posts and social noise are noise.
  - Lead with "so what for us" on every signal. Reporting without implication is not useful.
  - Source every claim (file name + date from the signal log).
cabinetPath: cabinets/weekly-business-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
