id: weekly-event-scan
name: Weekly Event Scan
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: event-hunter
agentSlug: event-hunter
timeout: 900
prompt: |-
  Run a weekly scan for cool USA events worth traveling for, happening in the
  next 1-3 months. Cover all six categories: music, food, sports, arts &
  culture, quirky Americana, and natural events.

  Sources to consult (in priority order):
  - X / Twitter — search city hashtags + "this weekend", "next month", "tickets just dropped"
  - Local news sites — pick 5 metro areas you haven't covered recently
  - Reddit — /r/travel, /r/festivals, the top 10 city subreddits
  - Eventbrite — trending in major metros
  - Tourism boards — official state tourism .gov sites for upcoming feature events

  Skip the boring listicle stuff. Each entry must pass the "would I drive cross-country for this?" test.

  Append to /inspiration/index.md under a NEW heading exactly:

    ## Week of [YYYY-MM-DD]

  Each entry strictly in this format:

    ### [Event Name] — [City, State] — [Dates]
    **Why it's cool:** [one sentence]
    **Source:** [link]
    **Tags:** [music | food | sports | arts | quirky | natural]

  Aim for 5-10 entries per scan. Quality over volume. Do not overwrite previous weeks.
  Cross-check /events/state-fairs.csv, /events/music-festivals.csv, and /holidays/holidays.csv — only re-flag those if THIS year's edition has something genuinely unusual (lineup, anniversary, headliner reunion, etc.).
cabinetPath: cabinets/cabinets/usa-travel-planner
createdAt: '2026-04-25T00:00:00.000Z'
updatedAt: '2026-04-25T00:00:00.000Z'
