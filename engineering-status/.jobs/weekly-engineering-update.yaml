id: weekly-engineering-update
name: Weekly Engineering Update
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: engineering-agent
agentSlug: engineering-agent
timeout: 900
prompt: |-
  Produce this Monday's weekly engineering status update covering Mon–Sun last week.

  STEP 1 — Engineering Agent: pull all raw signals for the past 7 days:
  - GitHub / GitLab: all PRs merged to main, deploy tags, failed/rolled-back deploys.
    Write to engineering-status/status/raw-shipped.md
  - Jira / Linear: all issues moved to Done. All issues still Open that were in the sprint.
    Write slipped issues to engineering-status/status/raw-slipped.md
  - Blocked: issues labeled blocked or with no activity for >3 days while In Progress.
    Write to engineering-status/status/raw-blocked.md
  - Deploy frequency: count of production deploys, count of rollbacks.
    Write to engineering-status/status/raw-deploys.md
  - PR throughput: count opened, merged, abandoned. Median cycle time (open→merge) in hours.
    Write to engineering-status/status/raw-pr-throughput.md

  STEP 2 — Summary Agent: shape the narrative and render outputs:
  Write a structured weekly status update to engineering-status/status/<YYYY-MM-DD>-update.md:

  ## Engineering Update — Week of <date>
  **Executive summary** (3 sentences: wins, risks, leadership attention needed)

  ### Shipped
  Grouped by team or service. Lead with highest-impact items. Cluster where possible.

  ### Slipped
  Each slipped item: title, assignee, days overdue, reason if known.

  ### Blocked
  Each blocker: title, owner, blocking reason, recommended next step.

  ### Needs Leadership Attention
  Only genuine escalations: blocked for >3 days with no path forward, risk to a committed
  deadline, or a rollback that needs a post-mortem.

  ### KPIs
  PRs merged | Deploy frequency (per week) | Median cycle time | Blocked tickets

  Render the dashboard to engineering-status/dashboard/index.html.
  Also write the plain-text version to engineering-status/status/latest.md (ready to paste into Slack).

  Rules:
  - Lead with outcomes, not activity.
  - If there are no blockers, say so explicitly — that is good news.
  - The Slack version must be under 300 words.
cabinetPath: cabinets/engineering-status
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
