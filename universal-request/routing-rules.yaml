version: 2
last_updated: '2026-05-20'
updated_by: routing-agent
reason: "Added Data team rules; raised Marketing SLA from 5d to 3d"

rules:
  - id: RR-001
    name: IT Support — Urgent
    match:
      keywords: [account locked, can't log in, cannot login, vpn down, system down, production, outage]
    destination_team: IT
    type: IT
    priority: P1-Urgent
    sla_tier: same-day

  - id: RR-002
    name: IT Support — Standard
    match:
      keywords: [laptop, monitor, access request, software install, printer, hardware, IT help]
    destination_team: IT
    type: IT
    priority: P3-Standard
    sla_tier: 48h

  - id: RR-003
    name: Design Request
    match:
      keywords: [design, creative, brand, logo, banner, illustration, mockup, figma, presentation deck]
    destination_team: Design
    type: Design
    priority: P3-Standard
    sla_tier: 5-day
    note: "Urgent design requests escalate to P2 manually"

  - id: RR-004
    name: Legal Review
    match:
      keywords: [contract, nda, legal review, msa, sow, terms, gdpr, compliance, legal]
    destination_team: Legal
    type: Legal
    priority: P2-High
    sla_tier: 5-day

  - id: RR-005
    name: Finance / Expense
    match:
      keywords: [expense, reimbursement, invoice, payment, purchase order, po, budget approval, finance]
    destination_team: Finance
    type: Finance
    priority: P3-Standard
    sla_tier: 48h

  - id: RR-006
    name: Data / Analytics Request
    match:
      keywords: [data, dashboard, report, analytics, sql, query, looker, metabase, export, data pull]
    destination_team: Data
    type: Data
    priority: P3-Standard
    sla_tier: 5-day

  - id: RR-007
    name: Marketing Support
    match:
      keywords: [copy, content, social, email, campaign, blog, pr, press, marketing]
    destination_team: Marketing
    type: Marketing
    priority: P3-Standard
    sla_tier: 3-day

  - id: RR-008
    name: Facilities / Office
    match:
      keywords: [office, facilities, desk, room, booking, supply, supplies, visitor, badge]
    destination_team: Facilities
    type: Facilities
    priority: P3-Standard
    sla_tier: 48h

  - id: RR-099
    name: Fallback — Ops General
    match:
      keywords: []
    destination_team: Ops General
    type: Ops
    priority: P3-Standard
    sla_tier: 48h
    flag: routing-review

