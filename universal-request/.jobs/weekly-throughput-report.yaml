id: weekly-throughput-report
name: Weekly Throughput Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: routing-agent
agentSlug: routing-agent
timeout: 600
prompt: |-
  Produce the weekly request throughput report for the previous week (Mon–Fri).

  Read all entries in `queue-state/requests.yaml` where
  submitted or routed_at falls within the last 7 days.
  Also read `queue-state/sla-log.md` for breach data.

  COMPUTE AND REPORT:

  1. VOLUME SUMMARY
     - Total requests received (by day: Mon–Fri)
     - Total requests closed this week
     - Total requests open / in backlog at week end
     - Volume by team: IT / Design / Legal / Finance / Data / Marketing / Ops / Facilities

  2. SLA PERFORMANCE
     - SLA met: N requests, % of total closed
     - SLA breached: N requests, % (breach rate)
     - Average breach duration (hours) where breaches occurred
     - Worst offender: team with highest breach rate this week
     - Best performer: team with lowest breach rate + fastest time-to-close

  3. PRIORITY BREAKDOWN
     - P1/P2/P3/P4 volume and SLA hit rate per priority tier

  4. TIME-TO-CLOSE
     - Average (hours) by request type
     - Longest open request: type, team, requester, age in days

  5. BACKLOG HEALTH
     - Requests open >5 days: list with owner and age
     - Teams with backlog >10 open requests: flag for capacity review

  6. RECOMMENDED ACTIONS (up to 5)
     - E.g., "IT queue has 35% breach rate — add a second owner" or
       "Marketing requests up 40% WoW — review self-serve docs"

  Write the full report to `reports/throughput-<YYYY-MM-DD>.md`.
  (Use the Monday date of the reporting week.)
cabinetPath: cabinet-examples/cabinets/universal-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
