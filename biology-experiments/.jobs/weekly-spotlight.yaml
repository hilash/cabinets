id: weekly-spotlight
name: Weekly Experiment Spotlight
enabled: true
schedule: 0 10 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: curator
agentSlug: curator
timeout: 180
prompt: |-
  Pick one experiment from this cabinet to feature this week. Rotate fairly — do not pick the same one as last week (check the recent edit history of index.md).

  Update index.md so the chosen experiment appears in a "## This week's spotlight" block at the top, with:
  - The experiment name, year, and the question it answered
  - One concrete thing the reader should try in the simulation (a specific cross, a specific generation count, a specific gas mixture)
  - One sentence on what was at stake — what the field believed before, and what changed after

  Remove any prior spotlight block so only this week's shows. Do not modify the rest of the page.
