name: Trigger Website Rebuild

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - '.github/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cabinets-website rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CABINETS_WEB_PAT }}
          repository: ${{ github.repository_owner }}/cabinets-website
          event-type: registry-updated
