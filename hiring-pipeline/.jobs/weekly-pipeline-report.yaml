id: weekly-pipeline-report
name: Weekly Pipeline Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 900
prompt: |-
  Produce the weekly hiring pipeline report.

  1. Instruct the Pipeline Analyst to pull the latest ATS data from `data/ats-export.md`
     and write the weekly funnel snapshot to `data/funnel-<ISO-week>.md`.
  2. Read the funnel snapshot and `data/headcount-plan.md` and `data/offers.md`.
  3. Write the weekly pipeline report to `reports/week-<ISO-week>.md` containing:
     a. OPEN ROLES SUMMARY: count by department, approved vs. in-progress vs. on-hold.
     b. FUNNEL HEALTH: for each open role, stage counts and the weakest conversion stage.
     c. TOP 3 BOTTLENECKS: each bottleneck must name: the stage, the metric, the
        probable cause, the recommended action, and the owner.
     d. HEADCOUNT PLAN vs. ACTUAL: approved FTEs vs. filled + offer-stage; roles
        approved but not yet opened (silent risk).
     e. OFFER/ACCEPT RATE: rolling 30-day rate + trend vs. previous 30 days.
        If <70%, include decline reasons from ATS.
     f. WATCHLIST: top 3 roles at risk of missing their headcount target, with
        recommended escalation actions.
  4. Summarize the top headline (≤2 sentences) to `reports/headlines.md` (append).
  5. If any role has been open >60 days without Final Round candidate, write an
     escalation to `escalations/stuck-role-<id>.md`.
cabinetPath: cabinet-examples/cabinets/hiring-pipeline
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
