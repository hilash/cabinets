id: daily-stalled-check
name: Daily Stalled Candidate Check
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: pipeline-analyst
agentSlug: pipeline-analyst
timeout: 600
prompt: |-
  Run the daily stalled candidate check across all open roles.

  1. Read `data/ats-export.md` and identify candidates who have been in the same
     stage for ≥5 business days (weekdays only) without a next step scheduled
     (i.e., no calendar event linked in `calendar/debriefs.md` or `calendar/screens.md`).
  2. Compute days stalled = today minus last stage-transition date.
  3. Write the stalled candidates list to `alerts/stalled-<date>.md`:
     - Header: date, number of stalled candidates, number of distinct roles affected
     - Per stalled candidate: candidate ID (no names), role, stage, days stalled,
       assigned recruiter, last action recorded in ATS
     - Severity flag: ≥5 days = warning; ≥10 days = critical
  4. For any candidate stalled ≥10 days, also append to `alerts/critical.md`
     for the People Ops Lead to action.
  5. If 0 stalled candidates, write a brief "all clear" entry to
     `alerts/stalled-<date>.md` and stop.
cabinetPath: cabinet-examples/cabinets/hiring-pipeline
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
