id: top-questions-digest
name: Weekly Top-Questions Digest
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 600
prompt: |-
  Produce the weekly HR top-questions digest from the past 7 days of questions.

  1. Read `questions/log.md` and filter entries from the past 7 days.
  2. Cluster questions into topic areas:
     PTO & leave · Benefits & insurance · Expenses & reimbursement ·
     Parental & family leave · Remote work & equipment · Offboarding ·
     Other / escalation
  3. For each cluster: count of questions, most-common phrasing, current policy
     card that covers it (or "no card — gap"), and a one-line recommendation
     (update card / create card / escalate / no action).
  4. Identify the top 5 clusters by volume.
  5. Write the digest to `digests/week-<ISO-week>.md` in this format:
     - Header: week, total questions, unique clusters
     - Top 5 table: rank, topic, count, policy coverage, recommendation
     - Gaps section: topics with no policy card — instruct Policy Researcher
       to draft cards for the top 2 gaps
     - Escalations: any question cluster that should trigger HR partner review
  6. Append a one-line summary to `questions/digest-index.md`.
cabinetPath: cabinets/hr-policy-assistant
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
