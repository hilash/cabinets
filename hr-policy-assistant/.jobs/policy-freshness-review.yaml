id: policy-freshness-review
name: Weekly Policy Freshness Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 600
prompt: |-
  Run the weekly HR policy freshness review.

  1. Read all policy files in `policies/`. For each, extract:
     - title, effective_date, last_reviewed, owner, status
  2. Classify each policy:
     - Fresh: last_reviewed within 90 days
     - Aging: last_reviewed 90–180 days ago (warn)
     - Stale: last_reviewed >180 days ago or status = stale (flag for update)
  3. Write the freshness report to `reviews/freshness.md` with:
     - Header: date, total policies, fresh/aging/stale counts
     - Stale policies table: policy name, last reviewed, owner, recommended action
     - Aging policies table: same fields, with "review by" target date
     - Any policy marked stale: instruct Policy Researcher to pull the source
       document and produce an updated draft card
  4. Update `reviews/stale.md` with the current stale list (overwrite).
  5. If any policy is >365 days stale, write an alert to `reviews/alerts.md`
     for escalation to HR leadership.
cabinetPath: cabinets/hr-policy-assistant
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
