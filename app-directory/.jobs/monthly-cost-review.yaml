id: monthly-cost-review
name: Monthly Cost & Renewal Review
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: app-analyst
agentSlug: app-analyst
timeout: 900
prompt: |-
  Produce the monthly SaaS cost and renewal review from `data/apps.csv`.

  1. Total spend summary.
     - Sum all annual_cost_usd values. Compute monthly equivalent.
     - Compare to last month's total (from previous report in `/reports/`).
     - Break down by category (Productivity / Security / Engineering / HR / Finance /
       Marketing / Other).

  2. Underused apps. For every app where utilization_pct < 40%:
     - Name, owner, annual cost, user_count, utilization_pct
     - Estimated annual waste: annual_cost_usd × (1 - utilization_pct/100)
     - Recommendation: cancel (utilization < 20%), downgrade (20–40%), or investigate
     - Decision owner: app owner + IT Ops

  3. Renewal radar — next 60 days. For every app where renewal_date falls within
     60 days of today:
     - Name, annual cost, current utilization, last-reviewed date
     - Action required: Renew / Renegotiate / Cancel
     - Flag for mandatory IT+Finance review if annual_cost_usd > 10000
       AND utilization_pct < 60%

  4. Duplicate-category analysis. For each category with 2+ apps:
     - List the apps, their costs, and their user counts
     - Flag if combined cost > $5,000/year and categories overlap (e.g., two
       project management tools)
     - Estimate annual savings if the smaller app is consolidated into the larger

  5. Top 10 apps by cost. Table: name, owner, annual cost, utilization_pct, SSO status.

  Write the full report to `/reports/monthly-cost-review-YYYY-MM.md` and update
  `/reports/monthly-cost-review.md` (canonical latest). Be specific: include
  exact dollar amounts, exact app names, named decision owners.
cabinetPath: cabinets/app-directory
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
