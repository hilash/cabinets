id: weekly-risk-review
name: Weekly Risk Review
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: initiative-analyst
agentSlug: initiative-analyst
timeout: 900
prompt: |-
  Run the weekly initiative risk review and write the risk narrative.

  Step 1 — Initiative Analyst: Read the current `data/initiatives.yaml`. For every risk
  in every active initiative's risk array:
  - Score or update: likelihood (1–5), impact (1–5), score = likelihood × impact.
  - Classify: score ≥ 12 = High (Red), 6–11 = Medium (Amber), 1–5 = Low (Green).
  - Write a one-sentence mitigation for each risk (action, not hope).
  - Track trend vs. last week: improving / flat / worsening.
  - Flag any risk that has been High for 3+ consecutive weeks without a mitigation plan
    as "systemic" — requires sponsor escalation.
  Write updated risk scores back to `data/initiatives.yaml`.

  Step 2 — Interdependency mapping: Cross-reference milestones across initiatives.
  Identify any milestone in Initiative A that is a dependency for Initiative B.
  If A's milestone is "behind," flag B as at risk due to dependency.
  Write a dependency map section to `data/risk-narrative.md`.

  Step 3 — Risk narrative: Write `data/risk-narrative.md` with:
  1. PORTFOLIO HEADLINE — one sentence on the overall risk posture this week.
  2. HIGH RISKS (Red) — each with: initiative, risk title, likelihood×impact, what's
     at stake, and a specific recommended mitigation with owner + deadline.
  3. MEDIUM RISKS (Amber) — top 3 most important, same format.
  4. INTERDEPENDENCIES — cascade risks and which initiatives are linked.
  5. SYSTEMIC FLAGS — risks that have been High 3+ weeks without a plan.

  Rules:
  - Max 500 words total. Leadership reads this in 3 minutes.
  - One theme per narrative — the central risk thread that connects the portfolio this week.
  - Mitigation is always an action with an owner and a date, never "monitor closely."
  - Cross-reference the OKR Command cabinet (../okr-command/) where initiative risks
    directly affect OKR key results.
cabinetPath: cabinet-examples/cabinets/strategic-initiative
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
