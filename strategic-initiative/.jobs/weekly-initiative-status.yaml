id: weekly-initiative-status
name: Weekly Initiative Status
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: initiative-workflow
agentSlug: initiative-workflow
timeout: 900
prompt: |-
  Run the weekly initiative status sweep and produce this week's status summary.

  Step 1 — Initiative Workflow Agent: For every active initiative in `data/initiatives.yaml`:
  - Check each milestone status. Pull from linked Jira epic where available.
  - Mark milestones as: completed / on-track / behind / stale (>7 days no update).
  - If a milestone target date has passed without completed status, mark it "behind" and
    set daysLate to the number of days past due.
  - If owner data is missing or stale, log in `data/stale-owners.md`.
  - Validate the full schema: id, name, sponsor, lead, status, milestones, raci, risks.
    Flag any missing fields.
  - Write the updated `data/initiatives.yaml`.

  Step 2 — Write status summary to `data/status-YYYY-WW.md` (replace with ISO week):
  - Count: active initiatives / milestones on-track / behind / completed this week
  - List any initiatives with stale owner data
  - List any milestones that became "behind" this week (newly past due)
  - List milestones completed this week (wins to surface)
  - One paragraph on overall portfolio health

  Step 3 — Trigger the Initiative Analyst to run the Friday risk review early if any
  initiative's status changed from on-track to behind this week. Note this in the summary.

  Rules:
  - A milestone is not "on track" if owner data is stale. It is "unknown."
  - Behind milestones must have a revised target date or an explicit "date TBD" note from owner.
  - Do not smooth bad news. If 3 of 5 milestones this week are behind, say so.
cabinetPath: cabinet-examples/cabinets/strategic-initiative
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
