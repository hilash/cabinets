id: library-freshness
name: Weekly Answer Library Freshness
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: compliance-agent
agentSlug: compliance-agent
timeout: 600
prompt: |-
  Review the answer library at `answer-library/library.md` for staleness and accuracy.

  For each library entry:
  1. Check the entry's `last-verified` date. Flag as STALE if >90 days old.
  2. Cross-reference the cited policy or control against the current policy files in
     `policies/`. If the policy has been updated since the library entry was written,
     flag as OUTDATED and note the change.
  3. Check whether any SOC2 controls cited have changed scope or wording in the most
     recent SOC2 report in `soc2/`.

  Write the freshness report to `answer-library/freshness-YYYY-WW.md` with:
  - Total entries reviewed
  - Entries marked STALE (list with reason)
  - Entries marked OUTDATED (list with what changed)
  - Entries confirmed current

  For each OUTDATED entry, update the library entry inline with the corrected answer
  and update the `last-verified` date to today. For STALE entries, note that human
  re-verification is recommended before next use.

  Commit the updated `library.md` and the freshness report.

  Rules:
  - Do not remove entries — mark them STALE or OUTDATED in place.
  - A library entry that can't be verified against a current source is STALE by default.
  - The freshness report is the audit trail. Write it to last.
cabinetPath: cabinets/security-questionnaire
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
