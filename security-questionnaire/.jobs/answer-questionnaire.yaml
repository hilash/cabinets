id: answer-questionnaire
name: Answer Security Questionnaire
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: compliance-agent
agentSlug: compliance-agent
timeout: 1800
prompt: |-
  A new security questionnaire has been received. Complete a full questionnaire run
  for the incoming document identified in `.cabinet-state/current-questionnaire.md`.

  STAGE 1 — TRIAGE (Compliance Lead)
  Read the questionnaire in full. Categorise every question by domain (access control,
  encryption, incident response, vulnerability management, vendor management, data residency,
  physical security, business continuity, etc.). For each question, identify the closest
  matching policy in `policies/` or past answer in `answer-library/library.md`.
  Write the mapping to `questionnaires/<name>/question-map.md`.
  Flag any question with no matching source as a potential gap.

  STAGE 2 — DRAFT ANSWERS (Writer)
  For each mapped question, draft an answer using the specified source. Requirements:
  - Every substantive answer cites its source inline: [Policy: <name>, §<section>] or
    [Control: <control-id> — SOC2 Type II] or [Library: <entry-id>]
  - Answers are accurate, appropriately scoped, and written for a security-aware enterprise buyer
  - Confidence score per answer: High / Medium / Low / Gap
  Write all draft answers to `questionnaires/<name>/draft-answers.md`.

  STAGE 3 — QA REVIEW (QA Reviewer)
  Review every answer against its cited source. Check for:
  - Overstatements (answer claims more than the control/policy actually says)
  - Scope creep (control applied to systems it doesn't cover)
  - Missing sources (claim without a citation)
  - Items requiring human review (legal commitments, SLA claims, future roadmap)
  Annotate the draft inline with [QA: OVERSTATEMENT], [QA: SCOPE], [QA: NEEDS HUMAN REVIEW].
  Write QA notes to `questionnaires/<name>/qa-notes.md`.

  STAGE 4 — FINAL DRAFT (Compliance Lead)
  Resolve all QA flags. Write the final reviewed draft to
  `questionnaires/<name>/final-draft.md`. Write any confirmed gaps to
  `questionnaires/<name>/gaps.md` — do not paper over genuine gaps.
  Commit high-quality answers as library entries to `answer-library/library.md`.

  Rules:
  - Every answer must have a source citation. No source = mark as Gap.
  - Gaps are documented, not hidden. The gap list ships with the questionnaire.
  - Do not exceed what the cited control or policy actually says.
cabinetPath: cabinets/security-questionnaire
