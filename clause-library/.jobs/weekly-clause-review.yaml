id: weekly-clause-review
name: Weekly Clause Library Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: clause-researcher
agentSlug: clause-researcher
timeout: 900
prompt: |-
  Run the weekly clause library review. Write the sweep output to
  `clauses/sweep-log.md` (append a new dated entry — do not overwrite).

  Review steps:

  1. CLM SCAN FOR NEW NEGOTIATED POSITIONS
     Check `clauses/pending-positions.md` (created by counsel when a deal closes with
     a non-standard position) for any positions logged since the last sweep.
     For each new position:
     - Determine which clause category it belongs to.
     - Assess whether it represents a new Fallback tier or an update to an existing one.
     - Draft the new/updated language and add it to the appropriate clause file in
       `clauses/` as a candidate update. Mark it `qa_approved: false`.
     - Route to Clause QA for review.
     - Log in sweep-log.md: clause, position, deal it came from, disposition.

  2. STALENESS CHECK
     Review every clause file in `clauses/` with `last_updated` more than 90 days ago.
     For each stale clause:
     - Note the staleness and flag for legal ops review.
     - Check if any legal policy in `clauses/policy-log.md` has changed since the
       last update date. If a policy conflict exists, flag as Policy Conflict and
       escalate immediately.

  3. COVERAGE GAPS
     Identify any clause categories referenced in contracts in `contracts/approved/`
     (from last week's contract analysis) that do not have an entry in `clauses/`.
     For each gap: note the clause type, the contract it appeared in, and
     flag for the Clause Researcher to draft a new entry.

  4. SWEEP SUMMARY
     Write to sweep-log.md: new positions captured, stale clauses flagged, coverage
     gaps identified, items routed to QA.
cabinetPath: cabinets/clause-library
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
