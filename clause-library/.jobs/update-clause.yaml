id: update-clause
name: Update Clause Entry
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: clause-researcher
agentSlug: clause-researcher
timeout: 600
prompt: |-
  Update the clause entry at `clauses/{{clause_slug}}.md` with the following change:
  {{change_description}}

  The update must:
  1. Preserve all existing frontmatter fields, updating only `last_updated` to today.
  2. Apply the change to the correct section (Standard Language / Fallback 1 /
     Fallback 2 / Negotiation Notes / Risk Rating / When to Use).
  3. If the change adds a new fallback tier, include:
     - The new fallback language (exact clause text).
     - Risk rating: Low / Medium / High / Requires GC Approval.
     - Business justification for the concession.
     - Approver and approval date (if provided in {{change_description}};
       if not, mark as PENDING APPROVAL and flag before QA).
  4. If the change updates negotiation notes, ensure the updated note is specific:
     what the counterparty pushes for, why we resist, and what usually works.
  5. Add a change-log entry at the bottom of the file:
     `- {{today}} | {{change_description}} | Author: Clause Researcher`

  After updating, route the file to Clause QA for review before the update
  is considered published.

  Do not update any other clause files during this job run.
cabinetPath: cabinets/clause-library
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
