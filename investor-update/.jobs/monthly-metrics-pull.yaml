id: monthly-metrics-pull
name: Monthly Metrics Pull
enabled: true
schedule: 0 8 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: investor-analyst
agentSlug: investor-analyst
timeout: 600
prompt: |-
  Pull and validate the month's company metrics for the investor update.
  This must complete before the Investor Writer starts the update (runs at 09:00 on the 1st).

  Pull and structure these metrics into `data/monthly.md`:
  1. ARR (current, prior month, delta, delta %)
  2. MRR (current, prior month, delta)
  3. MRR Growth Rate (%, vs prior month)
  4. Net Revenue Retention (trailing 12 months)
  5. Gross Margin (%, trailing 3 months)
  6. Monthly Burn (actual vs Q budget)
  7. Cash Balance and Runway (months at current burn)
  8. New Logos Closed (count, company names if ≥1 enterprise)
  9. Churned Logos (count, ARR lost)
  10. Pipeline (qualified, vs prior month)
  11. Headcount (total, vs plan, open critical roles)

  For each metric: record current value, prior month value, delta, source system, pull date.
  Flag any metric with >10% movement with an "Investor will ask" note.
  Mark any unavailable metric as Pending with reason — never estimate.

  Also read `notes/ceo-notes.md` for any founder context or corrections to flag to the Writer.
  Append a dated snapshot to `data/history.md`.
cabinetPath: cabinets/investor-update
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
