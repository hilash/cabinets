id: monthly-investor-update
name: Monthly Investor Update
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: investor-writer
agentSlug: investor-writer
timeout: 900
prompt: |-
  Produce this month's investor update. This runs after the Monthly Metrics Pull job
  completes at 08:00 — confirm `data/monthly.md` is current before writing.

  Read:
  - `data/monthly.md` — the Analyst's structured metrics (all flags and "investor will ask" notes)
  - `notes/ceo-notes.md` — any CEO context, specific highlights to emphasize, or asks to include

  Write the investor update with these sections IN ORDER:
  1. SUBJECT LINE — one sentence that captures the month (used as the email subject line).
  2. OPENING — 2 sentences, CEO voice, personal and direct. Set the month's tone.
  3. HIGHLIGHTS — exactly 3 bullet points. Each: metric or milestone + why it matters. Be specific.
  4. METRICS TABLE — compact table: ARR, MRR growth, NRR, Gross Margin, Burn, Runway, New Logos.
     Include prior month column. Source each row tag.
  5. LOWLIGHTS — 1–2 bullets. Specific, honest, forward-looking. What went wrong and what you're doing.
  6. WHAT'S NEXT — 2–3 sentences on next month's focus. Set expectations.
  7. ASKS — 2–3 specific asks for investors. Named targets or network categories. Never generic.
  8. CLOSING — 1–2 sentences, signed as CEO.

  Rules:
  - Address every "Investor will ask" flag from `data/monthly.md` in the narrative.
  - Write in first person as the CEO. Direct, specific, no hedging language.
  - Lowlights section is mandatory — skip it and the update loses credibility.
  - Asks must be specific: named company, named role, or named action.

  Write to `update-letter/YYYY-MM-investor-update.md` and update `update-letter/index.html`.
  Archive previous update to `archive/`.
cabinetPath: cabinets/investor-update
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
