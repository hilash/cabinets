id: library-freshness
name: Weekly Library Freshness Check
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: compliance-agent
agentSlug: compliance-agent
timeout: 600
prompt: |-
  Check the freshness of every answer in the reusable answer library at `/library/`.

  For each answer entry in `/library/answers/`:
  1. Check the `last-reviewed` date. Flag any answer not reviewed in 90+ days.
  2. Check the `source` field. Verify the source document still exists and hasn't been
     superseded (e.g., new pricing schedule, updated security questionnaire, new contract
     template version).
  3. Check for answer entries that reference products, certifications, or pricing that
     may have changed since the last review. Flag these as `needs-validation`.
  4. For security-related answers: any answer older than 60 days must be re-validated
     against `/library/security-answers.md`.

  Write a freshness report to `/library/stale.md` with:
  - Summary: total answers, # stale (90d+), # needing validation
  - List of stale entries: answer ID, category, last-reviewed date, recommended action
  - List of entries with changed source documents

  Flag any answer that contains a compliance risk (expired certification, changed pricing,
  deprecated contract language) as URGENT — these must be updated before the next RFP.
cabinetPath: cabinets/proposal-rfp
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
