id: rfp-response
name: RFP Response
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: writer-agent
agentSlug: writer-agent
timeout: 1800
prompt: |-
  Draft a full RFP response for the request specified in `/responses/.active-rfp.md`.
  That file contains: RFP file path, account name, opportunity ID, deadline, and AE owner.

  Step 1 — Parse the RFP:
  Read the RFP file. Extract every question into a tracker at
  `/responses/<rfp-name>/tracker.md` with columns: ID | Section | Question | Status | Source.

  Step 2 — Library match:
  For each question, search `/library/` for an existing approved answer. If found:
  - Copy the answer into the draft, mark Status=library-reuse, cite the library entry ID.
  If not found: draft an original answer, mark Status=draft, cite the source document used
  (pricing schedule, security answers, contract template, or case study).

  Step 3 — Draft:
  Assemble the full response at `/responses/<rfp-name>/draft.md` in the RFP's section order.
  Every answer must cite its source. Mark any answer where you couldn't find supporting
  documentation as `[PENDING — AE to confirm]`.

  Step 4 — Trigger Compliance:
  When the draft is complete, write a handoff note to `/responses/<rfp-name>/compliance-queue.md`
  and notify the Compliance Agent. Do not send the draft to the customer.

  Step 5 — After Compliance PASS:
  Trigger the QA Agent. Only mark `status: ready` in the tracker after QA issues a PASS.
cabinetPath: cabinets/proposal-rfp
