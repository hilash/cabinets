id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: writer-agent
agentSlug: writer-agent
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut for active proposals and RFPs.

  Review active proposal drafts in `/proposals/` and RFP responses in `/responses/`
  where status is not `sent` or `archived`. For each active document:
  1. Check if any competitor is mentioned by the customer in their RFP questions or
     evaluation criteria. If so, cross-reference `../competitive-intelligence` for
     current positioning on that competitor.
  2. Check if our differentiator claims are still valid — has a competitor shipped
     a feature or changed pricing that undermines a claim in an active proposal?
  3. Flag any proposal section that uses competitor positioning language that may be
     outdated given the past 7 days of signals from `../competitive-intelligence`.

  Write findings to `/competitor-watch/weekly-<date>.md`.
  Update `/competitor-watch/latest.md` with the top 3 signals.
  Include recommended proposal copy updates where relevant.
  Lead each finding with "so what for this proposal."
cabinetPath: cabinets/proposal-rfp
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
