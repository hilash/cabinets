id: quarterly-batch
name: Quarterly Review Batch
enabled: true
schedule: 0 9 1 1,4,7,10 *
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 1800
prompt: |-
  Launch the quarterly performance review cycle for all active employees.

  1. Determine the current cycle identifier from the date (e.g., Q2-2026 for April 2026).
  2. Read the active employee roster from `roster/active.md`.
  3. Create the cycle directory `reviews/<cycle>/` and write a manifest to
     `reviews/<cycle>/manifest.md` listing every employee, their manager, and
     initial status = pending.
  4. For each employee in the roster:
     a. Check that goal files exist at `goals/<employee-slug>/cycle-goals.md`.
        If missing, flag in the manifest and skip (do not produce a blank packet).
     b. Instruct the Review Writer to draft the review packet using:
        - `goals/<employee-slug>/cycle-goals.md`
        - `feedback/<employee-slug>/manager-notes.md`
        - `feedback/<employee-slug>/peers.md`
        Write draft to `reviews/<cycle>/<employee-slug>-draft.md`.
     c. Instruct the Review QA agent to check the draft. If it passes, promote
        to `reviews/<cycle>/<employee-slug>.md` and update manifest status to
        "published". If it fails, write revision items and loop back to the
        Review Writer (max 2 rounds).
  5. Once all packets are published, write the rating distribution summary to
     `reviews/<cycle>/calibration.md` for People Ops Lead review.
  6. Summarize any skipped employees (missing goals) and any packets that required
     >1 revision round in `reviews/<cycle>/cycle-report.md`.
cabinetPath: cabinets/performance-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
