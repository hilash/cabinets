id: per-employee-review
name: Per-Employee Review Packet (On-Demand)
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 900
prompt: |-
  Produce a single performance review packet on demand for a specific employee.

  You will be given: employee slug, cycle identifier, and any context notes
  (either inline or in a file at `requests/per-employee-<slug>.md`).

  Steps:
  1. Confirm source files exist:
     - `goals/<employee-slug>/cycle-goals.md`
     - `feedback/<employee-slug>/manager-notes.md`
     - `feedback/<employee-slug>/peers.md`
     If any are missing, write a blocker note to `requests/blocked-<slug>.md`
     and stop — do not produce a partial packet.
  2. Instruct the Review Writer to produce the draft at
     `reviews/<cycle>/<employee-slug>-draft.md`.
  3. Instruct Review QA to check the draft. Address any revisions (max 2 rounds).
  4. On QA approval, promote to `reviews/<cycle>/<employee-slug>.md`.
  5. Summarize: sources used, revision rounds, and any flags in a one-page
     note at `reviews/<cycle>/<employee-slug>-notes.md`.
cabinetPath: cabinets/performance-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
