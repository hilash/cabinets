id: weekly-audit-status
name: Weekly audit status
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: product-senior
agentSlug: product-senior
timeout: 600
prompt: |-
  Roll up the state of every `audit-YYYY-MM-DD/` folder in this cabinet.
  For each one, read `progress.md` and report:
  - The audit's date label
  - Tally: 🟢 fixed · ⚪ open · 🟡 deferred · ✱ skipped
  - The top 3 highest-severity items still in the open queue
  - Whether `review/index.html` exists and how stale it is vs. the
    issue files (regenerate if any issue has been touched after
    review/index.html was last written)
  - Any audit whose review has been exported to `feedback.md` but
    still has unaddressed Fail rows

  Save the roll-up to `weekly-status-YYYY-MM-DD.md` at the cabinet root.
  Format as a single short page — table per audit, three-line summary
  at the top.
cabinetPath: cabinets/audits
createdAt: '2026-05-02T18:36:34.261Z'
updatedAt: '2026-05-02T18:36:34.261Z'
