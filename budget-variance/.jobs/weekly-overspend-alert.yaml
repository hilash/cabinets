id: weekly-overspend-alert
name: Weekly Overspend Alert
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 300
prompt: |-
  Run the weekly overspend alert as the Variance Analyst.

  1. Read the week's card spend from the Ramp/Brex export (or most recent AP run).
     Attribute spend to department using cost-center codes.
  2. Compute the weekly budget pace per department:
     monthly_budget / 4.33 = weekly_pace.
  3. For each department: compare actual weekly spend vs. weekly pace.
  4. Flag any department exceeding 110% of weekly pace as ALERT.
  5. Flag any single transaction > $5,000 that was not pre-approved.
  6. Write the alert to `.cabinet-state/overspend-alert.md`. Format:
     ```
     # Overspend Alert — Week of <date>
     ## Departments over 110% of weekly pace
     | Department | Budget Pace | Actual | % Over | Driver |
     ...
     ## Large unapproved transactions (>$5k)
     | Date | Vendor | Amount | Department | Note |
     ...
     ```
  7. If no departments are over pace and no large transactions flagged: write
     "No alerts this week. All departments within pace."

  Keep it factual and brief. This is an alert, not an analysis.
cabinetPath: cabinets/budget-variance
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
