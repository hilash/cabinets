id: weekly-insights-report
name: Weekly Support Insights Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: insights-synthesizer
agentSlug: insights-synthesizer
timeout: 900
prompt: |-
  Produce this week's Support Insights Report. Today is Monday — the report covers the
  previous Mon–Sun (7 days). Ship by 09:00.

  INPUTS (all inside this cabinet):
  - Cluster files: `/clusters/*.md` — read all, focus on updated-this-week
  - Emerging spikes: `/clusters/emerging/` — include any files from the past 7 days
  - CSAT data: `/data/csat.csv` — weekly CSAT score and response count
  - Deflection data: `/data/deflection.csv` — self-serve rate, articles viewed before ticket
  - Article gaps: `/gaps/article-gaps.md` — aggregate this week's entries

  REPORT STRUCTURE — write to `/reports/week-<YYYY-WW>.md`:

  ## The week in one line
  One sentence. What the Head of Support must know before anything else.
  E.g.: "The API rate-limit cluster tripled this week and is generating enterprise-tier
  negative sentiment — it needs an engineering escalation today."

  ## CSAT pulse
  This week's score vs. 4-week rolling average. Which clusters are dragging it down?
  Which agents or topics correlate with high satisfaction?

  ## Top clusters (3–5 only)
  For each: name, volume (7d), trend vs prior week, sentiment, one-line so-what,
  recommended action (Fix / FAQ / UX tweak / Roadmap item / Escalate). Link to
  `/clusters/<slug>.md`.

  ## Product pain table
  Markdown table: cluster | recommended action | urgency | owner suggestion.
  Distinguish product pain (bug, UX confusion, missing feature) from ops problems
  (training gap, macro missing, process confusion).

  ## Deflection opportunities
  Top 5 article gaps by ticket volume. Estimated weekly deflection if article were live.
  Cross-reference `/gaps/article-gaps.md`.

  ## This week's noise
  Brief list of low-signal clusters (small volume, no trend, no action needed).

  ## Appendix
  All clusters, volumes, and trends in a table.

  After writing the report, update `/dashboard/data.json` with the current week's KPI
  values so the dashboard webapp reflects this week's data.

  RULES:
  - Every cluster mentioned links to its file in `/clusters/`.
  - Every CSAT number references its row in `/data/csat.csv`.
  - If data is missing, say so — do not invent numbers.
  - Lead with the so-what, not the method.
cabinetPath: cabinet-examples/cabinets/support-intelligence
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
