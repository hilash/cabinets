id: weekly-roadmap-refresh
name: Weekly Roadmap Refresh
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-lead
agentSlug: product-lead
timeout: 900
prompt: |-
  Produce the weekly roadmap refresh. Two-stage job:

  STAGE 1 — Ask the Roadmap Analyst to:
  - Pull the latest feedback theme data from /voice-of-customer/themes/ (if accessible)
    and the scored feature request board from /feature-request/requests/board.md
  - For each initiative in /initiatives/, refresh the evidence trail at /evidence/<slug>.md:
    · Updated mention count and ARR requesting from latest VoC/FR data
    · Capacity estimate vs current Jira/Linear sprint data
    · Confidence score (1–5) with breakdown across 4 dimensions
  - Flag any Now initiative where confidence dropped below 3 this week
  - Flag if total Now capacity exceeds 80% of available quarterly engineering capacity
  - Write a summary to /evidence/weekly-evidence-summary-<YYYY-WW>.md

  STAGE 2 — As Roadmap Lead, review the Analyst's findings:
  - Adjust Now/Next/Later placements if any evidence change is material
  - Document any placement change with a one-sentence reason in /reports/refresh-<YYYY-WW>.md
  - If any initiative moved from Later to Now, also check capacity flag before confirming
  - Update the roadmap view at /roadmap/index.html to reflect current placements,
    confidence scores, themes, and capacity bars

  Rules:
  - Every initiative placement has a documented reason (even "no change — signals stable")
  - Confidence < 3 in Now column must be flagged with a recommendation (validate further or move to Next)
  - No hand-waving on capacity: every Now initiative shows an estimated engineering week cost
cabinetPath: cabinets/roadmap
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
