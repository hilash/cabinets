id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-lead
agentSlug: product-lead
timeout: 900
prompt: |-
  Produce the weekly roadmap competitor gap analysis. This job identifies where our roadmap
  has gaps vs. what competitors have already shipped or are signaling.

  Pull competitor recent moves from the company Competitive Intelligence cabinet
  (cross-reference /competitive-intelligence/signals/ and /competitive-intelligence/competitors/).

  For each competitor move in the last 30 days:
  1. Map it to a roadmap initiative (does it overlap with something in our Now/Next/Later?)
  2. If it overlaps a Now item: flag as "competitive urgency — they shipped first"
  3. If it overlaps a Later item: consider whether it should be accelerated
  4. If there is no matching initiative: flag as a "gap — evaluate adding"

  Also identify roadmap gaps: features in Later or not yet on the roadmap that 2+ competitors
  have shipped in the past 2 quarters. These are likely table-stakes items.

  Write the roadmap competitor gap report to /competitor-watch/roadmap-gaps-<YYYY-MM-DD>.md:
  - Competitive urgency flags (sorted by ARR impact of relevant Now initiatives)
  - Table-stakes gaps (features 2+ competitors have, we don't have on roadmap)
  - First-mover opportunities (our Now items where no competitor has shipped yet)

  Lead with the top 3 "so what for our roadmap" implications. Cross-reference the
  Competitive Intelligence cabinet for the full landscape context.
cabinetPath: cabinets/roadmap
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
