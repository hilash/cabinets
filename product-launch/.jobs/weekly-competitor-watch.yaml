id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: launch-workflow
agentSlug: launch-workflow
timeout: 900
prompt: |-
  Produce the weekly competitor launch timing analysis for all active launches in /checklists/.

  For each active launch:
  - Check the company Competitive Intelligence cabinet (/competitive-intelligence/) for any
    competitor launches, feature announcements, or pricing changes in the last 14 days
    that overlap with our planned launch (same product area or customer segment)

  For each competitor overlap found:
  - Assess launch timing conflict: will our launch be overshadowed, or can we differentiate?
  - Recommend: (a) proceed on schedule with adjusted messaging, (b) accelerate to beat them,
    or (c) delay to let their news cycle pass
  - Note any competitor feature announcement that changes the success framing for our launch
    (e.g., if they just shipped a related feature, our "first-to-market" claim may need revision)

  Also check: are there any major industry events or competitor conference dates in the next
  30 days that we should avoid or align with?

  Write the competitor timing report to /competitor-watch/launch-timing-<YYYY-MM-DD>.md.
  Flag any HIGH conflict to the Launch Workflow agent for immediate PM escalation.
cabinetPath: cabinet-examples/cabinets/product-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
