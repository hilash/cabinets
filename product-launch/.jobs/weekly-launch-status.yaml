id: weekly-launch-status
name: Weekly Launch Status
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: launch-workflow
agentSlug: launch-workflow
timeout: 900
prompt: |-
  Produce the weekly launch status report for all active launches in /checklists/.

  An "active" launch is any checklist file in /checklists/ with status: active or status: at-risk.

  For each active launch:
  1. Calculate overall completion: % of checklist items marked done
  2. Identify all items with status: not-started or in-progress that are past their due date
  3. Check the risk log at /risks/<launch-slug>.md for any risks that changed status this week
  4. Calculate days to launch date (from frontmatter)

  Update the checklist file at /checklists/<launch-slug>.md:
  - Mark any newly completed items (cross-check with Jira epic status if linked)
  - Update the overall status badge: on-track (≥90% on-time items), at-risk (1–3 overdue P0s),
    or blocked (any P0 with 0 progress 7+ days overdue)

  Write the weekly status report to /reports/status-<YYYY-MM-DD>.md:
  - Per-launch summary: name, launch date, days out, completion %, status badge
  - All overdue P0 items with owner names
  - Risk changes this week
  - Recommendation for any launch flagged as "blocked"

  Ask the Launch Writer to prepare any comms drafts that are due this week
  (i.e., drafts needed ≥48h before launch — check against each launch date).
cabinetPath: cabinet-examples/cabinets/product-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
