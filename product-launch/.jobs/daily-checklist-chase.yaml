id: daily-checklist-chase
name: Daily Checklist Chase
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: launch-workflow
agentSlug: launch-workflow
timeout: 600
prompt: |-
  Run the daily launch checklist chase for all active launches in /checklists/.

  For each active launch:
  1. Calculate days remaining until launch date
  2. Identify all P0 checklist items that are not-done

  Chase rules by days remaining:
  - T-14 to T-8: Send weekly summary only (handled by weekly job)
  - T-7 to T-3: For every incomplete P0 item, generate a Slack message draft to the item owner
    at /reports/chase-<YYYY-MM-DD>.md. Format: "@owner — [launch name] launches in [N] days.
    Your item '[item title]' is [status]. Please update the checklist or flag a blocker."
  - T-2 and T-1: ESCALATION mode. For any incomplete P0 item, generate an escalation message
    to BOTH the item owner AND the PM. Mark the launch status as "at-risk" in the checklist.
  - T-0 (launch day): Generate the go/no-go brief at /reports/go-no-go-<date>.md:
    List every P0 item with its current status (done / not done).
    List every open high-impact risk.
    Produce a recommendation: Go / Go with conditions / No-go.
    No-go means the launch date must move — list the specific blockers.

  Write all messages to /reports/chase-<YYYY-MM-DD>.md (do not send directly — PM reviews).
  If no launches are within T-7, write "No launches within 7 days — no action needed."
cabinetPath: cabinet-examples/cabinets/product-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
