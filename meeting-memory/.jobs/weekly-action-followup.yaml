id: weekly-action-followup
name: Weekly Action-Item Follow-Up
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: action-tracker
agentSlug: action-tracker
timeout: 600
prompt: |-
  Produce the weekly action-item follow-up report for the Meeting Memory cabinet.

  1. Read `meetings/action-items.yaml` — the full action-item ledger.
  2. Categorise every open item:
     - COMPLETED: status changed to completed since last Monday (pull from any meeting file updates)
     - DUE THIS WEEK: due date within the next 7 days, status: open
     - OVERDUE: due date in the past, status: open — compute days overdue
     - UNASSIGNED: owner is [unassigned]
  3. Flag any item overdue by 14+ days as escalate: true in the ledger.
  4. Pull this week's decisions from `meetings/index.yaml` (all meetings logged Mon–Fri last week).
  5. Write the follow-up report to `meetings/follow-up-<YYYY-MM-DD>.md`:
     - **Completed this week** (task | owner | meeting source)
     - **Due this week** (task | owner | due date | meeting source)
     - **Overdue** (task | owner | days overdue | meeting source) — sorted by days overdue descending
     - **Unassigned action items** (task | meeting source | flagged date)
     - **Decisions this week** (decision | meeting | date)
     - **Escalated items** (items with escalate: true, with explanation)
  6. Update `meetings/action-items.yaml` with any status changes detected.

  Rules: Never close an action item unless a meeting file or explicit acknowledgement confirms completion.
  Overdue is a fact, not a judgment — report it plainly.
  Escalated items are flagged for the Chief of Staff, not acted on directly.
cabinetPath: cabinet-examples/cabinets/meeting-memory
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
