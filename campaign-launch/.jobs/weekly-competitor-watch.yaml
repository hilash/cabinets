id: weekly-competitor-watch
name: Weekly Competitor Campaign Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: campaign-manager
agentSlug: campaign-manager
timeout: 900
prompt: |-
  Produce the weekly competitor campaign watch for the marketing team.
  Scan for signals relevant to our active campaigns: competitor ad creative changes,
  new landing page angles, positioning pivots, promotional offers, and channel mix shifts.
  Focus on Northwind and Helios as Tier-1 competitors, plus any others in `competitor-watch/tracked.md`.

  For each material move:
  1. What changed (sourced — link or describe the evidence).
  2. Which of our active campaigns it affects and how.
  3. Recommended response: copy pivot, channel shift, offer adjustment.

  Write findings to `competitor-watch/weekly-<YYYY-MM-DD>.md`.
  Surface the top 2 competitor moves in the campaign room webapp (`campaign-room/index.html`).
  Cross-reference the company Competitive Intelligence cabinet for the full landscape.
cabinetPath: cabinet-examples/cabinets/campaign-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
