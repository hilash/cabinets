id: daily-checklist-chase
name: Daily Checklist Chase
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: campaign-manager
agentSlug: campaign-manager
timeout: 300
prompt: |-
  Run the daily launch-checklist chase for all campaigns launching within 14 days.
  For each such campaign, open `campaigns/<name>/checklist.md` and identify every item
  that is incomplete and past its due date.
  For each overdue item: log it to `status/daily-chase.md` with fields:
    - Campaign name
    - Item description
    - Owner (from checklist)
    - Original due date
    - Days overdue
  Sort by days overdue descending. Prepend today's date as a header.
  If any item is critical (marked [BLOCKER]) and 2+ days overdue, flag it prominently
  at the top of the file with "⚠ BLOCKER" so the Campaign Manager can escalate.
  Do not duplicate items already resolved (checked off) in the checklist.
cabinetPath: cabinet-examples/cabinets/campaign-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
