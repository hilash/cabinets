id: weekly-campaign-status
name: Weekly Campaign Status
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: campaign-manager
agentSlug: campaign-manager
timeout: 600
prompt: |-
  Produce this week's campaign status update for all active campaigns in `campaigns/`.
  For each campaign:
  1. Read the brief at `campaigns/<name>/<name>.md` and the checklist at `campaigns/<name>/checklist.md`.
  2. Summarize: overall status (On Track / At Risk / Blocked), days to launch (or days live), asset completion %, budget paced vs planned.
  3. List top 3 blockers with named owners and due dates.
  4. List any copy items waiting on Campaign Writer — if any, trigger a brief to `campaigns/<name>/copy/brief.md`.
  5. Update the campaign room webapp at `campaign-room/index.html` with current metrics, checklist status, and launch countdown.
  6. Write a brief markdown summary to `status/weekly-<YYYY-MM-DD>.md`.
  Lead with "What needs a human decision this week" before the status table.
cabinetPath: cabinet-examples/cabinets/campaign-launch
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
