id: quarterly-board-pack
name: Quarterly Board Finance Pack
enabled: true
schedule: 0 9 1 1,4,7,10 *
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 1800
prompt: |-
  Produce the quarterly board finance pack. Two-stage job: Analyst first, Writer second.

  STAGE 1 — Board Finance Analyst:
  1. Pull the quarter's financials from ERP (NetSuite), Stripe, and payroll:
     - ARR: opening ARR, new ARR (new logos + expansion), churned ARR, closing ARR.
     - MRR: same waterfall breakdown. Compute QoQ and YoY growth.
     - Burn: gross burn, net burn (monthly average for the quarter), cash on hand,
       runway = cash / net burn in months.
     - Burn multiple = net burn for the quarter / net new ARR for the quarter.
       Flag if > 1.5x.
  2. Plan vs. actual: for the quarter and YTD. Revenue, opex by category, headcount.
     Flag any line > ±10% variance. Compute revised full-year forecast.
  3. NRR: 12-month rolling. Expansion + renewals / prior period ARR. Flag if < 105%.
  4. Cohort data: last 4 quarterly cohorts. Starting ARR, 3-mo retention, 6-mo
     retention, 12-mo retention (where available). Flag any cohort < 80% at 12mo.
  5. Write all data to `data/metrics-<YYYY-Q#>.md` with explicit formulas for every
     derived metric. This is the Analyst's deliverable.

  STAGE 2 — Board Narrative Writer:
  1. Read `data/metrics-<YYYY-Q#>.md`.
  2. Write the board finance pack to `packet/index.html` (webapp) and archive
     a markdown copy to `packet/archive/<YYYY-Q#>.md`.
  3. Structure: executive summary (3 sentences) → ARR/MRR with commentary →
     burn/runway with commentary → plan vs. actual table → NRR/cohorts →
     key risks (numbered, 3–5 items) → decisions needed.
  4. Lead every section with the trend and the implication, not the number.
  5. End with Decisions Needed — even if the answer is "no action required."

  Rules:
  - Every board number traces to the data file. No unverified metrics.
  - Burn multiple, NRR, and runway are non-negotiable; they must always appear.
  - Publish the webapp by 11:00 on the 1st of the quarter.
cabinetPath: cabinets/board-finance
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
