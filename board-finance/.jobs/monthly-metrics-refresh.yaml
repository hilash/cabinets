id: monthly-metrics-refresh
name: Monthly Metrics Refresh
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 600
prompt: |-
  Run the monthly metrics refresh as the Board Finance Analyst.

  This job runs every month (including non-quarter months) to keep `data/metrics-current.md`
  up to date between board meetings.

  1. Pull the prior month's latest figures from ERP and Stripe:
     - Current MRR (from Stripe): new MRR, churned MRR, net new MRR, closing MRR.
     - ARR = MRR × 12.
     - Cash on hand (from GL balance sheet).
     - Monthly net burn (GL opex - cash inflows for the month).
     - Runway = cash / net burn (months).
     - Headcount (from payroll/HRIS).
  2. Compute QoQ and YoY comparisons using `data/metrics-current.md` (prior state).
  3. Update `data/metrics-current.md` with the new month's values. Format:
     ```
     # Current Metrics — <YYYY-MM>
     MRR: $XXX,XXX (MoM: +X.X%)
     ARR: $X.XXM (YoY: +XX.X%)
     Net New MRR: $XX,XXX
     Churned MRR: $XX,XXX
     Cash on Hand: $X.XXM
     Net Burn: $XXX,XXX/mo
     Runway: XX.X months
     Headcount: XXX
     NRR (trailing 12mo): XXX%
     Last updated: <date>
     ```
  4. If any metric moves > 10% MoM, append a one-line flag to the file explaining
     the driver.

  This file is the Board Writer's reference between quarterly packs.
cabinetPath: cabinets/board-finance
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
