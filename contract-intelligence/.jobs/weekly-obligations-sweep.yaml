id: weekly-obligations-sweep
name: Weekly Obligations & Renewal Sweep
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: contract-analyst
agentSlug: contract-analyst
timeout: 900
prompt: |-
  Run the weekly obligations and renewal sweep across all approved contract summaries
  in `contracts/approved/`. Write the sweep output to `contracts/weekly-sweep.md`
  (overwrite the previous week's file).

  The sweep must surface:

  1. OBLIGATIONS DUE ≤30 DAYS
     For each: contract name, obligation description, due date, responsible owner,
     days remaining, and current status from `contracts/obligations.csv`.
     Sort by days remaining (most urgent first).

  2. AUTO-RENEW WINDOWS OPENING ≤60 DAYS
     For each: contract name, counterparty, renewal date, action-by date (renewal date
     minus notice period), TCV, auto-renew risk flag, and assigned owner.
     Flag any with ≤14 days to action-by as CRITICAL.

  3. CONTRACTS EXPIRING ≤90 DAYS (no auto-renew)
     For each: contract name, counterparty, expiry date, TCV, and owner.

  4. OVERDUE OBLIGATIONS
     Any obligation from `contracts/obligations.csv` with a past due date and status
     not marked Complete. Escalate with a note that human review is required.

  Format the sweep as clean markdown with section headers. Lead with a one-line
  executive summary: how many items require action this week?

  Rules:
  - Use today's date for all date arithmetic (Mon 08:00 when this job runs).
  - Do not modify any contract summary file — read only.
  - If `contracts/approved/` is empty, write a placeholder noting no approved
    contracts are on file and remind the user to run the analyze-contract job.
cabinetPath: cabinets/contract-intelligence
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
