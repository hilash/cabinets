id: analyze-contract
name: Analyze Contract
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: contract-analyst
agentSlug: contract-analyst
timeout: 900
prompt: |-
  Analyze the contract PDF at `contracts/source/{{contract_filename}}` and produce a
  complete structured summary. Write the output to `contracts/{{contract_slug}}.md`.

  The summary must include every section below — mark any field NOT FOUND if it cannot
  be determined from the document:

  PARTIES: Full legal names of all parties plus their role (Customer, Vendor, etc.).
  EFFECTIVE DATE: Contract start date.
  EXPIRY / RENEWAL DATE: Contract end date or next renewal date.
  AUTO-RENEW: Yes / No — if Yes, state the notice period and action-by date.
  CONTRACT VALUE: Total contract value (TCV) or annual value (ACV). Currency.
  GOVERNING LAW: Jurisdiction.
  TERM: Initial term length.

  EXECUTIVE SUMMARY: 3–5 sentences in plain language suitable for a non-lawyer
  business owner. What is the contract for? What are the key commercial terms?
  What are the main risks?

  RISK FLAGS (assess each):
  - Indemnification scope: is it mutual? Is it uncapped? Flag HIGH if uncapped.
  - Liability cap: what is it relative to contract value? Flag HIGH if below 1x ACV.
  - IP assignment: does it assign any IP to the counterparty? Flag any assignment.
  - Data processing: are there DPA obligations with specific deadlines? List them.
  - Termination: is there a termination-for-convenience clause? Notice required?
  - Auto-renew risk: if auto-renew with <60 day notice window, flag MEDIUM or HIGH.

  OBLIGATIONS (list every obligation with a due date or recurrence):
  - Obligation description | Due date / cadence | Responsible party | Status: Open

  TERMINATION CLAUSE: Exact quoted language from the contract.

  After writing the summary, send it to the Obligations QA agent for review before
  publishing to `contracts/approved/{{contract_slug}}.md`.
cabinetPath: cabinets/contract-intelligence
