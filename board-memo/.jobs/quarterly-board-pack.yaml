id: quarterly-board-pack
name: Quarterly Board Pack
enabled: true
schedule: 0 9 1 1,4,7,10 *
provider: claude-code
adapterType: claude_local
ownerAgent: board-writer
agentSlug: board-writer
timeout: 1800
prompt: |-
  Produce the quarterly board pack. This is the full-format artifact for the quarterly board meeting.
  It expands on the monthly update with a deeper retrospective, scenario modeling, and strategic framing.

  Sequence:
  1. Board Analyst: pull fresh metrics, the full P&L summary, and updated burn forecast.
     Produce `metrics/quarterly-YYYY-Q[N].md` with all tables complete and sourced.
  2. Board Writer: produce the quarterly board pack with these sections:
     a. EXECUTIVE SUMMARY — One-page narrative: what we set out to do, what happened, what we learned.
     b. QUARTER IN NUMBERS — Full metrics table: ARR, MRR, NRR, Gross Margin, Burn, Runway, Headcount.
        Prior quarter, this quarter, annual target, variance to target.
     c. PRODUCT — Quarter's shipped roadmap vs plan, GA dates hit/missed, next quarter milestones.
     d. GO-TO-MARKET — Pipeline, win rate, average ACV, sales cycle, top 3 logos closed.
     e. FINANCE — P&L summary, cash balance, burn rate, runway scenarios (base/upside/downside).
     f. HIRING — Headcount plan vs actual, attrition, key opens, and Q+1 hiring plan.
     g. RISKS — All Critical and High risks with full mitigation plans.
     h. COMPETITIVE LANDSCAPE — Tier 1 and Tier 2 competitor moves this quarter.
        Cross-reference competitive-intelligence cabinet for full sourced profiles.
     i. ANNUAL TARGET TRACKING — YTD vs annual targets. Trajectory to hit or miss by year-end.
     j. ASKS — Board-level decisions needed in Q+1. Specific, ownable, time-bound.
  3. Board Reviewer: full review pass. No pack ships without all checklist items passing.

  Write to `board-report/YYYY-Q[N]-board-pack.md` and update `board-report/index.html`.
  Archive to `archive/`.
cabinetPath: cabinets/board-memo
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
