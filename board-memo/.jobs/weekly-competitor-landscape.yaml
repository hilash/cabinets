id: weekly-competitor-landscape
name: Weekly Competitor Landscape Refresh
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: board-analyst
agentSlug: board-analyst
timeout: 900
prompt: |-
  Refresh the competitive landscape section for the board memo. This feeds directly into the
  "Competitive Landscape" section of the monthly and quarterly board updates.

  Pull competitor signals from the `competitive-intelligence` cabinet's signals and profiles.
  Focus on signals that a board director would ask about:
  - Funding rounds or M&A
  - Major pricing moves (>10% change)
  - Enterprise feature launches that close our differentiation
  - Key executive hires (CEO, CRO, CPO level)
  - Win/loss pattern changes in CRM that signal competitive dynamics shifting

  For each material signal:
  1. What happened (1–2 sentences, sourced with a reference to competitive-intelligence/signals/)
  2. Market implication (1 sentence for the board — not for sales or product)
  3. Company implication (1 sentence: does this change our strategy, pricing, or positioning?)

  Write to `competitive/latest.md`, overwriting the prior week.
  Append a dated entry to `competitive/history.md`.

  Maximum 5 signals. If nothing material, write "No material competitive moves this week."
cabinetPath: cabinets/board-memo
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
