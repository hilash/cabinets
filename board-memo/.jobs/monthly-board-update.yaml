id: monthly-board-update
name: Monthly Board Update
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: board-writer
agentSlug: board-writer
timeout: 1200
prompt: |-
  Produce this month's board update. This is the primary monthly artifact for the board of directors.

  Sequence:
  1. Board Analyst: confirm `metrics/latest.md` is current (updated within last 3 business days).
     If stale, refresh metrics from connected sources before proceeding.
  2. Board Writer: write the monthly board update with these sections IN ORDER:
     a. HEADLINES — 3 bullet points: the 3 most important things the board needs to know.
     b. REVENUE — ARR, MRR growth, NRR, gross margin, pipeline coverage, vs plan and vs prior month.
     c. PRODUCT — Milestone status, shipped features, upcoming GA dates, key engineering risks.
     d. HIRING — Headcount actual vs plan, open critical roles, time-to-fill trend.
     e. RISKS — Every Critical and High risk from ceo-operating/risks/register.md. Severity, owner, mitigation.
     f. COMPETITIVE LANDSCAPE — 3–5 signals from `competitive/latest.md`. So what for the board.
     g. ASKS — Specific, ownable, time-bound asks for the board (approvals, introductions, decisions).
  3. Board Reviewer: review draft against checklist (metrics sourced, risks complete, asks specific,
     competitive current). Return blockers to Board Writer. Approve when all checks pass.

  Write to `board-report/YYYY-MM-board-update.md` and update `board-report/index.html`.
  Archive previous version to `archive/`.

  Rules:
  - Lead every section with the headline. Data supports the lede, not the other way around.
  - Every number has a source tag. No source, no number.
  - Asks: must be specific (named decision), ownable (named person), time-bound (date).
  - No memo ships without Reviewer approval.
cabinetPath: cabinets/board-memo
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
