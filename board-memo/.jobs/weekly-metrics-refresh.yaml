id: weekly-metrics-refresh
name: Weekly Metrics Refresh
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: board-analyst
agentSlug: board-analyst
timeout: 600
prompt: |-
  Refresh the board metrics table. This runs every Monday so `metrics/latest.md` is always
  current when a board memo is due.

  Pull (from connected sources or the most recent available data):
  - ARR (current, vs prior month, vs annual target)
  - MRR growth rate (%, trailing 3-month average)
  - Net Revenue Retention (trailing 12 months)
  - Gross Margin (%, trailing 3 months)
  - Monthly Burn (actual vs budget)
  - Cash balance and Runway (months at current burn)
  - Pipeline (qualified, weighted, coverage ratio vs Q target)
  - Headcount (actual vs plan, open reqs by department)

  For each metric: record the current value, the prior period value, the delta, the source system,
  and the pull date. If a metric cannot be pulled, mark as Pending with a reason.

  Flag any metric with a >10% week-over-week swing with a one-line analyst note.

  Overwrite `metrics/latest.md`. Append a dated snapshot to `metrics/history.md`.
cabinetPath: cabinets/board-memo
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
