id: weekly-health-refresh
name: Weekly Health Refresh
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: csm-lead
agentSlug: csm-lead
timeout: 900
prompt: |-
  Run the weekly customer health refresh across the full portfolio.

  Step 1 — Analyst data pull (delegate):
  Ask the Health Analyst to update all four sub-scores (Usage, Support, Engagement,
  Adoption) for every account in `accounts/index.md`. Sub-scores must be written
  to `accounts/<account>/` before step 2.

  Step 2 — Score reconciliation:
  Compute the composite health score for each account (weighted: Usage 35%,
  Support 25%, Engagement 25%, Adoption 15%). Assign risk tier:
  - Healthy: ≥ 70
  - Watch: 45–69
  - At-Risk: ≤ 44

  Step 3 — Update portfolio index:
  Overwrite `accounts/index.md` with the current portfolio table:
  account name, ARR, health score, risk tier, usage trend (↑/→/↓),
  open tickets, renewal date, CSM owner, last touch.

  Step 4 — Refresh dashboard:
  Update the ACCOUNTS array in `dashboard/index.html` to match the latest
  portfolio data. Update the four KPI values (portfolio health avg, at-risk count,
  at-risk ARR $, accounts renewed YTD).

  Step 5 — Renewal risk brief:
  Write `accounts/renewal-risk.md` — ranked list of accounts renewing in
  90/60/30 days with risk level, top blocking issue, and action owner.

  Rules:
  - Every score change must reference its source sub-score.
  - Do not override an Analyst sub-score without flagging the disagreement in the account file.
  - If an account's Analyst data is missing, score it N/A and note the gap.
cabinetPath: cabinet-examples/cabinets/customer-health
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
