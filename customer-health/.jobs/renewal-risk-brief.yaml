id: renewal-risk-brief
name: Renewal Risk Brief
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: csm-lead
agentSlug: csm-lead
timeout: 600
prompt: |-
  Produce the weekly renewal risk brief for the VP CS and CS team.

  Pull the current account portfolio from `accounts/index.md` and filter to accounts
  renewing within 90 days. Rank by urgency (days to renewal × risk tier weight).

  For each account in the 90-day window:
  - Account name, ARR, renewal date, days remaining
  - Risk tier (Healthy / Watch / At-Risk) with health score
  - Top 1–2 blocking issues (sourced from sub-score files)
  - Expansion potential (upsell flags from account notes)
  - Action owner and next step

  Group into three sections: 30-day (critical), 60-day (action required), 90-day (plan now).

  Write the brief to `accounts/renewal-risk.md`, overwriting the prior week.

  Include a summary header: total ARR at risk (Watch + At-Risk accounts in 90 days),
  number of accounts, and the single highest-urgency account with recommended escalation.

  Rules:
  - At-Risk accounts within 30 days must have an escalation plan, not just "CSM to engage."
  - Every blocking issue references its source file (e.g., `accounts/atlas-logistics/support.md`).
  - If a Healthy account has < 60 days to renewal, include it as "monitor."
cabinetPath: cabinet-examples/cabinets/customer-health
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
