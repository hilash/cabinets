id: competitor-watch-cs
name: CS Competitor Watch — Switching Risk
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: csm-lead
agentSlug: csm-lead
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut focused on switching risk inside the
  existing customer base.

  Scan the following sources for competitor mentions in the last 7 days:
  - Account notes in `accounts/*/health.md` (look for competitor name drops)
  - Support ticket themes in `accounts/*/support.md` (feature parity complaints)
  - Renewal objection history in `accounts/renewal-risk.md`

  For each competitor mention: account name, competitor named, context (pricing, feature gap,
  switching intent), renewal urgency, and recommended CSM action.

  Also pull the top 3 competitor moves from the company Competitive Intelligence cabinet
  at `../competitive-intelligence/` and assess their impact on renewal conversations:
  which accounts are most exposed, and what the counter-narrative should be.

  Write the full analysis to `competitor-watch/latest.md`.
  Surface the top 3 switching-risk accounts in the summary section.
  Lead with "so what for retention" — not what competitors did, but what it means for
  our at-risk renewals.

  Cross-reference: [[../competitive-intelligence]] for the full landscape.
cabinetPath: cabinet-examples/cabinets/customer-health
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
