id: at-risk-alerting
name: At-Risk Account Alerting
enabled: true
schedule: 0 7 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: csm-lead
agentSlug: csm-lead
timeout: 600
prompt: |-
  Run the daily at-risk alerting sweep across the account portfolio.

  Check `accounts/index.md` for any account meeting any of these trigger conditions:
  - Composite health score ≤ 44 (At-Risk tier)
  - Weekly active users dropped > 25% vs prior week (per latest Analyst usage data)
  - Open P1 or P2 Zendesk ticket unresolved > 48 hours
  - Renewal date within 30 days AND risk tier is Watch or worse
  - Executive sponsor has not been touched in > 45 days AND renewal within 60 days

  For each triggered account, write an alert entry to `alerts/<YYYY-MM-DD>-at-risk.md`:
  - Account name, ARR, renewal date, CSM owner
  - Trigger condition(s) fired
  - Root-cause hypothesis (1–2 sentences, based on sub-score data)
  - Three specific actions with owner and due date

  If no accounts trigger: write `alerts/<YYYY-MM-DD>-clear.md` confirming the sweep ran clean.

  Rules:
  - Alerts are NOT a report — every item must have an action, an owner, and a date.
  - Renewal proximity doubles urgency: a 30-day renewal at Watch = treat as At-Risk.
  - Do not re-alert accounts already in the open alert log unless their condition worsened.
cabinetPath: cabinet-examples/cabinets/customer-health
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
