id: weekly-experiment-review
name: Weekly Experiment Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: growth-analyst
agentSlug: growth-analyst
timeout: 900
prompt: |-
  Produce the weekly experiment review. Two-stage job:

  STAGE 1 — Growth Analyst reviews all experiments in /experiments/ with status: running
  that have reached their pre-specified end date:
  - Pull latest metric data from the connected analytics platform
  - For each completed experiment, produce the full analysis:
    · Primary metrics: observed value per variant (control + treatment), lift %, p-value,
      95% confidence interval [lower, upper]
    · Guardrail metrics: check for adverse moves at p<0.05
    · Sample size achieved vs. pre-specified N; flag if underpowered
    · Segment breakdown if pre-specified in the experiment brief
  - Write the readout section of the experiment file at /experiments/<slug>.md
  - Update experiment status to: complete-awaiting-decision

  For experiments with status: running that have NOT reached end date:
  - Report days remaining and current trend (do NOT analyze for significance — no peeking)

  STAGE 2 — Product Scientist reviews each readout and produces decisions:
  - For each experiment with status: complete-awaiting-decision:
    · Make the ship/kill/iterate decision with documented reasoning
    · Extract 1–3 learnings and append to /learnings/learnings.md
    · Update the experiment status to: shipped / killed / iterating
    · Add the experiment to the master log at /experiments/log.md
  - Check /experiments/log.md for any new proposed experiments that overlap with prior tests

  Write the weekly review summary to /reports/review-<YYYY-WW>.md:
  - Experiments decided this week (with decisions)
  - Experiments still running (days remaining)
  - New learnings added to library
cabinetPath: cabinets/experiment-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
