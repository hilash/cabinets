id: per-experiment-readout
name: Per-Experiment Readout
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: growth-analyst
agentSlug: growth-analyst
timeout: 1200
prompt: |-
  Produce a complete experiment readout for a single named experiment. This is an on-demand
  job triggered when a specific experiment needs urgent review outside the weekly cadence.

  INPUT: The experiment slug must be provided as input. The experiment file must already exist
  at /experiments/<slug>.md with a completed experiment brief (hypothesis, variants, metrics,
  end date, sample size target) and status: complete or status: running-past-end-date.

  STAGE 1 — Growth Analyst produces the full readout:
  - Pull all pre-specified metrics from the analytics platform for the experiment's date range
  - Primary metrics: control vs. treatment values, N per variant, lift %, two-tailed p-value,
    95% CI lower and upper bounds
  - Guardrail metrics: full check for adverse movements
  - Sample size: achieved vs. target; MDE calculation if underpowered
  - Segment breakdown: by user tenure (<30d / 30–90d / 90d+), by plan tier, or as specified
  - Write the readout to /experiments/<slug>.md, status → complete-awaiting-decision

  STAGE 2 — Product Scientist produces the decision:
  - Review the readout and make the ship/kill/iterate decision
  - Document reasoning (minimum 3 sentences: what the data says, what the business implications
    are, and why the decision is correct given both)
  - Extract learnings and append to /learnings/learnings.md
  - Update the master log at /experiments/log.md
  - If decision is Iterate: write the next experiment hypothesis in the file

  Output: Updated /experiments/<slug>.md (decision section completed) + /experiments/log.md updated.
cabinetPath: cabinets/experiment-review
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
