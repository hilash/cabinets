id: monthly-renewal-forecast
name: Monthly Renewal Forecast
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: renewal-workflow
agentSlug: renewal-workflow
timeout: 900
prompt: |-
  Produce the monthly renewal forecast from `renewals/register.csv` and all renewal
  records in `renewals/`. Write the forecast to `renewals/monthly-forecast.md`
  (overwrite previous month's file).

  The forecast must contain:

  1. EXECUTIVE SUMMARY
     One paragraph: how many contracts renew in the next 90 days? What is the total
     TCV at risk? How many are auto-renew risks? What is the recommended priority
     action for the legal/procurement calendar this month?

  2. RENEWAL CALENDAR (next 90 days)
     A table sorted by action-by date: contract name | counterparty | renewal date |
     action-by date | TCV | auto-renew | price-change | owner | status.
     Color-code by urgency band: Critical (≤14d), Active (15–30d), Upcoming (31–60d),
     Pipeline (61–90d).

  3. FINANCIAL EXPOSURE
     Total TCV renewing in the next 90 days. Broken down by: confirmed renewal,
     in-renegotiation, at-risk (no owner decision), auto-renew. ARR impact if
     auto-renew contracts renew at price-escalation rates.

  4. AUTO-RENEW RISK REGISTER
     All auto-renew contracts in the notice window without a confirmed disposition.
     For each: days to auto-renew lock-in, TCV, recommended action, and owner
     assigned.

  5. COMPLETED RENEWALS (last 30 days)
     Contracts renewed or terminated last month: outcome, TCV, any pricing changes,
     cycle time from first flag to disposition.

  6. FORECAST ASSUMPTIONS
     List any contracts where renewal date or notice period could not be confirmed
     from the source document and require manual verification.

  Keep the forecast to 3 pages or less. Every number is sourced from
  `renewals/register.csv` — do not estimate TCV values.
cabinetPath: cabinets/contract-renewal
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
