id: weekly-renewal-sweep
name: Weekly Renewal & Notice Sweep
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: renewal-workflow
agentSlug: renewal-workflow
timeout: 900
prompt: |-
  Run the weekly renewal and notice-window sweep across all contracts in
  `renewals/register.csv`. Update notice-window statuses and write the sweep
  output to `renewals/weekly-sweep.md` (overwrite previous week's file).

  The sweep must surface:

  1. CRITICAL — ACTION DUE ≤14 DAYS
     Contracts where the action-by date (renewal date minus notice period) is within
     14 calendar days. For each: contract name, counterparty, renewal date, notice
     period, action-by date (BOLD), TCV, auto-renew flag, owner, last action logged.
     These require immediate escalation.

  2. NOTICE WINDOW OPEN — ACTION DUE ≤60 DAYS
     Contracts entering or within the notice window. For each: contract name,
     counterparty, renewal date, action-by date, days remaining to action, TCV,
     auto-renew risk (yes/no), price-change clause (yes/no), owner, status.
     Sort by days-remaining ascending.

  3. AUTO-RENEW RISKS
     Any contract with auto-renew=yes that is in the notice window without a confirmed
     owner action. Flag as auto-renew risk and state the recommended disposition:
     Terminate | Renegotiate | Confirm Renewal.

  4. UPCOMING RENEWALS — 61–90 DAYS
     Early warning list. For each: contract name, counterparty, renewal date,
     action-by date, TCV. Owner to review and log initial disposition.

  5. PRICE-CHANGE FLAGS
     Any contract in the 90-day window with a price-escalation clause. Calculate
     the projected renewal value and the delta from current spend.

  For each contract entering the notice window for the first time this week:
  create an individual renewal record at `renewals/<contract-slug>-renewal.md`
  and route it to the Renewal Compliance Reviewer.

  Update `renewals/register.csv` with current notice-window statuses.
  Lead the sweep output with a one-line executive summary.
cabinetPath: cabinets/contract-renewal
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
