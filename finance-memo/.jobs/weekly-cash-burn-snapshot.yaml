id: weekly-cash-burn-snapshot
name: Weekly Cash & Burn Snapshot
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 300
prompt: |-
  Produce this week's cash and burn snapshot. Run as the Finance Analyst.

  1. Pull the current cash balance from the GL (NetSuite/QuickBooks balance sheet).
  2. Compute this week's card spend from the Ramp/Brex export (or last available
     weekly AP run). Annualize to a monthly burn rate: weekly_spend × 4.33.
  3. Compute runway: cash_on_hand / monthly_burn_rate = runway_months.
  4. Compare to last week's snapshot at `.cabinet-state/burn-snapshot.md`:
     - Cash delta (inflows - outflows)
     - Burn rate change vs. last week (if > ±$20k, note the driver)
  5. Write the updated snapshot to `.cabinet-state/burn-snapshot.md`. Format:
     ```
     # Cash & Burn Snapshot — <date>
     Cash on hand: $X,XXX,XXX
     Monthly burn rate: $XXX,XXX
     Runway: XX.X months
     WoW cash delta: +/-$XX,XXX
     WoW burn change: +/-$XX,XXX (<driver if notable>)
     As of: <GL export timestamp>
     ```

  Keep it to one page. This is a flash, not a memo.
cabinetPath: cabinets/finance-memo
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
