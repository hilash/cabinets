id: handoff-packet
name: Handoff Packet
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: customer-agent
agentSlug: customer-agent
timeout: 1200
prompt: |-
  Generate a complete handoff packet for a newly closed-won deal.
  The account name and Salesforce opportunity ID are specified in
  `/handoffs/.active-handoff.md`.

  Step 1 — Customer Agent: Gather deal intelligence
  Read all available sources for this deal:
  - Salesforce opportunity record: contacts, ARR, close date, deal notes, competitor field,
    deal type, contract term, implementation scope.
  - Gong call transcripts for the last 6 months: extract key moments, commitments made
    by the rep, buyer objections and how they were resolved, stakeholder statements, and
    any red flags (budget sensitivity, skeptical stakeholders, deferred requirements).
  - Last 30 days of email thread: surface any email commitments, introduction of new
    stakeholders, or unresolved questions.

  Write the structured deal intelligence to `/handoffs/<account>/deal-intel.md`.
  Include verbatim quotes for every commitment and every risk flag.

  Step 2 — Trigger Summary Agent
  Once deal-intel.md is complete, trigger the Summary Agent to produce the handoff packet
  at `/handoffs/<account>/packet.md`.

  The packet must include:
  1. Executive Summary (3 sentences: account, ARR, what they bought, top risk)
  2. Deal Summary (opportunity ID, close date, contract term, ARR, deal type)
  3. Stakeholder Grid (name, title, deal role, sentiment, last quote)
  4. What We Sold (outcomes promised + proof points used to close)
  5. What We Committed (specific feature, timeline, or service commitments — with verbatim quotes)
  6. Known Risks for CS (budget sensitivity, skeptical stakeholder, integration dependency, open item)
  7. Success Criteria (2–3 measurable outcomes in customer language)
  8. Go-Live Timeline (90-day timeline from close date to go-live)

  Flag if the go-live timeline is less than 45 days — mark as URGENT for CS leadership.
