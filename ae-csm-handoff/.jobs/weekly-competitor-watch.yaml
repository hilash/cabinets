id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: customer-agent
agentSlug: customer-agent
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut for recently closed and in-flight deals.

  Pull competitor signals from the past 7 days relevant to accounts that have closed
  in the last 30 days or are in the handoff pipeline. Focus on:
  1. Any competitor moves (pricing, product, positioning) that could trigger a re-evaluation
     by a newly onboarded customer — especially in the first 90-day window where churn risk
     is highest and competitor outreach is most common.
  2. For each closed-won account where a competitor was in the evaluation, check if that
     competitor has made a significant move since close (e.g., a pricing cut, a new feature,
     a customer story in the same vertical). Flag for the CSM to address proactively.
  3. Surface win/loss patterns from the last 7 days: if we lost 2+ deals to the same
     competitor this week, flag for the AE and CS teams — recently-closed customers in
     similar segments may receive that competitor's outreach.

  Cross-reference the full competitive landscape from `../competitive-intelligence`.

  Write findings to `/competitor-watch/weekly-<date>.md`.
  Update `/competitor-watch/latest.md` with the top 3 signals.
  Lead each finding with "so what for our recently closed accounts."
cabinetPath: cabinets/ae-csm-handoff
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
