id: weekly-handoff-qa
name: Weekly Handoff QA
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: summary-agent
agentSlug: summary-agent
timeout: 600
prompt: |-
  Run a quality assurance sweep of all handoff packets created in the last 30 days.
  Read all packet files in `/handoffs/` where the created date is within 30 days.

  For each packet at `/handoffs/<account>/packet.md`, check:
  1. **Completeness** — are all 8 required sections present and populated? Flag any
     empty or placeholder sections.
  2. **Success Criteria** — are the success criteria measurable and in customer language?
     Flag generic criteria like "improve efficiency" without a metric.
  3. **Commitments** — does the Commitments section include verbatim quotes from Gong
     or email? Flag any commitment that isn't sourced.
  4. **Risk Flags** — are Known Risks populated? Flag any packet where this section
     is empty — it is almost never accurate that there are zero risks.
  5. **Go-Live Timeline** — is the timeline realistic? Flag any go-live under 30 days
     from close date as potentially unrealistic.
  6. **Staleness** — flag any packet where the deal closed more than 14 days ago but
     the packet hasn't been reviewed by a CSM (check for a `csm-reviewed` marker).

  Write the QA report to `/handoffs/qa-report.md` with:
  - Summary: packets reviewed, # PASS, # FAIL, # flagged for follow-up
  - Per-packet findings: account, created date, QA result, specific gaps
  - Recommended actions for the CS lead
cabinetPath: cabinets/ae-csm-handoff
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
