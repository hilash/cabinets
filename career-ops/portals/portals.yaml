# Career Ops Portal Configuration
# Scanner agent uses this to discover new opportunities daily.
# Adapted from santifer/career-ops (45+ companies, 19 search queries)

# Portal types: greenhouse, ashby, lever, wellfound, career_page
# Status: active (scan daily), watch (scan weekly), paused (skip)
# SCANNER NOTE (2026-04-12): Greenhouse boards have migrated from boards.greenhouse.io
# to job-boards.greenhouse.io. JSON API still works at boards-api.greenhouse.io/v1/boards/<slug>.
# Ashby boards require JavaScript — static fetch returns only the loading shell.
# Lever boards returning 403 on direct access — use company careers page as fallback.

