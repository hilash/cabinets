id: monthly-asset-audit
name: Monthly Asset Audit
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: asset-workflow
agentSlug: asset-workflow
timeout: 900
prompt: |-
  Produce the monthly asset and vendor audit report for the month just closed.

  Read all asset records (`assets/hardware.yaml`, `assets/software.yaml`,
  `assets/vendors.yaml`) and all weekly reconciliation reports from the
  past month in `reports/`.

  PRODUCE THE FOLLOWING SECTIONS in `reports/audit-<YYYY-MM>.md`:

  1. PORTFOLIO SNAPSHOT
     - Total asset count by category (hardware devices, SaaS licences, vendor contracts)
     - Total annual contracted spend by category and by department
     - Cost per head (total spend / headcount from `sources/okta-users.yaml`)
     - Month-over-month spend change

  2. COMPLIANCE STATUS
     - For each software vendor: SOC 2 / ISO 27001 cert status (current/expired/missing)
     - DPAs in place for vendors processing personal data (yes/no)
     - Vendors on the approved list vs. shadow/unapproved tools discovered this month

  3. DISCREPANCY RESOLUTION
     - From this month's reconciliation reports: how many discrepancies were flagged?
     - How many resolved vs. still open? List all open discrepancies with owner and age.

  4. RENEWALS AT RISK (next 60 days)
     - Name, renewal date, current annual cost, auto-renew status, owner.
     - Flag any where auto-renew = true and no renewal decision has been logged.

  5. ORPHANED ASSETS
     - Licences still active for departed users (HRIS termination date vs. Okta state).
     - Devices not returned within 14 days of termination.
     - Estimated annual cost of orphaned licences.

  6. RECOMMENDATIONS
     - Up to 6 concrete actions for the ops/IT team this month.
     - Which tools are candidates for consolidation or cancellation?

  Write the full report to `reports/audit-<YYYY-MM>.md`.
  Update `assets/vendors.yaml` to mark any expired certs or lapsed renewals.
cabinetPath: cabinets/vendor-asset
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
