id: competitor-watch-renewals
name: Renewal Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: renewal-csm
agentSlug: renewal-csm
timeout: 900
prompt: |-
  Produce the weekly competitor watch focused on renewal accounts.

  Pull all accounts in `renewals/index.md`. For each account:
  - Check `renewals/<account>-renewal.md` for any competitor mentions in prior plans
  - Check `renewals/<account>-data.md` for competitor-related support tickets or objections

  Cross-reference competitor signals from [[../competitive-intelligence]] for:
  - Pricing moves that directly affect this account's renewal negotiation
  - Feature gaps a competitor could exploit at renewal time
  - Win/loss patterns in accounts of similar size/industry

  For each renewal account with competitor exposure:
  - Name the competitor and the specific risk (pricing, feature, switching intent)
  - Write a 2-sentence counter-narrative for the renewal conversation
  - Rate switching risk: Low / Medium / High

  Write the full output to `renewals/competitor-watch.md`.
  Lead with "what changes in the renewal conversation" — not what competitors did.

  Highlight the top 3 at-risk renewal accounts by competitor switching risk.
cabinetPath: cabinet-examples/cabinets/renewal-risk
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
