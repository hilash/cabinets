id: weekly-renewal-sweep
name: Weekly Renewal Risk Sweep
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: renewal-csm
agentSlug: renewal-csm
timeout: 900
prompt: |-
  Run the weekly renewal risk sweep across all accounts in the 90-day window.

  Step 1 — Workflow data pull (delegate):
  Ask the Renewal Workflow agent to pull and consolidate renewal data (CRM, contracts,
  support, usage) for all accounts listed in `renewals/index.md`.
  Data must be in `renewals/<account>-data.md` before step 2.

  Step 2 — Risk assessment:
  For each account in `renewals/index.md`, assess renewal risk (Low / Medium / High / Critical)
  based on: health score trend, stakeholder engagement recency, open blocking issues,
  and days to renewal. Apply the 30-day urgency multiplier.

  Step 3 — Action plans:
  For every account at High or Critical risk:
  - Identify the top 1–2 blocking issues with resolution owner and date
  - Write a 3-step action plan to `renewals/<account>-renewal.md`
  - Flag accounts where the contract notice period has passed or is < 7 days away

  Step 4 — Expansion opportunities:
  For accounts with Low or Medium risk and seat utilization < 70% or unadopted modules,
  add a 2-sentence expansion narrative to the renewal document.

  Step 5 — Refresh board:
  Update the RENEWALS array in `board/index.html` with:
  - Current risk level, days to renewal, ARR, expansion potential, action owner

  Step 6 — Update action-item tracker (delegate to Workflow):
  Ask the Renewal Workflow agent to update `renewals/action-items.md`
  with all new and existing open action items.

  Rules:
  - Every blocking issue has exactly one owner and one due date.
  - Critical + < 30 days = escalate to VP CS in `renewals/escalations/`.
  - Never leave a renewal account's action plan empty.
cabinetPath: cabinet-examples/cabinets/renewal-risk
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
