  - id: faq-009
    question: "How do I add someone to our Slack workspace?"
    answer: "Only Slack admins can invite new members. Submit a request in #it-help with the person's name, email, and role. Standard users are invited within 1 business day. Contractors get access to specific channels only — specify which channels in your request."
    category: IT
    source: confluence/IT/slack-admin-guide
    last_verified: "2026-05-10"
    views_30d: 29
    status: valid

  - id: faq-010
    question: "What is covered under the health insurance plan?"
    answer: "The company provides comprehensive health coverage via Aetna (PPO and HMO options). Coverage includes medical, dental, and vision. Premiums: employees pay 15% of individual premium, 30% for family coverage. Open enrollment is in November for the following calendar year. See the benefits portal at benefits.acmecorp.com for full plan details."
    category: HR
    source: drive/HR/benefits-guide-2026.pdf
    last_verified: "2026-01-20"
    views_30d: 67
    status: needs-review
    review_note: "Verify premium percentages against current plan documents. Benefits guide is from Jan 2026 — may be stale by Q3."
