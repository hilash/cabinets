faq_entries:
  - id: faq-001
    question: "How many days of PTO do I get per year?"
    answer: "Full-time employees accrue 20 days of PTO per year (prorated in the first year). PTO rolls over up to 5 days. There is no cash-out option. PTO requests must be submitted at least 5 business days in advance in Workday."
    category: HR
    source: drive/HR/employee-handbook-v4.2.pdf#pto
    last_verified: "2026-05-12"
    views_30d: 87
    status: valid

  - id: faq-002
    question: "How do I submit an expense report?"
    answer: "Submit all expense reports in Concur within 30 days of the expense. Attach receipts for any amount over $25. Expenses over $500 require manager pre-approval before purchase. Reimbursement is processed in the first payroll cycle after approval."
    category: Finance
    source: drive/Finance/expense-policy-2026.pdf#submission
    last_verified: "2026-05-12"
    views_30d: 64
    status: valid

  - id: faq-003
    question: "How do I reset my Okta password?"
    answer: "Go to acmecorp.okta.com and click 'Forgot Password.' You will receive a reset link via your work email. If you are locked out and cannot access your email, contact IT Support at it-support@acmecorp.com or Slack #it-help. Account lockouts reset after 30 minutes."
    category: IT
    source: confluence/IT/okta-user-guide
    last_verified: "2026-05-01"
    views_30d: 143
    status: valid

  - id: faq-004
    question: "What is the maximum I can spend on a work meal without pre-approval?"
    answer: "Individual meals are reimbursed up to $50 without pre-approval. Team meals or client entertainment are reimbursed up to $75 per person with manager approval. Always keep itemised receipts."
    category: Finance
    source: drive/Finance/expense-policy-2026.pdf#meals
    last_verified: "2026-05-12"
    views_30d: 52
    status: valid

  - id: faq-005
    question: "How do I set up MFA for my work accounts?"
    answer: "MFA is enforced via Okta Verify. Download the Okta Verify app on your mobile device, then go to your Okta dashboard → Security → Set up Multifactor. Follow the on-screen prompts. Hardware keys (YubiKey) are available from IT for roles with elevated access."
    category: IT
    source: confluence/Security/access-control-policy#mfa
    last_verified: "2026-04-15"
    views_30d: 98
    status: needs-update
    review_note: "Source doc may be outdated (last updated Sep 2025, Okta migration was Nov 2025). Re-verify the MFA setup steps against current Okta configuration."

  - id: faq-006
    question: "Can I work remotely from a different country?"
    answer: "Remote work from abroad is permitted for up to 14 consecutive calendar days per year without HR approval. Stays longer than 14 days require a work-abroad request submitted to people@acmecorp.com at least 21 days in advance. Tax and legal implications vary by country."
    category: HR
    source: drive/HR/remote-work-policy.pdf#abroad
    last_verified: "2026-02-10"
    views_30d: 41
    status: needs-update
    review_note: "Source doc last updated Aug 2025 (285 days ago). Remote work policy may have changed. Re-verify before trusting this answer."

  - id: faq-007
    question: "How do I request access to a new system or tool?"
    answer: "Submit an access request via the IT Service Desk at help.acmecorp.com. Select 'New Access Request' and specify the tool and business justification. Manager approval is required for all requests. SLA: 3 business days for standard tools, up to 10 days for tools requiring security review."
    category: IT
    source: confluence/IT/access-request-process
    last_verified: "2026-05-08"
    views_30d: 76
    status: valid

