id: top-questions-digest
name: Top Questions Digest
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: qa-agent
agentSlug: qa-agent
timeout: 600
prompt: |-
  Produce the weekly top-questions digest for the Internal FAQ cabinet.

  1. Read `questions/log.md` — all questions employees asked this week via the hub, Slack, or #ask-hr.
  2. Deduplicate and group semantically similar questions (e.g., "how do I reset my password" and
     "forgot password, who do I contact" are the same question).
  3. Tally frequency per unique question. Assign category: HR / IT / Finance / Product / Security / Other.
  4. For each question, check `faq/entries.yaml` for an existing answer:
     - answered: entry exists, answer is current
     - needs-update: entry exists but flagged as stale or needs-review
     - unanswered: no matching entry
  5. Compare with last week's digest (read `questions/digest-*.md` for the most recent):
     compute week-over-week trend: new / up / down / unchanged for top questions.
  6. Write the digest to `questions/digest-<YYYY-MM-DD>.md`:
     - Header: week, total questions received, % answered, % unanswered
     - Top 10 questions table: rank | question | category | frequency | status | WoW trend
     - Category breakdown: category | question count | % answered
     - New this week: questions appearing for the first time with 2+ asks
     - Recommended actions: top 3 new FAQ entries that would close the most gaps
  7. Update `faq/entries.yaml` view counts for all answered questions that appeared this week.

  Rules: Frequency is the tiebreaker. Unanswered high-frequency questions come first.
  Do not fabricate answers — status is answered only if a valid entry exists in faq/entries.yaml.
cabinetPath: cabinets/internal-faq
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
