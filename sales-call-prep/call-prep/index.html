<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Call Prep Brief · May 23 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --background:#ffffff; --foreground:#09090b; --card:#ffffff; --card-foreground:#09090b;
    --muted:#f4f4f5; --muted-foreground:#71717a; --primary:#18181b; --primary-foreground:#fafafa;
    --secondary:#f4f4f5; --secondary-foreground:#18181b; --border:#e4e4e7; --input:#e4e4e7; --ring:#a1a1aa;
    --good:#16a34a; --good-bg:#f0fdf4; --good-bd:#bbf7d0; --warn:#d97706; --warn-bg:#fffbeb; --warn-bd:#fde68a;
    --bad:#dc2626; --bad-bg:#fef2f2; --bad-bd:#fecaca; --info:#2563eb; --info-bg:#eff6ff; --info-bd:#bfdbfe;
    --c1:#2563eb; --c2:#16a34a; --c3:#d97706; --c4:#dc2626; --c5:#7c3aed; --c6:#0891b2;
    --radius:0.65rem; --shadow-sm:0 1px 2px 0 rgb(0 0 0/.05);
    --shadow:0 1px 3px 0 rgb(0 0 0/.08),0 1px 2px -1px rgb(0 0 0/.08);
    --sans:'Inter',system-ui,-apple-system,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  @media(prefers-color-scheme:dark){:root{
    --background:#09090b; --foreground:#fafafa; --card:#101012; --card-foreground:#fafafa;
    --muted:#1c1c1f; --muted-foreground:#a1a1aa; --primary:#fafafa; --primary-foreground:#18181b;
    --secondary:#1c1c1f; --secondary-foreground:#fafafa; --border:#27272a; --input:#27272a; --ring:#52525b;
    --good:#4ade80; --good-bg:#0c2417; --good-bd:#14532d; --warn:#fbbf24; --warn-bg:#2a1f06; --warn-bd:#78350f;
    --bad:#f87171; --bad-bg:#2a1012; --bad-bd:#7f1d1d; --info:#60a5fa; --info-bg:#0c1d33; --info-bd:#1e3a8a;
    --c1:#60a5fa; --c2:#4ade80; --c3:#fbbf24; --c4:#f87171; --c5:#a78bfa; --c6:#22d3ee;
    --shadow-sm:0 1px 2px 0 rgb(0 0 0/.4); --shadow:0 1px 3px 0 rgb(0 0 0/.5); --shadow-md:0 4px 12px -2px rgb(0 0 0/.6);
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--background);color:var(--foreground);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums} a,button{font-family:inherit;color:inherit;cursor:pointer;text-decoration:none;border:none;background:none}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px 64px}
  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--background) 82%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);margin:0 -24px 24px;padding:0 24px}
  .topbar-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600}
  .brand .logo{width:28px;height:28px;border-radius:7px;background:var(--primary);color:var(--primary-foreground);display:grid;place-items:center;font-size:13px;font-weight:700}
  .brand .sub{color:var(--muted-foreground);font-weight:400;font-size:12.5px;border-left:1px solid var(--border);padding-left:10px;margin-left:2px}
  .sync{font-family:var(--mono);font-size:11px;color:var(--muted-foreground);display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-bg)}

  /* call selector */
  .call-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .call-tab{padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--card)}
  .call-tab:hover{border-color:var(--ring)}
  .call-tab.active{border-color:var(--primary);background:var(--primary);color:var(--primary-foreground)}
  .call-tab .ct{font-weight:600;font-size:13px} .call-tab .cs{font-size:11px;opacity:.7;margin-top:2px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .card-h{padding:16px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .card-h .t{font-size:13px;font-weight:600} .card-h .d{font-size:12px;color:var(--muted-foreground);margin-top:2px}
  .card-b{padding:14px 18px 18px}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:100px;border:1px solid var(--border);background:var(--muted);color:var(--muted-foreground);white-space:nowrap}
  .badge.good{background:var(--good-bg);border-color:var(--good-bd);color:var(--good)}
  .badge.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
  .badge.bad{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad)}
  .badge.info{background:var(--info-bg);border-color:var(--info-bd);color:var(--info)}
  .badge.solid{background:var(--primary);color:var(--primary-foreground);border-color:var(--primary)}

  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr} .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:880px){.g2,.g3{grid-template-columns:1fr}}

  /* attendees */
  .att{display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--border);align-items:flex-start}
  .att:first-child{border-top:none}
  .att-av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none}
  .att-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px}
  .att-title{font-size:12px;color:var(--muted-foreground)} .att-note{font-size:12px;color:var(--muted-foreground);margin-top:4px}

  /* company snapshot */
  .snap-stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .ss{padding:10px 12px;background:var(--muted);border-radius:calc(var(--radius)/1.2)}
  .ss .k{font-size:11px;color:var(--muted-foreground);font-weight:500} .ss .v{font-size:14px;font-weight:600;margin-top:3px}

  /* signal */
  .signal{background:var(--info-bg);border:1px solid var(--info-bd);border-radius:calc(var(--radius)/1.2);padding:10px 13px;font-size:13px;margin-top:4px}
  .signal .sk{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--info);font-weight:600;margin-bottom:4px}

  /* pains */
  .pain{padding:10px 0;border-top:1px solid var(--border)}
  .pain:first-child{border-top:none}
  .pain-label{font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px}
  .pain-body{font-size:13px;color:var(--muted-foreground);margin-top:4px}

  /* questions */
  .q{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--border);align-items:flex-start}
  .q:first-child{border-top:none}
  .q-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted-foreground);flex:none;width:20px}
  .q-text{font-size:13.5px}

  /* last call */
  .lc{display:flex;gap:9px;padding:9px 0;border-top:1px solid var(--border)}
  .lc:first-child{border-top:none}
  .lc::before{content:'→';color:var(--muted-foreground);flex:none;font-family:var(--mono)}
  .lc-text{font-size:13px}

  /* competitive notes */
  .comp-note{background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:var(--radius);padding:14px 16px}
  .comp-note .ck{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--warn);font-weight:600;margin-bottom:6px}
  .trap{margin-top:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:calc(var(--radius)/1.3);font-size:13px}
  .trap .tl{font-family:var(--mono);font-size:10px;color:var(--muted-foreground);margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em}

  .data-src{margin-top:12px;padding:8px 12px;background:var(--muted);border-radius:calc(var(--radius)/1.2);display:flex;gap:14px;flex-wrap:wrap}
  .ds{font-family:var(--mono);font-size:11px;color:var(--muted-foreground)}

  .foot{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);text-align:center;color:var(--muted-foreground);font-size:12px}
  .foot code{font-family:var(--mono);font-size:11px;background:var(--muted);padding:2px 6px;border-radius:5px}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <div class="brand"><span class="logo">CP</span>Sales Call Prep<span class="sub">Friday 23 May 2026 · 2 calls today</span></div>
  <div class="sync"><span class="dot"></span>CRM + Gong + web · generated 07:02</div>
</div></div>

<main class="wrap">

  <div class="call-tabs" id="call-tabs"></div>
  <div id="brief"></div>

  <p class="foot">Briefs at <code>briefs/2026-05-23/</code> — Research Agent + Customer Agent · CRM synced 07:00 · Gong transcripts current · 3 min read per brief</p>
</main>

<script>
'use strict';
const BRIEFS = {
  meridian: {
    name: 'Meridian Foods',
    time: '10:00 AM CET',
    type: 'Stage 4 · Negotiation',
    stage: 'info',
    attendees: [
      { init:'CB', color:'var(--c3)', name:'Carl Bauer', title:'CFO', note:'First call ever. Finance background (PwC). Raised TCO question via email May 8. Has not seen a live demo.' },
      { init:'SV', color:'var(--c1)', name:'Sandra Vos', title:'VP Operations', note:'Champion. Budget confirmed in principle. Enthusiastic about August go-live. Will likely let Carl lead.' },
    ],
    company: {
      stats: [
        { k:'Industry', v:'Food & Beverage' }, { k:'Size', v:'1,800 employees' },
        { k:'Sites', v:'3 production sites' }, { k:'HQ', v:'Berlin' },
      ],
      signal: { label:'Recent signal — May 2026 Earnings Call', text:'Announced warehouse automation initiative. Directly validates our WMS integration story — use this to open the conversation.' },
    },
    status: { stage:'Stage 4 · Proposal Sent', arr:'$187k', lastTouch:'May 21 — Sandra Vos confirmed budget in principle' },
    lastCall: [
      'Sandra confirmed budget approved — pending CFO countersignature.',
      'Priya Mehta (IT Director) gave technical green light. One condition: API rate limit SLA in contract.',
      "Sandra's hard deadline: live before the August peak season.",
    ],
    pains: [
      { label:'TCO uncertainty', cls:'warn', body:'Carl Bauer explicitly asked for TCO breakdown vs. current vendor (email May 8). He has not seen it verbally confirmed. Lead with the 3-year TCO model — 12% lower than Northwind Enterprise.' },
      { label:'ROI visibility for board', cls:'', body:'CFOs under board pressure to show ROI on new spend within 90 days. Frame 18-day go-live + 30-day check-in as early ROI evidence.' },
      { label:'Implementation risk', cls:'', body:'CFO who was never in discovery will worry about implementation surprises. Pre-empt: show the 18-day contractual commitment + SAP WMS integration included.' },
    ],
    questions: [
      "Carl, you raised the TCO question in your email — walk me through the main cost drivers you're comparing us against.",
      "What does the board need to see by Q4 to consider this initiative a success?",
      "Is there anything in the contract terms you'd want us to walk through before Sandra's team gets into implementation planning?",
      "What would make this a straightforward decision for you to countersign?",
      "Has Sandra walked you through the August timeline? Does that work from a budget-cycle perspective?",
    ],
    competitive: {
      competitor: 'Northwind',
      cls: 'warn',
      context: "Northwind is in the CRM competitor field. Carl may reference their Pro-tier cut to $79/seat (May 2026).",
      trap: { label:'Trap question', text:'Ask: "Has Northwind quoted EU data residency for all 3 of your sites? That\'s Enterprise-tier only — which changes the TCO calculation."' },
      proof: { label:'Proof point', text:'3-year TCO at 300 seats: our total cost (including implementation + EU residency) runs 12% lower than Northwind Enterprise. One-pager is in Drive.' },
    },
    sources: ['CRM updated 2026-05-22', 'Gong: May 21 + May 20 transcripts', 'LinkedIn: Carl Bauer verified 2026-05-22'],
  },
  atlas: {
    name: 'Atlas Logistics',
    time: '2:30 PM CET',
    type: 'Stage 3 · Demo',
    stage: 'bad',
    attendees: [
      { init:'MK', color:'var(--c5)', name:'Marcus Klein', title:'Head of Digital Transformation', note:'New attendee — promoted to Head of DX in April 2026. Potential champion but hasn\'t committed yet.' },
      { init:'TR', color:'var(--c6)', name:'Tina Radke', title:'VP IT Infrastructure', note:'Has been in 2 previous calls. Technical evaluator. Skeptical of our API integration timeline.' },
    ],
    company: {
      stats: [
        { k:'Industry', v:'Logistics & Transport' }, { k:'Size', v:'4,200 employees' },
        { k:'Revenue', v:'€380M (2025)' }, { k:'HQ', v:'Hamburg' },
      ],
      signal: { label:'Recent signal — May 14 press release', text:'Atlas Logistics announced acquisition of a regional freight carrier (Mosel Transport). New sites will likely expand the deployment scope — use this to explore expanded footprint.' },
    },
    status: { stage:'Stage 3 · Demo', arr:'$310k', lastTouch:'May 5 — last Gong call (18 days ago — stale flag in pipeline)' },
    lastCall: [
      'Tina Radke raised API integration timeline concern — said "18 days seems optimistic for our ERP complexity."',
      'Marcus Klein asked about multi-site pricing for 6 sites post-acquisition.',
      'Northwind was mentioned by Tina — "still evaluating".',
    ],
    pains: [
      { label:'Integration complexity concern', cls:'warn', body:'Tina Radke is skeptical about the 18-day go-live with their custom ERP. Bring a reference: "A 380-person logistics company went live with SAP WMS integration in 16 days." Offer a scoping session.' },
      { label:'Acquisition expansion opportunity', cls:'good', body:'Mosel Transport acquisition adds ~800 users and 4 new sites. If Marcus is becoming the DX owner, this is a 2x deal. Ask about the Mosel integration plan explicitly.' },
      { label:'Stale pipeline — re-engage reason needed', cls:'bad', body:'18 days since last touch. Need a legitimate reason to re-engage. Use the acquisition news as the hook: "Saw the Mosel Transport news — how does that change the scope of what you\'re evaluating?"' },
    ],
    questions: [
      "Congratulations on the Mosel Transport acquisition — how does that change the scope of what you're evaluating from a technology standpoint?",
      "Tina, you raised a concern about the 18-day timeline on our last call. Can I walk you through how we handled a comparable SAP WMS integration last quarter?",
      "Marcus, with your new DX mandate, what does a successful vendor decision look like for you by end of Q2?",
      "Are you still evaluating Northwind? What's the main thing making you hesitate between us?",
      "If the API integration concern was resolved — what would the decision timeline look like?",
    ],
    competitive: {
      competitor: 'Northwind',
      cls: 'bad',
      context: "Northwind is actively in evaluation per Tina's May 5 call comment. No documented counter-response in CRM. Stale stage 18 days.",
      trap: { label:'Trap question', text:'Ask: "Has Northwind given you a timeline commitment for the ERP integration in writing? What\'s their committed go-live date?"' },
      proof: { label:'Proof point', text:'"A 380-person logistics company moved from Northwind to us after a 90-day Northwind implementation. Our go-live: 16 days." (Atlas Logistics competitor reference available.)' },
    },
    sources: ['CRM updated 2026-05-22 (stale — last activity May 5)', 'Gong: May 5 transcript', 'Press release: Mosel Transport acquisition May 14'],
  },
};

const CALLS = Object.keys(BRIEFS);
let current = 'meridian';

function render() {
  const b = BRIEFS[current];
  document.getElementById('call-tabs').innerHTML = CALLS.map(k=>`
    <div class="call-tab ${k===current?'active':''}" onclick="select('${k}')">
      <div class="ct">${BRIEFS[k].name}</div>
      <div class="cs">${BRIEFS[k].time} · ${BRIEFS[k].type}</div>
    </div>`).join('');

  document.getElementById('brief').innerHTML = `
    <section class="grid g3" style="margin-bottom:14px">
      <div class="card">
        <div class="card-h"><div><div class="t">Attendees</div><div class="d">${b.time} · ${b.type}</div></div><span class="badge ${b.stage}">${b.type}</span></div>
        <div class="card-b" id="attendees"></div>
      </div>
      <div class="card">
        <div class="card-h"><div><div class="t">Company Snapshot</div></div></div>
        <div class="card-b">
          <div class="snap-stat">${b.company.stats.map(s=>`<div class="ss"><div class="k">${s.k}</div><div class="v">${s.v}</div></div>`).join('')}</div>
          <div class="signal"><div class="sk">${b.company.signal.label}</div>${b.company.signal.text}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-h"><div><div class="t">Relationship Status</div><div class="d">CRM + last Gong call</div></div></div>
        <div class="card-b">
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:var(--muted-foreground);font-weight:500;margin-bottom:3px">Stage</div>
            <span class="badge ${b.stage}">${b.status.stage}</span>
          </div>
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:var(--muted-foreground);font-weight:500;margin-bottom:3px">ARR</div>
            <div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">${b.status.arr}</div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--muted-foreground);font-weight:500;margin-bottom:3px">Last touch</div>
            <div style="font-size:13px">${b.status.lastTouch}</div>
          </div>
          <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
            <div style="font-size:12px;color:var(--muted-foreground);font-weight:500;margin-bottom:6px">Last call (${b.lastCall.length} points)</div>
            ${b.lastCall.map(l=>`<div class="lc"><span class="lc-text">${l}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </section>

    <section class="grid g3" style="margin-bottom:14px">
      <div class="card" style="grid-column:span 2">
        <div class="card-h"><div><div class="t">Likely Pains</div><div class="d">Grounded in Gong + CRM — use these to open</div></div></div>
        <div class="card-b" id="pains"></div>
      </div>
      <div class="card">
        <div class="card-h"><div><div class="t">Discovery Questions</div><div class="d">Specific to this call and stage</div></div></div>
        <div class="card-b" id="questions"></div>
      </div>
    </section>

    <div class="comp-note" id="comp-note"></div>
    <div class="data-src" id="sources"></div>`;

  document.getElementById('attendees').innerHTML = b.attendees.map(a=>`
    <div class="att">
      <div class="att-av" style="background:${a.color}">${a.init}</div>
      <div><div class="att-name">${a.name}</div><div class="att-title">${a.title}</div><div class="att-note">${a.note}</div></div>
    </div>`).join('');

  document.getElementById('pains').innerHTML = b.pains.map(p=>`
    <div class="pain">
      <div class="pain-label"><span class="badge ${p.cls||''}">${p.label}</span></div>
      <div class="pain-body">${p.body}</div>
    </div>`).join('');

  document.getElementById('questions').innerHTML = b.questions.map((q,i)=>`
    <div class="q">
      <div class="q-num">${i+1}.</div>
      <div class="q-text">${q}</div>
    </div>`).join('');

  const c = b.competitive;
  document.getElementById('comp-note').innerHTML = `
    <div class="ck">Competitive Notes · <span class="badge ${c.cls}" style="vertical-align:middle">${c.competitor}</span></div>
    <div style="font-size:13.5px;margin-bottom:10px">${c.context}</div>
    <div class="trap"><div class="tl">${c.trap.label}</div>${c.trap.text}</div>
    <div class="trap" style="margin-top:6px"><div class="tl">${c.proof.label}</div>${c.proof.text}</div>`;

  document.getElementById('sources').innerHTML = b.sources.map(s=>`<span class="ds">${s}</span>`).join('');
}

function select(k) { current = k; render(); }
render();
</script>
</body>
</html>
