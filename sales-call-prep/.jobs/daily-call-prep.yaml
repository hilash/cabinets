id: daily-call-prep
name: Daily Call Prep
enabled: true
schedule: 0 7 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 900
prompt: |-
  Produce call prep briefs for every sales call on today's calendar.
  Target delivery: briefs complete and written before 08:00.

  Step 1 — Research Agent: Calendar pull and research
  Read today's calendar from the calendar integration. Filter to sales calls:
  discovery, demo, proposal, negotiation, EBC, QBR, renewal. Skip internal meetings.

  For each qualifying call:
  a. Identify the account name and all external attendees (names and titles).
  b. Research the company: pull the most recent 30 days of company news, funding events,
     leadership changes, and product announcements. Find one relevant industry signal.
  c. Research each attendee: LinkedIn title, tenure, any public statements (posts, articles).
     Flag first-time attendees and newly promoted contacts.
  d. Write the research layer to `/briefs/<YYYY-MM-DD>/<account>-research.md`.
  e. Trigger the Customer Agent for CRM and Gong context on this account.

  Step 2 — Customer Agent: CRM and Gong layer
  For each account the Research Agent flags:
  a. Pull the CRM record: opportunity stage, ARR, last activity, open tasks, competitor field.
  b. Read the 2 most recent Gong transcripts: extract last topics, objections, commitments,
     and competitor mentions (verbatim quotes).
  c. Identify the 2–3 most likely pain points for this specific call, grounded in Gong and CRM.
  d. Write 3–5 discovery questions tailored to the account and call stage.
  e. Add competitive notes if a competitor is in the deal: one trap question + one proof point.
  f. Write the final brief to `/briefs/<YYYY-MM-DD>/<account>.md`.

  Brief structure (required): Attendees | Company Snapshot | Relationship Status |
  Last Call Summary (3 bullets) | Likely Pains (2–3 specific) | Discovery Questions (3–5) |
  Competitive Notes | Data Sources (CRM updated, Gong transcript dates).

  Keep each brief under 400 words. If a source is unavailable, note the gap — don't invent.
