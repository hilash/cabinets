id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut for call preparation context.

  Pull competitor signals from the past 7 days relevant to this week's call accounts.
  Cross-reference `../competitive-intelligence` for the full competitor landscape.

  Focus on:
  1. Any competitor moves (pricing, product, positioning) that a rep is likely to
     hear about on a call this week — surface the "they'll say X, we say Y" response.
  2. New objections sourced from Gong transcripts in the last 7 days where competitors
     were named. Extract the objection and the best available response from the battlecard.
  3. Win/loss signals from CRM closed last week: if a competitor came up in a loss,
     flag the pattern for this week's call prep briefs.

  Write findings to `/competitor-watch/weekly-<date>.md`.
  Update `/competitor-watch/latest.md` (overwrite) with the top 3 signals for the week:
  competitor | move | what reps will hear | our response.
  Include a reference link to the full battlecard in `../sales-battlecard/battlecards/`.
  Lead each finding with "so what for this week's calls."
cabinetPath: cabinet-examples/cabinets/sales-call-prep
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
