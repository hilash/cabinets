id: weekly-ad-performance-memo
name: Weekly Ad Performance Memo
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: ads-analyst
agentSlug: ads-analyst
timeout: 900
prompt: |-
  Produce this week's ad performance memo.

  ANALYST STEP:
  1. Read platform export files in `data/platform-exports/` for the past 7 days.
  2. Compute for each channel (Meta, Google Ads, LinkedIn, Twitter/X):
     - Total spend, impressions, clicks, conversions, CPL, CAC (CRM-attributed if available), ROAS.
     - WoW delta for each metric. Flag any metric >15% change.
  3. For each active creative in `data/creatives/`: compute CTR, CVR, CPA. Rank top 3 and bottom 3.
     Flag any creative with CTR decline >20% over 5+ days (fatigue signal).
  4. Check `experiments/queue.md` — mark any concluded experiments with results; surface learnings.
  5. Recommend: top 3 actions with channel, rationale, and estimated impact.
  6. Write findings to `findings/weekly-<YYYY-MM-DD>.md`.
  7. Update `ads-dashboard/index.html` with current KPIs, spend chart, and creative leaderboard.

  WRITER STEP:
  8. Read `findings/weekly-<YYYY-MM-DD>.md` and write the performance memo to `memos/weekly-<YYYY-MM-DD>.md`.
     Format: week-in-one-line → KPIs vs target → channel breakdown → creative winners/losers →
     experiments → next actions (3, numbered, with owners).
     400–600 words. Lead with the number.

  Rules: no claim without a number. Attribution model must be noted. Ship on time — Mon 08:00.
cabinetPath: cabinet-examples/cabinets/ad-performance
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
