id: weekly-action-chase
name: Weekly Action Chase
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: action-tracker
agentSlug: action-tracker
timeout: 600
prompt: |-
  Run the Friday action chase for the leadership meeting cabinet.

  1. Read `actions/tracker.md` in full.
  2. Identify:
     a. OVERDUE — items past their due date with status not Done.
     b. AT RISK — items due within the next 3 business days with no update in 48+ hours.
     c. BLOCKED — items explicitly blocked; capture the blocker and the person who can unblock.
     d. COMPLETED THIS WEEK — items moved to Done since last Friday. Verify: artifact or delivery path.
     e. STALE — items with status In Progress but no update in 7+ days.

  3. Update `actions/tracker.md`:
     - Mark overdue items as Overdue (not In Progress).
     - Add a "Last checked" timestamp to every item.
     - Verify Done items — if no delivery artifact, revert to In Progress.

  4. Write `actions/chase-YYYY-MM-DD.md`:
     - Summary line: X overdue, Y blocked, Z at-risk, N completed this week.
     - Overdue table: ID, description, owner, due date, days overdue.
     - Blocked items: ID, blocker, unblock path, recommended escalation.
     - Completions: ID, what was delivered, where it lives.
     - Items to add to Monday's agenda (overdue or blocked needing team discussion).

  Rules:
  - Owner must always be a named person (first + last), not a team or role.
  - Items blocked >5 days without unblock path: flag for escalation to CEO operating cabinet.
  - This report feeds directly into Monday's meeting brief — be specific about what needs airtime.
cabinetPath: cabinet-examples/cabinets/leadership-meeting
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
