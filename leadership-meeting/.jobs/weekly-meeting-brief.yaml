id: weekly-meeting-brief
name: Weekly Meeting Brief
enabled: true
schedule: 0 7 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: meeting-summarizer
agentSlug: meeting-summarizer
timeout: 600
prompt: |-
  Prepare this week's leadership meeting brief. The meeting is Monday at 10:00 — this brief is
  ready for the leadership team at 07:30 so they have 2.5 hours to review before joining.

  Inputs to read:
  - `actions/tracker.md` — which actions are open, overdue, or blocked from last week
  - `decisions/feed.md` — decisions from the prior meeting (to close the loop)
  - `briefs/agenda-items.md` — standing agenda items and any new items added this week
  - If available: ceo-operating/priorities.md — company priorities for context

  Produce `briefs/YYYY-MM-DD-brief.md` with these sections:
  1. MEETING CONTEXT — date, time, attendees (from calendar), duration.
  2. OPEN FROM LAST WEEK — any decisions deferred or actions overdue from the prior meeting.
     For each: item, original due date, owner, current status, why it's still open.
  3. AGENDA — ranked by priority, with time allocation. Each item:
     - Topic name
     - What we need to decide or produce in this block (not just "discuss")
     - 1-paragraph context (what a new attendee needs to know)
     - Owner who leads this item
  4. NEEDS A CALL — items that have been deferred 2+ times and MUST be decided today.
     Flag these with explicit urgency and the cost of another deferral.
  5. PRE-READ — links or file paths to docs the team should review before joining.

  Rules:
  - Each agenda item must have a clear "output needed" — a decision, an approval, or a named artifact.
  - "Needs a Call" items go at the top of the agenda, not buried.
  - The brief is written for someone who has 5 minutes to review — lead with the agenda, not context.
cabinetPath: cabinet-examples/cabinets/leadership-meeting
