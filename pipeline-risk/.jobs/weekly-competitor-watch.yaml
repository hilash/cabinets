id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: risk-analyst
agentSlug: risk-analyst
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut. Focus on competitor signals
  that are active risks inside our current pipeline.

  For each competitor (Northwind, Helios, Cobalt, Drachma — per the CI cabinet):
  1. Pull any new moves from the past 7 days from `../competitive-intelligence` —
     pricing changes, product launches, positioning shifts.
  2. Cross-reference against our open deals: which deals have this competitor in the
     CRM competitor field, or was mentioned in a Gong call transcript this week?
  3. For each deal where the competitor is active AND there is no documented counter-response
     in CRM: flag as `competitor-risk` and add to the risk report's Competitor Watch section.

  Ask the Customer Agent to pull verbatim Gong transcript quotes for any competitor
  mention in a deal scored High or Critical risk.

  Write findings to `/competitor-watch/weekly-<date>.md`.
  Update `/competitor-watch/latest.md` with the top 3 signals.
  Cross-reference the full competitive landscape from `../competitive-intelligence`.
  Lead with "so what for our pipeline."
cabinetPath: cabinet-examples/cabinets/pipeline-risk
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
