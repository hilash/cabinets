id: weekly-pipeline-risk
name: Weekly Pipeline Risk Report
enabled: true
schedule: 0 7 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: risk-analyst
agentSlug: risk-analyst
timeout: 900
prompt: |-
  Produce the weekly pipeline risk report for the current quarter's pipeline.
  This report must be ready before the 09:00 Monday forecast call.

  Read current pipeline state from `/pipeline/scores.md` and the Customer Agent's
  deal context notes in `/pipeline/deal-context/`.

  The report must include:
  1. **Forecast Summary** — Commit / Best Case / Pipeline total vs. quota for the quarter.
     Flag if commit coverage is below 85%.
  2. **Risk Distribution** — Count of deals per risk tier (Critical / High / Medium / Low).
  3. **Top 5 Critical Deals** — For each: deal name, ARR, stage, primary risk type,
     the specific evidence (CRM field or Gong signal), and the recommended manager action.
  4. **Stale Pipeline** — Deals with no stage movement in 21+ days or last activity 14+
     days. List deal name, days stale, ARR, and suggested action (push, abandon, re-engage).
  5. **Missing Champions** — Deals in Stage 3+ with no identified champion in CRM.
     List deal name, ARR, close date. Flag as Critical if close date is within 60 days.
  6. **Competitor Watch** — Pull the latest from `/competitor-watch/latest.md` and flag
     any deals where a competitor is mentioned without a documented counter-response.

  Write the full report to `/reports/pipeline-risk-<YYYY-MM-DD>.md`.
  Update `/reports/latest.md` as a symlink/copy of today's report.
cabinetPath: cabinet-examples/cabinets/pipeline-risk
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
