id: daily-stale-check
name: Daily Stale Deal Check
enabled: true
schedule: 0 7 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: risk-analyst
agentSlug: risk-analyst
timeout: 300
prompt: |-
  Run the daily stale deal check across all open opportunities.

  Fetch the current open opportunity list from CRM. For each open deal, check:
  1. Days since last stage change (CRM stage-changed date)
  2. Days since last CRM activity (last call, email, or meeting logged)
  3. Days until close date (close date vs. today)

  Flag any deal that meets one or more of these thresholds:
  - Stage unchanged for 21+ days in Stage 2 or later
  - Last CRM activity 14+ days ago
  - Close date within 30 days with risk score High or Critical
  - Close date within 14 days with no next step logged

  For each flagged deal, append a row to `/alerts/stale.md` with:
  date | deal name | ARR | stage | days-stale | days-since-activity | days-to-close | flag-reason

  Overwrite (don't append) the "Today's Alerts" section at the top of `/alerts/stale.md`
  with just today's flags — the full log is the appended rows below.
cabinetPath: cabinet-examples/cabinets/pipeline-risk
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
