id: weekly-prd-qa
name: Weekly PRD Completeness QA
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: prd-qa
agentSlug: prd-qa
timeout: 900
prompt: |-
  Run the weekly PRD completeness audit across all open PRDs in /prds/.

  An "open" PRD is any file in /prds/ that is NOT marked "status: archived" or
  "status: shipped" in its frontmatter.

  For each open PRD, run the full QA checklist:
  1. Section completeness: all 9 sections present, non-empty, no "TBD" placeholders
  2. User story quality: every story has 2+ acceptance criteria, criteria are binary
  3. Requirement quality: no subjective language without measurable threshold; all NFRs
     have measurable thresholds (e.g., latency in ms, uptime in %)
  4. Success metrics: at least 2 metrics, each with baseline + target + measurement + date
  5. Open questions: no question without an owner; flag any past due date
  6. Risk coverage: each identified risk has likelihood, impact, and mitigation (or accepted-risk)

  Severity scale:
  - HIGH: missing section, no success metrics, >3 requirements with subjective language → blocks handoff
  - MEDIUM: 1–2 vague requirements, open question past due, risk without mitigation
  - LOW: minor wording, sourcing gap, style inconsistency

  Write one QA report per PRD to /qa-reports/qa-<prd-slug>-<YYYY-MM-DD>.md.
  Write a weekly summary to /qa-reports/summary-<YYYY-WW>.md listing:
  - PRDs with HIGH flags (blocked from handoff)
  - PRDs cleared this week (all flags resolved)
  - PRDs with stale open questions (>7 days, no update)
cabinetPath: cabinets/prd-builder
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
