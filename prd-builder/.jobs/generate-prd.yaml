id: generate-prd
name: Generate PRD
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: product-manager
agentSlug: product-manager
timeout: 1800
prompt: |-
  Generate a new PRD. This is a three-stage on-demand job triggered per feature.

  INPUT: The PM must provide a brief in /prds/briefs/<feature-slug>-brief.md before this job
  runs. The brief must contain: customer problem, business goal, user segments, and out-of-scope
  constraints. If no brief file exists, abort and ask the PM to write one first.

  STAGE 1 — Product Manager reviews the brief:
  - Validate that all 4 brief sections are complete
  - Confirm success metrics are measurable (target, baseline, measurement method, time horizon)
  - Write the finalized brief to /prds/briefs/<feature-slug>-brief-final.md

  STAGE 2 — Product Writer drafts the full PRD:
  - Use the standard template: Problem · Business Goal · User Segments · User Stories ·
    Functional Requirements · Non-Functional Requirements · Out of Scope · Success Metrics ·
    Risks · Open Questions
  - Every user story: 2+ acceptance criteria
  - Every functional requirement: numbered, priority (P0/P1/P2), source cited
  - Every NFR: measurable threshold (e.g., P95 latency < Xms, uptime > 99.9%)
  - Write the draft to /prds/<feature-slug>-draft.md

  STAGE 3 — PRD QA runs completeness check on the draft:
  - Section completeness (no TBDs, no empty sections)
  - Requirement quality (no subjective language without measurable threshold)
  - Open question audit (all assigned, all have due dates)
  - Write QA report to /qa-reports/qa-<feature-slug>-<date>.md
  - If any HIGH severity flags: return to Product Manager for resolution before marking ready

  Final output: /prds/<feature-slug>.md (marked engineering-ready) + QA report.
cabinetPath: cabinets/prd-builder
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
