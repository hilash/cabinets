id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-manager
agentSlug: product-manager
timeout: 900
prompt: |-
  Produce the weekly competitor feature precedent analysis for open PRDs.

  For each open PRD in /prds/ (not archived, not shipped):
  - Check whether any tracked competitor (from /competitive-intelligence/) has already
    shipped a similar feature
  - If yes: note how they implemented it, what we can learn, and what we should NOT copy
  - If no: note this is a potential first-mover opportunity

  Also check: are any PRD requirements weaker than what competitors have already shipped?
  (e.g., we specify "load in 5s" but competitor ships "load in <2s" — flag the gap)

  Write the competitor context report to /competitor-watch/prd-competitor-<YYYY-MM-DD>.md.
  For each PRD with a competitor precedent, add a brief "Competitor Context" note to the
  corresponding PRD file's open-questions section (as a new question: "How does our approach
  differentiate from [Competitor]'s implementation of [Feature]?").

  Cross-reference the company Competitive Intelligence cabinet for full landscape context.
cabinetPath: cabinets/prd-builder
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
