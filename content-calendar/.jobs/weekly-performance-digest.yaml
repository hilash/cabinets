id: weekly-performance-digest
name: Weekly Performance Digest
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: content-workflow
agentSlug: content-workflow
timeout: 600
prompt: |-
  Produce the weekly content performance digest.
  1. Read `performance/raw/` for the previous week's performance data (views, clicks, shares, leads).
  2. For each published post in the past 7 days, compute: channel, views, engagement rate, leads generated.
  3. Identify the top 3 performing pieces (by engagement or leads) and bottom 2.
  4. For the top performers: extract the repeatable pattern (topic angle, format, hook type, channel).
  5. For the under-performers: diagnose the likely cause (weak hook, wrong channel, off-topic, timing).
  6. Recommend: 2 content ideas to double down on, 1 channel or format to reconsider.
  7. Write the digest to `performance/weekly-<YYYY-MM-DD>.md` in the standard format:
     TL;DR → Top performers → Under-performers → Patterns → Recommendations.
  Keep it under 500 words — the team reads it in 3 minutes or not at all.
cabinetPath: cabinets/content-calendar
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
