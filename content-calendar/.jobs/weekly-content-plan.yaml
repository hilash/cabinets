id: weekly-content-plan
name: Weekly Content Plan
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: content-workflow
agentSlug: content-workflow
timeout: 600
prompt: |-
  Produce the weekly content plan for all channels.
  1. Read all posts in `posts/` — parse frontmatter for status, channel, owner, publish date.
  2. Identify what's scheduled for this week across all channels (blog, LinkedIn, Twitter, newsletter).
  3. For any post in "Idea" status with a publish date within 10 days: write a brief to `posts/<slug>/brief.md`
     and hand it to the Content Writer (include: audience, angle, goal, channel specs, CTA, word count).
  4. For any post in "Draft" status: confirm review is assigned; if no reviewer logged, assign one in `posts/<slug>/status.md`.
  5. For any post that is 3+ days overdue in "Review": flag it in `status/pipeline-flags.md`.
  6. Update the calendar webapp at `calendar/index.html` to reflect current pipeline state.
  7. Write a brief plan summary to `status/weekly-plan-<YYYY-MM-DD>.md`.
  Lead with "This week's queue" — what goes out, on what channel, by whose name.
cabinetPath: cabinets/content-calendar
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
