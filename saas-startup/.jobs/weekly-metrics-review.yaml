id: weekly-metrics-review
name: Weekly Metrics Review
description: Reviews key SaaS metrics including MRR, churn, activation rate, and burn multiple.
ownerAgent: ceo
enabled: true
schedule: "0 9 * * 1"
prompt: |-
  Review the company metrics page and all child cabinet summaries.
  Write a weekly metrics review that includes:
  - MRR and net revenue retention trend
  - Activation rate changes
  - Churn signals from customer success
  - Burn multiple and runway status
  - One decision leadership should make this week
  Save the review to /company/metrics.
