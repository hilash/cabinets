id: weekly-changelog-compile
name: Weekly Changelog Compile
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: writer-agent
agentSlug: writer-agent
timeout: 600
prompt: |-
  Compile this week's release activity into a changelog digest.

  Look at all release notes produced in the past 7 days (check release-notes/releases/
  for files with a last-modified date in the past 7 days).

  If one or more releases shipped this week:
  - Write a concise weekly changelog digest to release-notes/releases/weekly-digest.md.
  - Format: "What shipped the week of <date>" header, then bullet points in customer language
    covering the highlights from each release. Group by release version if multiple.
  - External copy only — no internal jargon, no PR numbers.
  - Suitable for pasting into a customer newsletter or Slack #product-updates.

  If no releases shipped this week:
  - Write a one-liner to weekly-digest.md: "No releases shipped week of <date>."

  Also check if the changelog/index.html is up to date with the latest release. If it is not,
  re-render it from the releases/ directory.

  The digest should be under 200 words.
cabinetPath: cabinets/release-notes
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
