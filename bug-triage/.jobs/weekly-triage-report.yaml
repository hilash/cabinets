id: weekly-triage-report
name: Weekly Triage Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: analyst-agent
agentSlug: analyst-agent
timeout: 600
prompt: |-
  Compile the weekly bug triage summary for the past 7 days.

  Read all daily triage files from the past 7 days in bug-triage/triage/:
  - raw-sentry-<date>.md files for raw Sentry data.
  - scored-<date>.md files for scored bug lists.
  - daily-<date>.md files for the daily reports.

  Produce a weekly summary at bug-triage/triage/weekly-<YYYY-MM-DD>.md:

  ## Bug Triage Weekly Report — Week of <date>

  ### Headline numbers
  - Bugs opened this week: <N>
  - Bugs closed/resolved this week: <N>
  - Net open bug change: +N / −N
  - P0/P1 bugs: <N open>, <N resolved>
  - Regressions this week: <N>

  ### Top 5 bugs by priority score (still open)
  Table: rank, title, severity, score, owner, age, occurrences this week, affected users.

  ### Components with most bugs opened (top 3)
  For each: component name, bug count this week vs last week, trend arrow.

  ### Regressions
  List all regressions identified this week: what was re-opened, when it was last closed, suspected cause.

  ### Reliability narrative
  2–3 sentences: is the overall bug load trending up or down? Any components that need
  dedicated attention? Any category of bug (e.g., auth, payment, API) that's recurring?

  ### Recommended actions
  Up to 3 concrete recommendations for the EM: e.g., "auth-service had 4 P2 bugs this week —
  consider a focused bug-bash session," or "payment-service regression ENG-7712 still open at
  P1 — assign a senior engineer."

  This report is for the EM and VP Eng. Keep it under 500 words.
cabinetPath: cabinet-examples/cabinets/bug-triage
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
