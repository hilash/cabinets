id: weekly-performance-digest
name: Weekly Performance Digest
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: content-strategist
agentSlug: content-strategist
timeout: 600
prompt: |-
  Review content performance data from the past week.
  Write a performance digest covering:
  - Top 3 performing pieces and why they worked
  - Bottom 3 and hypotheses for underperformance
  - Audience growth trends
  - One recommendation for next week's content strategy
  Save the digest to /audience-research.
