id: weekly-inventory-check
name: Weekly Inventory Check
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: head-of-ops
agentSlug: head-of-ops
timeout: 600
prompt: |-
  Review current inventory levels for all product categories.
  Flag any SKUs below reorder threshold.
  Check supplier lead times for items that need restocking.
  Write a weekly inventory report with reorder recommendations.
cabinetPath: cabinets/ecommerce
createdAt: '2026-04-11T00:00:00.000Z'
updatedAt: '2026-04-11T00:00:00.000Z'
