id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-lead
agentSlug: product-lead
timeout: 900
prompt: |-
  Produce the weekly competitor sentiment cut from customer feedback. Scan `/feedback/log.md`
  for the last 7 days and extract all items where customers mention a competitor by name or
  describe switching from / comparing to another product.

  For each competitor mentioned:
  - Competitor name
  - Mention count (last 7d)
  - Sentiment toward competitor (positive / mixed / negative)
  - Context: what aspect were they comparing? (pricing, features, support, onboarding)
  - Top verbatim quote

  Also pull relevant competitor signals from the company Competitive Intelligence cabinet
  (cross-reference /competitive-intelligence/) for context on recent competitor moves.

  Write the competitor sentiment report to `/competitor-watch/voc-competitor-<YYYY-MM-DD>.md`.
  Surface the top 3 competitor mentions (by frequency × sentiment risk) in the weekly digest
  as a "Competitor Voice" section.

  Lead with "so what for us" — if customers are praising a competitor's pricing, that is a
  pricing threat, not just a VoC data point.
cabinetPath: cabinet-examples/cabinets/voice-of-customer
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
