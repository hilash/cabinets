id: weekly-theme-clustering
name: Weekly Theme Clustering
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-lead
agentSlug: product-lead
timeout: 900
prompt: |-
  Produce the weekly VoC theme digest. This is a two-stage job:

  STAGE 1 — Ask the VoC Analyst to cluster the last 7 days of `/feedback/log.md`:
  - Group items into themes (minimum 3 items from distinct accounts per theme)
  - For each theme: mention count, segment breakdown, WoW trend, ARR requesting/at-risk
  - Top 3 verbatims per theme
  - Write the cluster report to `/themes/week-<YYYY-WW>.md`

  STAGE 2 — As VoC Lead, synthesize the Analyst's report into the Monday digest:
  - Rank the top 5 themes by (ARR impact × strategic importance)
  - For each theme: title, mention count, ARR impact, best verbatim, recommended action
  - Flag any theme with WoW growth >30% as "Spike — needs escalation"
  - Write the digest to `/digests/digest-<YYYY-MM-DD>.md`

  Then update the dashboard at `/dashboard/index.html`:
  - Update the theme cluster bars with current mention counts
  - Update the revenue impact figures
  - Update the sentiment trend with this week's sentiment breakdown
  - Update the top verbatims section with the best 4 quotes from the digest

  Rules:
  - No theme without an ARR estimate (use segment average if account data is missing)
  - No verbatim that could identify an individual (use "Enterprise customer, ~$X ARR")
  - The digest is the primary artifact; the dashboard reflects it, not the other way around
cabinetPath: cabinet-examples/cabinets/voice-of-customer
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
