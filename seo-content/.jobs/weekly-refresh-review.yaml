id: weekly-refresh-review
name: Weekly Content Refresh Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: seo-researcher
agentSlug: seo-researcher
timeout: 600
prompt: |-
  Produce the weekly content refresh task review.
  1. Read `refresh/queue.md` — the current prioritized list of pages to refresh.
  2. For the top 3 items by opportunity score: confirm the SERP landscape is still accurate (check
     competitor page structure from `competitor-watch/` notes). If stale, update the SERP notes.
  3. For any refresh item that has been in queue for 3+ weeks without action: escalate with a note
     explaining the estimated traffic cost of delay.
  4. Identify 1–2 new refresh candidates this week: pages with rank 11–20 on a keyword with >200
     monthly searches that haven't been touched in 6+ months (check `keywords/tracked.md` for age).
  5. Update `refresh/queue.md` with new candidates and remove any completed refreshes.
  6. Brief the SEO Writer on the top-priority refresh: write the research package to
     `refresh/<slug>-research.md` (target keyword, competitor gap, recommended additions).
  7. Write a summary to `status/refresh-review-<YYYY-MM-DD>.md`.
cabinetPath: cabinets/seo-content
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
