id: weekly-competitor-serp
name: Weekly Competitor SERP & Content Gap Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: seo-researcher
agentSlug: seo-researcher
timeout: 900
prompt: |-
  Produce the weekly competitor SERP and content gap analysis.
  Focus on Northwind and Helios as Tier-1 competitors. Also check any new competitor domains
  in `competitor-watch/tracked-domains.md`.

  For each of the top 5 keywords where a competitor outranks us:
  1. Document the competitor's ranking page: URL, estimated word count, heading structure summary,
     content angle, and what we're missing vs their page.
  2. Classify the gap: depth (they go deeper), freshness (their content is newer), format
     (they have a table/tool/video we don't), or authority (more backlinks).
  3. Recommend: new page to create, existing page to refresh, or format to add.

  Also: flag any new competitor content (blog posts, landing pages, tool pages) published in the
  past 7 days that targets keywords we care about.

  Write findings to `competitor-watch/serp-<YYYY-MM-DD>.md`.
  Surface the top 3 SERP gaps in `seo-workspace/index.html`.
  Cross-reference the flagship Competitive Intelligence cabinet for the broader competitive picture.
cabinetPath: cabinets/seo-content
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
