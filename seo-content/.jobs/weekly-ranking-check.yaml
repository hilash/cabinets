id: weekly-ranking-check
name: Weekly Ranking Check
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: seo-researcher
agentSlug: seo-researcher
timeout: 600
prompt: |-
  Produce the weekly ranking report for all tracked keywords.
  1. Read `keywords/tracked.md` for the current tracked keyword set.
  2. Read the latest Search Console export in `rankings/raw/` — compare this week's positions to last week's.
  3. For each keyword: compute position delta (positive = improved, negative = dropped).
  4. Flag any page that dropped >5 positions — mark as "Watch" in tracked.md.
  5. Identify keywords where rank crossed a significant threshold (e.g., moved into/out of top 10, top 3).
  6. Compute the traffic delta for flagged pages using the estimated click model (CTR × volume).
  7. Write the full ranking report to `rankings/weekly-<YYYY-MM-DD>.md` with:
     - Summary: keywords improved / held / dropped / new on page 1.
     - Top movers (up and down).
     - Traffic-weighted opportunity table.
  8. Update `seo-workspace/index.html` keyword table to reflect current ranks.
  Lead with "This week's ranking summary" before the table.
cabinetPath: cabinets/seo-content
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
