id: weekly-adr-review
name: Weekly ADR Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 600
prompt: |-
  Run the weekly ADR library health review.

  Read every ADR file in architecture-decision/adrs/ and the index in architecture-decision/adrs/index.md.

  Produce a health review report to architecture-decision/adrs/review-latest.md:

  ## ADR Library Review — <date>

  ### Stale Proposals (Proposed status for >30 days)
  For each: ADR ID, title, date proposed, days since proposal, last author.
  Recommended action: "Escalate to owner for accept/reject/withdraw decision."

  ### Potentially Outdated Decisions (Accepted ADRs that may need revisiting)
  Flag ADRs where:
  - The technology chosen has had a major version change or EOL since the decision date.
  - The decision is >18 months old and involves a fast-moving area (AI/ML, cloud primitives, security).
  - The "consequences negative" section mentioned a risk that is now a known reality.
  For each: ADR ID, title, flag reason, recommended review by.

  ### Ownership Gaps
  ADRs with no author field, or where the author is no longer on the team (cross-check with
  architecture-decision/adrs/team-roster.md if it exists).

  ### Missing Foundational ADRs
  Based on the existing library, are there architectural choices being assumed but never formally
  decided? List up to 3 recommended topics for a new ADR.

  ### Summary
  Total ADRs: <N> (Accepted: <N>, Proposed: <N>, Superseded: <N>)
  Library health: Good / Needs attention / Action required (choose one with one-sentence rationale).

  Also update the architecture-decision/adr-library/index.html to reflect any status changes
  identified (e.g., mark overdue proposals prominently).
cabinetPath: cabinets/architecture-decision
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
