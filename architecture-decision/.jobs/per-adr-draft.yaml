id: per-adr-draft
name: Per-ADR Draft
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: engineering-agent
agentSlug: engineering-agent
timeout: 900
prompt: |-
  Draft a new Architecture Decision Record (ADR).

  Trigger with: a decision topic or prompt. Examples:
  - "We need to choose a message broker for our event pipeline."
  - "Should we adopt a monorepo or stay with separate repos?"
  - "We decided to use Postgres for the new analytics store."

  STEP 1 — Engineering Agent: produce the complete ADR draft.

  Determine the next sequential ADR ID from architecture-decision/adrs/index.md.
  Draft the ADR in the standard format:

  ---
  id: ADR-<NNN>
  title: <Decision title>
  date: <today's date>
  status: Proposed
  author: <trigger provides owner name, else "Engineering Lead">
  ---

  ## Context
  What is the situation? What forces, constraints, and requirements are at play?
  What problem does this decision solve? (3–6 sentences minimum — this is the most important section.)

  ## Decision
  What is the decision? State it as a direct, declarative sentence.
  "We will use X for Y because Z."

  ## Consequences
  ### Positive
  - (list positive consequences)
  ### Negative / Risks
  - (list genuine negative consequences and risks — do not omit these)
  ### Neutral
  - (list neutral notable changes)

  ## Alternatives Considered
  For each alternative:
  **<Alternative name>**: <one-sentence description>. Rejected because: <specific reason>.
  (List at least 2 alternatives.)

  ## Related ADRs
  (Research Agent will fill this in — leave as [TBD])

  STEP 2 — Research Agent: review the draft against the existing library.
  - Check all files in architecture-decision/adrs/ for contradictions with the draft's decision.
  - Suggest 2–5 related ADRs to cross-reference.
  - Return findings to Engineering Agent.

  STEP 3 — Engineering Agent: incorporate Research Agent's feedback.
  Write the final ADR to: architecture-decision/adrs/<NNN>-<slug>.md
  Update architecture-decision/adrs/index.md with the new entry (ID, title, status, date, author).
  Update architecture-decision/adr-library/index.html to include the new ADR.
cabinetPath: cabinets/architecture-decision
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
