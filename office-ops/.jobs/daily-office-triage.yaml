id: daily-office-triage
name: Daily Office Ops Triage
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: ops-workflow
agentSlug: ops-workflow
timeout: 600
prompt: |-
  Run the daily office operations triage. Produce a clear, actionable morning
  brief for the office manager.

  STEP 1 — FACILITIES TICKETS
  Read `tickets/open-tickets.yaml`. For each open ticket:
  - P1 (Safety/Building Access): if open >4h without status update, escalate
    immediately — surface at top of report with "ESCALATE NOW" tag.
  - P2-P3: flag any ticket with no status change in >3 business days.
  - List all open tickets: priority, title, owner, age (days open), last update.
  - List tickets resolved/closed since yesterday.

  STEP 2 — TODAY'S VISITORS
  Read `visitors/schedule.yaml`. Find all visitors with arrival_date = today.
  For each: name, company, host, arrival time, requirements (NDA/badge/parking).
  Draft a host reminder message for Slack (send 30 min before arrival).
  If no visitors today, note that.

  STEP 3 — RECURRING TASKS DUE TODAY
  Read `tasks/recurring-tasks.yaml`. Surface any task where next_due <= today.
  List: task name, owner, cadence, last completed. Mark as "reminded" with
  today's date.

  STEP 4 — SUPPLY ALERTS
  Read `supplies/inventory.yaml`. Surface any item where
  current_level <= reorder_threshold. List: item, current level, threshold,
  supplier. (Full reorder analysis runs Monday — today just alerts.)

  STEP 5 — WRITE REPORT
  Write to `reports/triage-<YYYY-MM-DD>.md` with structure:
    ## Escalations (if any)
    ## Open Tickets
    ## Today's Visitors
    ## Tasks Due Today
    ## Supply Alerts
    ## Closed Yesterday
  Post a summary to the #office-requests Slack channel.
cabinetPath: cabinet-examples/cabinets/office-ops
