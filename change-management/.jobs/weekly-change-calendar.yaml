id: weekly-change-calendar
name: Weekly Change Calendar
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: change-workflow
agentSlug: change-workflow
timeout: 600
prompt: |-
  Produce the weekly change calendar and CAB agenda for the current week.

  Read all changes in `/changes/index.md` with status in:
  (ready-for-cab, ready-standard, approved, emergency-track, in-progress)
  that have a change_window date falling in the current Mon–Sun week.

  For each change, read `/changes/<change-id>/packet.md` and
  `/changes/<change-id>/approvals.md`.

  1. CAB agenda — all Normal changes requiring CAB review this week.
     For each: change ID, title, requestor, affected systems, risk level (badge),
     change window, approval status (pending/approved/rejected), reviewer notes summary.
     Produce `/reports/cab-agenda-YYYY-MM-DD.md`.

  2. Full change calendar — all changes this week including Standard and Emergency.
     Table: change ID, title, type, risk level, change window (start + duration),
     responsible team, approval status, rollback plan owner.

  3. Approval gaps. For Normal changes in `ready-for-cab` status with no approvals
     logged in `/changes/<change-id>/approvals.md` and change window within 48 hours:
     flag as URGENT — list in the calendar with "Approval required before window."

  4. Post-implementation follow-up. For changes whose change_window ended in the
     past 7 days, check if `/changes/<change-id>/pir.md` exists.
     If not and the change was High or Critical risk: flag as PIR overdue.
     Append to `/reports/pir-overdue.md`.

  5. Upcoming freeze windows. Check `/data/freeze-windows.md` for any freeze
     starting in the next 14 days. Include a callout in the calendar with the freeze
     dates and the last safe window for submitting changes.

  Write the full calendar to `/reports/change-calendar.md` (overwrite each week).
  Write the CAB agenda to `/reports/cab-agenda.md` (overwrite each week).
cabinetPath: cabinets/change-management
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
