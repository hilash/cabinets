prompt: |-
  Review the KPI page and current assumptions for Text Your Mom.
  Write a monthly runway review that covers:
  - subscriber growth
  - trial to paid conversion
  - retention pressure
  - CAC and payback assumptions
  - whether the company should spend more, hold, or cut
  Save the review under /company/kpis or a finance subpage.
