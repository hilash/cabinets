id: weekly-battlecard-refresh
name: Weekly Battlecard Refresh
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: writer-agent
agentSlug: writer-agent
timeout: 900
prompt: |-
  Refresh all active battlecards in `/battlecards/` based on the Research Agent's
  weekly brief at `/signals/writer-brief.md`.

  For each competitor with an existing battlecard:
  1. Read the current battlecard at `/battlecards/<competitor>.md`.
  2. Check the writer-brief for signals flagged as changes to this competitor's battlecard.
  3. For each flagged change:
     - Update the relevant battlecard section (Counter-Pitch, Objection Responses,
       Proof Points, Traps, Landmines, or Pricing Delta).
     - Mark any section invalidated by a competitor move as `[UPDATED — <date>]`.
     - Mark any section that has not been validated in 90 days as `[REVIEW NEEDED]`.
  4. If a new objection appeared in Gong mentions or win/loss data, add it to
     the Objection Responses section AND to `/battlecards/objections.md`.
  5. Update the battlecard metadata line: `last-refreshed: <date>`.

  After refreshing all battlecards, write a refresh summary to `/battlecards/refresh-log.md`:
  date | battlecard | sections updated | new objections added | sections flagged for review.

  Do not refresh a battlecard if the writer-brief has no signals for that competitor —
  mark it `last-refreshed: <date> (no changes)` instead.
cabinetPath: cabinet-examples/cabinets/sales-battlecard
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
