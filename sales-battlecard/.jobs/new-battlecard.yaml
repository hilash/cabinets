id: new-battlecard
name: New Battlecard
enabled: false
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: writer-agent
agentSlug: writer-agent
timeout: 900
prompt: |-
  Create a new battlecard for a competitor that has appeared in 2+ deals.
  The competitor name is specified in `/signals/new-battlecard-request.md`.

  Gather inputs:
  1. Read all available signals for this competitor from `/signals/` (Gong mentions,
     CRM closed-lost reasons, any CI cabinet entries).
  2. Research the competitor's public positioning: pricing page, product page, case studies,
     G2 reviews, and any recent press releases.
  3. Pull win/loss context from CRM for any deal where this competitor was cited.

  Produce the battlecard at `/battlecards/<competitor>.md` with these sections:
  - Metadata: competitor name, tier, threat level, created date, last refreshed
  - How They Pitch (their value proposition + common demo flow)
  - Our Counter (our positioning response — specific, not generic)
  - Traps to Set (3–5 discovery questions that expose their gaps)
  - Proof Points (2–3 deal-tested examples — name the account archetype)
  - Landmines to Avoid (where we are weak vs. this competitor — honest)
  - Pricing Delta (their price vs. ours, packaging differences)
  - Recommended Collateral (which decks/one-pagers to use)

  Mark each section with its source. Mark any unverified claims explicitly.
  Add the competitor to `/battlecards/index.md`.
cabinetPath: cabinet-examples/cabinets/sales-battlecard
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
