id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor intelligence cut for battlecard maintenance.

  Pull signals from the past 7 days relevant to each tracked competitor
  (Northwind, Helios, Cobalt, Drachma). For each material move:
  1. What happened — sourced. Link to the pricing page diff, press release, G2 review,
     Gong mention count, or CI cabinet signal reference.
  2. Which battlecard section it invalidates or strengthens.
  3. The implication for our sales motion: does this change how we position, what we
     demo, or how we handle a specific objection?
  4. Recommended battlecard update (the specific text change).

  Cross-reference `../competitive-intelligence` for the full landscape and the
  weekly briefing. Pull competitor mentions from Gong transcripts for this week.
  Check CRM closed-lost reasons for new competitor patterns.

  Write findings to `/signals/writer-brief.md` (overwrite — this is the Writer Agent's
  weekly input).
  Archive the week's signals to `/signals/weekly-<date>.md`.
  Flag Priority 1 changes (invalidate a current "we win because" statement) at the top.
cabinetPath: cabinet-examples/cabinets/sales-battlecard
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
