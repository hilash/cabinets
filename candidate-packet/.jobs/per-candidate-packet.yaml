id: per-candidate-packet
name: Per-Candidate Packet (On-Demand)
enabled: false
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 900
prompt: |-
  Produce a candidate packet for a specific candidate and role.

  You will be given the candidate slug and role (either inline or in a file at
  `requests/packet-<slug>.md`).

  Steps:
  1. Confirm source files exist:
     - `interviews/<slug>/` (at least 2 interviewer files)
     - `scorecards/<slug>/scorecard.md`
     - Resume file: `resumes/<slug>.md` or `resumes/<slug>.pdf` (use text if PDF)
     - Take-home (if applicable): `take-homes/<slug>/`
  2. If any required source is missing, write a blocker note to
     `packets/<slug>/missing-sources.md` — do not produce a partial packet.
  3. Instruct the Candidate Summarizer to produce the packet draft at
     `packets/<slug>/packet-draft.md`.
  4. Review the draft for completeness:
     - All interviewers covered
     - All scorecard competencies rated
     - Disagreements surfaced explicitly
     - Draft recommendation present and labeled
  5. On approval, promote to `packets/<slug>/packet.md`.
  6. Write a one-line entry to `pipeline/log.md`: date, candidate, role, status=packet-ready.
cabinetPath: cabinet-examples/cabinets/candidate-packet
