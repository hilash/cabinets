id: daily-debrief-prep
name: Daily Debrief Preparation Check
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 600
prompt: |-
  Run the daily debrief preparation check.

  1. Read `calendar/debriefs.md` and identify all debriefs scheduled in the
     next 48 hours (today and tomorrow).
  2. For each scheduled debrief:
     a. Check if a complete packet exists at `packets/<candidate-slug>/packet.md`.
        "Complete" means: all interviewers covered, scorecard present, draft
        recommendation present.
     b. If packet is missing or incomplete: instruct the Candidate Summarizer
        to produce it with a 4-hour deadline before the debrief time.
        Write the request to `requests/urgent-<slug>-<date>.md`.
     c. If packet exists and is complete: log as ready.
  3. Write the daily readiness report to `prep/daily-<date>.md`:
     - Header: date, number of debriefs in next 48h, number ready vs. pending
     - Per debrief: candidate, role, scheduled time, packet status, urgency flag
  4. If any debrief is <4h away and the packet is not ready, write an alert to
     `prep/alerts.md` — this is a critical failure that requires manual recruiter action.
cabinetPath: cabinet-examples/cabinets/candidate-packet
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
