id: weekly-calendar-fill
name: Weekly Calendar Fill
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: editor-in-chief
agentSlug: editor-in-chief
timeout: 600
prompt: |-
  Read `brand/index.md` to confirm newsletter premise, target reader, default issue format, and cadence.

  Open `issue-calendar.csv` and count rows whose `status` is `idea` or `outlined`.

  If that count is less than 6, append new issue ideas until 6 fresh ones are queued. For each row:
  - `issue_number` — next available integer
  - `working_title` — under 70 characters, ad-copy quality
  - `premise` — one sentence: what the reader takes away
  - `format` — curated / essay / deep-dive / digest / listicle / interview / lessons
  - `target_words` — match `brand/index.md`
  - `status` — `idea`
  - `target_send_date` — match cadence
  - `referral_hook` — one sentence describing what makes this issue forward-worthy
  - `notes` — anything the editor needs to know

  Do not modify rows already `drafted`, `scheduled`, or `sent`. Do not delete rows.

  Append a "## Calendar update — [YYYY-MM-DD]" block to `index.md` listing the new issue numbers and titles.
cabinetPath: cabinets/newsletter-factory
createdAt: '2026-04-27T00:00:00.000Z'
updatedAt: '2026-04-27T00:00:00.000Z'
