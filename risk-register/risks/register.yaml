# Risk Register
# Updated: 2026-05-19
# Scoring: Likelihood 1–5, Impact 1–5, Score = L×I
# RAG: Red ≥ 16 | Amber 9–15 | Green ≤ 8

risks:

  - id: RISK-001
    title: Third-party SaaS vendor suffers breach exposing customer data
    category: Vendor Risk
    description: >
      A critical SaaS vendor (e.g., CRM, support platform) in our supply chain
      suffers a data breach, exposing customer PII or confidential data we have
      shared with them under DPA. We have limited visibility into their security
      posture between annual reviews.
    likelihood: 3
    likelihood_rationale: Industry-wide SaaS breach rate is rising; 2 supply-chain breaches in our sector in 2025.
    impact: 5
    impact_rationale: Customer PII exposure triggers GDPR Art.33 notification, potential regulatory fine, and reputational damage.
    score: 15
    rag: amber
    owner: marcus.lane@company.com
    mitigation_status: in-progress
    mitigation_plan: >
      Annual SOC2 review of all Tier 1 vendors; DPAs signed; vendor register maintained in Vanta.
      Open action: implement continuous monitoring via Vanta for SOC2 expiry alerts (due 2026-06-30).
    next_review_date: '2026-06-02'
    last_updated: '2026-05-19'
    status: open

  - id: RISK-002
    title: Phishing attack leading to credential compromise
    category: Human Risk
    description: >
      An employee falls for a targeted phishing email, compromising their credentials.
      Despite MFA enforcement via Okta, an adversary could exploit session hijacking
      or an MFA fatigue attack to gain initial access.
    likelihood: 4
    likelihood_rationale: Phishing attempts logged weekly in email gateway; 2 near-misses in Q1 2026.
    impact: 4
    impact_rationale: Credential compromise of an engineer with prod access could lead to data exfiltration.
    score: 16
    rag: red
    owner: daniel.osei@company.com
    mitigation_status: in-progress
    mitigation_plan: >
      Phishing-resistant MFA (FIDO2/WebAuthn) deployment for privileged users underway.
      Security awareness training Q2 2026. Email gateway upgraded with DMARC/DKIM/SPF enforcement.
      Open: FIDO2 rollout for all engineers by 2026-06-15.
    next_review_date: '2026-06-02'
    last_updated: '2026-05-12'
    status: open

  - id: RISK-003
    title: Ransomware attack on production infrastructure
    category: Cyber Threat
    description: >
      A ransomware actor gains access to production infrastructure via a compromised
      credential or unpatched vulnerability, encrypts data or disrupts service,
      and demands payment.
    likelihood: 2
    likelihood_rationale: No prior incidents; cloud-native architecture limits attack surface; EDR deployed.
    impact: 5
    impact_rationale: Production outage would breach customer SLAs; data encryption could require restoration from backup.
    score: 10
    rag: amber
    owner: daniel.osei@company.com
    mitigation_status: active
    mitigation_plan: >
      Immutable backups in separate AWS account (tested quarterly); EDR on all endpoints;
      network segmentation via VPC security groups; 14-day patch SLA for Critical CVEs.
      Last backup restoration test: April 2026 — successful.
    next_review_date: '2026-08-01'
    last_updated: '2026-05-01'
    status: open

  - id: RISK-004
    title: GDPR non-compliance due to inadequate data subject request process
    category: Regulatory Risk
    description: >
      A data subject submits a right-to-erasure or data portability request that
      is not fulfilled within the 30-day GDPR deadline, leading to a complaint
      to the supervisory authority and potential regulatory action.
    likelihood: 3
    likelihood_rationale: Current DSR process is manual; volume increasing as EU customer base grows.
    impact: 3
    impact_rationale: Supervisory authority complaint; potential fine under GDPR Art.83; reputational risk.
    score: 9
    rag: amber
    owner: marcus.lane@company.com
    mitigation_status: planned
    mitigation_plan: >
      Manual DSR process documented; DPO reviews each request. Open: build automated
      DSR workflow in Q3 2026 to handle volume and enforce 30-day SLA (Jira: SEC-412).
    next_review_date: '2026-07-01'
    last_updated: '2026-04-15'
    status: open

  - id: RISK-005
    title: Key-person dependency — CISO departure
    category: Operational Risk
    description: >
      The CISO is the sole owner of critical security processes (vendor approvals,
      pen test scope, board reporting). Unplanned departure would leave material
      gaps in the security programme.
    likelihood: 2
    likelihood_rationale: No current attrition signal; compensation competitive; 18-month tenure.
    impact: 4
    impact_rationale: Programme continuity at risk; compliance commitments to customers could be delayed.
    score: 8
    rag: green
    owner: priya.shah@company.com
    mitigation_status: active
    mitigation_plan: >
      Succession plan documented; security runbook maintained at `policies/security-runbook.md`;
      Deputy designated (Priya Shah, Head of GRC). Reviewed annually.
    next_review_date: '2026-11-01'
    last_updated: '2026-03-01'
    status: open

  - id: RISK-006
    title: Unpatched critical CVE in production dependency
    category: Vulnerability Management
    description: >
      A critical CVE is published affecting a library or runtime in use in production.
      Patch is not applied within the 14-day SLA, leaving the vulnerability exposed.
    likelihood: 3
    likelihood_rationale: We ship ~3 releases/week; dependency backlog occasionally slips SLA; 1 miss in Q1.
    impact: 4
    impact_rationale: Exploitable CVE in prod could lead to RCE or data exfiltration.
    score: 12
    rag: amber
    owner: daniel.osei@company.com
    mitigation_status: active
    mitigation_plan: >
      Snyk continuous scanning; Critical/High CVE tickets auto-created in Jira with 14-day due date.
      Q1 2026: 94% of Critical CVEs patched within SLA (1 miss, SEC-389, remediated in 18 days).
      Open: improve SLA tracking dashboard (Jira: SEC-420, due 2026-06-01).
    next_review_date: '2026-06-16'
    last_updated: '2026-05-05'
    status: open
