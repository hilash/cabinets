id: monthly-risk-report
name: Monthly Risk Report
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: risk-agent
agentSlug: risk-agent
timeout: 1200
prompt: |-
  Produce the monthly risk report for leadership and the board.

  Pull all data from `risks/register.yaml`, individual risk files in `risks/`,
  weekly review summaries in `reviews/`, and the prior month's report for delta comparison.

  The report must include:

  1. EXECUTIVE SUMMARY (3–5 sentences, written for a non-technical leadership audience)
     - Overall risk posture: improving / stable / deteriorating
     - Number of Red / Amber / Green risks vs. prior month
     - Most significant risk change this month and why it matters
     - Board recommendation (if any Red risk requires board-level decision)

  2. RISK HEATMAP NARRATIVE
     Describe the current likelihood × impact distribution in plain language.
     Which quadrant has the most density? Has it shifted?

  3. TOP 5 RISKS BY COMPOSITE SCORE
     For each: title, category, score (L×I), RAG, owner, mitigation status,
     one-sentence "why this matters" written for a board audience.

  4. CHANGES THIS MONTH
     - Risks that escalated (score increased or moved to Red)
     - Risks that improved (score decreased or moved to Green)
     - Risks closed this month (with evidence of remediation)
     - New risks added this month

  5. OWNER ACCOUNTABILITY SUMMARY
     Owners with overdue reviews or stalled mitigations.

  6. NEXT MONTH FOCUS
     Top 3 priorities for the security team in the coming month.

  Write the report to `reports/<YYYY-MM>-risk-report.md`.
  Update the heatmap data in `risk-dashboard/index.html` if the file uses inline
  JS data arrays — update the risk counts to match this month's register.

  Rules:
  - Every score cited must match `register.yaml` exactly.
  - The board summary must not contain jargon (no "CVEs", "CVSS", "lateral movement").
  - If any risk is scored Red, the board summary must address it by name.
cabinetPath: cabinets/risk-register
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
