id: stall-diagnostic
name: Stall Diagnostic (on plateau)
enabled: true
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: keto-coach
agentSlug: keto-coach
timeout: 600
prompt: |-
  A plateau has been detected (weight flat ≥14 days with adherence intact).

  Walk the diagnostic checklist from sources/keto/stall-diagnostic in order:
    1. Calorie math (tracked vs actual)
    2. Hidden carbs (sauces, nuts, dairy, "keto" products)
    3. Electrolyte status (esp. sodium water-weight rebound)
    4. Whoosh timing (normal 1–3 week plateaus in fat-loss)
    5. Sleep / stress (cortisol-mediated stalls)
    6. Cycle phase (if applicable — late luteal water retention)

  Write stalls/YYYY-MM-DD.md with the likely culprit and ONE test to run for 5–7 days.
cabinetPath: cabinets/cabinets/keto-hq
createdAt: '2026-04-23T00:00:00.000Z'
updatedAt: '2026-04-23T00:00:00.000Z'
