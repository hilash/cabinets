id: weekly-electrolyte-review
name: Weekly Electrolyte Review
enabled: true
schedule: 30 9 * * 0
provider: claude-code
adapterType: claude_local
ownerAgent: keto-coach
agentSlug: keto-coach
timeout: 600
prompt: |-
  Read logs/ (food + symptoms) for the past 7 days.

  Write briefs/electrolytes-week-YYYY-WW.md with:
    1. Intake estimates (sodium, potassium, magnesium)
    2. Symptoms flagged in log
    3. Likely cause mapping (symptom → mineral)
    4. One adjustment for next week

  Hard rules:
    - BP meds / renal / heart failure → defer to physician
    - Potassium OTC limit 99 mg/pill — never recommend higher
    - Food first, always
cabinetPath: cabinets/cabinets/keto-hq
createdAt: '2026-04-23T00:00:00.000Z'
updatedAt: '2026-04-23T00:00:00.000Z'
