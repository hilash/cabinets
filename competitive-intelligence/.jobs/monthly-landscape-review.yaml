id: monthly-landscape-review
name: Monthly Landscape Review
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: intel-director
agentSlug: intel-director
timeout: 1800
prompt: |-
  Produce the monthly competitive landscape review from the last 4 weekly briefings,
  the full `/signals/log.md`, and every `competitors/` profile. Write it to
  `briefing/landscape/` (dated) and update the dashboard's landscape view.

  The review must contain:
  1. MARKET MAP — where each tracked competitor sits (segment, motion, price point).
     Note any movement vs last month (who moved upmarket, who cut price, who pivoted).
  2. SHARE OF VOICE — relative momentum this month (releases shipped, funding, hiring,
     review volume & sentiment, press). Rank the field.
  3. THREAT RE-TIERING — recommend any Tier 1/2/3 changes with the reason. Re-tier
     aggressively; a competitor that went quiet drops, a fast mover rises.
  4. WIN/LOSS THEMES — the month's clustered competitive win/loss reasons. Which
     competitor is costing us the most deals, and on what objection.
  5. STRATEGIC IMPLICATIONS — 3–5 recommendations for product, pricing, and GTM,
     each tied to evidence from the month.
  6. WHAT WE GOT WRONG — where last month's briefings called something that didn't
     play out. Calibrate.

  This is the leadership-grade artifact. It should be forwardable to the exec team
  and the board competition section with zero rework.
