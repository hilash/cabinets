id: weekly-competitor-briefing
name: Weekly Competitor Briefing
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: intel-director
agentSlug: intel-director
timeout: 1200
prompt: |-
  Produce this week's competitor briefing from the last 7 days of `/signals/log.md`
  and the current `competitors/` profiles. Update the report app at `briefing/`
  (index.html) and write a dated markdown copy to `briefing/archive/`.

  The briefing must contain:
  1. THE WEEK IN ONE LINE — the single most important competitive move and why it matters.
  2. MATERIAL MOVES — for each: what happened (sourced), which competitor, and the
     IMPLICATION FOR US (which deals/segments/messaging it affects + recommended response).
     Skip noise; only material signals make the briefing.
  3. PRICING WATCH — any pricing/packaging changes this week, with the delta vs us.
  4. WIN/LOSS SIGNAL — competitor mentions in won/lost deals this week (from CRM/Gong), clustered.
  5. BATTLECARD CHANGES — which battlecards changed and what reps need to know now.
  6. WATCHLIST — what to watch next week.

  Rules:
  - Every claim links to a signal with a source. No source, no claim.
  - Lead with implications, not activity. "So what for us" on every item.
  - Ship on time. Monday 08:00 even if a competitor moved Sunday night.

  Have the Competitor Analyst refresh any affected profile/battlecard before publishing.
cabinetPath: cabinet-examples/cabinets/competitive-intelligence
