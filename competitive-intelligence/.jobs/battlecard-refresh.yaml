id: battlecard-refresh
name: Battlecard Refresh
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: competitor-analyst
agentSlug: competitor-analyst
timeout: 900
prompt: |-
  Refresh every Tier 1 battlecard under `competitors/` against this week's signals
  in `/signals/log.md`.

  For each Tier 1 competitor:
  - Re-check pricing & packaging vs our current pricing; update the head-to-head delta.
  - Update "how they pitch against us" and "our counter" if positioning shifted.
  - Add any new proof point or new landmine surfaced this week.
  - Update the dated "recent moves" list and prune anything now stale.
  - If nothing changed, stamp the battlecard `verified <date>` so reps know it's current.

  A battlecard is written for a rep mid-call: short, scannable, blunt, sourced.
  Flag to the Intel Director any battlecard where a competitor now genuinely beats us
  on a dimension we used to win — that needs a GTM/product response, not just a card edit.
cabinetPath: cabinet-examples/cabinets/competitive-intelligence
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
