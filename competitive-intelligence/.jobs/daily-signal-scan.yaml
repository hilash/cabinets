id: daily-signal-scan
name: Daily Signal Scan
enabled: true
schedule: 0 7 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: signal-scout
agentSlug: signal-scout
timeout: 900
prompt: |-
  Run the morning competitor sweep across every Tier 1 competitor in
  `competitors/index.md` (and Tier 2 on Mondays).

  For each competitor, check and diff against the last scan:
  - changelog / release notes
  - pricing & packaging page (capture before/after if it changed)
  - blog / newsroom
  - careers page (new roles signal strategy — new market, new product line)
  - G2 / Capterra recent reviews
  - news & funding mentions
  - social (LinkedIn / X)

  For every NEW signal, append a row to `/signals/log.md` with:
    date | competitor | type (pricing/product/positioning/funding/hiring/review/news) |
    one-line description | source URL | materiality (material/minor/noise)

  If anything looks MATERIAL (price change, launch that hits our differentiation,
  funding round, senior hire in a new market), flag it at the top of today's entry
  and notify the Intel Director — do not wait for the weekly briefing.

  Every signal must carry a source URL. No link → log as `unverified`.
  Produce a short digest: # new signals, # material, top 3 to watch.
cabinetPath: cabinet-examples/cabinets/competitive-intelligence
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
