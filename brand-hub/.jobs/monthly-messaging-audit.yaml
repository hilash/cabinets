id: monthly-messaging-audit
name: Monthly Messaging Consistency Audit
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: brand-qa
agentSlug: brand-qa
timeout: 900
prompt: |-
  Run the monthly messaging consistency audit.
  1. Read `messaging/pillars.md` — the 3 current messaging pillars and their approved language.
  2. Read all copy in `messaging/approved-copy.md`.
  3. For each externally-facing copy block you can access (website snippets in `assets/web-copy/`,
     email templates in `assets/email-templates/`, deck headers in `assets/presentations/`):
     - Map each piece of copy to a pillar (or note if it maps to none).
     - Check: correct product name capitalization, no unapproved claims, no contradictions.
  4. Rate each deviation: Critical (contradicts a pillar or makes unapproved claims) · Major (unclear
     pillar alignment) · Minor (word choice drift, capitalization, tone).
  5. Compute: overall consistency score (% of reviewed pieces with no Critical or Major issues).
  6. Write the full audit to `audits/messaging-<YYYY-MM-DD>.md`:
     - Consistency score
     - Critical findings (list with copy excerpt + issue + recommended fix)
     - Major findings
     - Minor findings
     - Trend vs last month
  7. If consistency score <80%: create a remediation task in `audits/remediation-queue.md`.
cabinetPath: cabinets/brand-hub
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
