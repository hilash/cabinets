id: weekly-brand-asset-review
name: Weekly Brand Asset Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: brand-researcher
agentSlug: brand-researcher
timeout: 600
prompt: |-
  Run the weekly brand asset review.
  1. Read `assets/inventory.md` — identify all assets not verified in the past 90 days (check "Last verified" field).
     Flag them in `reviews/weekly-<YYYY-MM-DD>.md` with severity: HIGH if used in active campaigns, LOW otherwise.
  2. Check `assets/intake-queue.md` for any new submissions pending Brand QA review.
     For each: confirm it was handed off to Brand QA with a checklist note in `audits/intake-<item-slug>.md`.
  3. Check if any new campaign assets appeared in `../campaign-launch/campaigns/` that aren't in inventory.
     If found: add to intake queue and notify Brand QA.
  4. Run a spot check on `messaging/approved-copy.md` — verify the date stamps are within 6 months.
     Flag any copy block older than 6 months for Brand QA review.
  5. Update `brand-hub/index.html` if any new assets or messaging pillars have been added this week.
  6. Write the weekly review to `reviews/weekly-<YYYY-MM-DD>.md`:
     - Assets reviewed (count)
     - New intakes (count)
     - Flagged for re-verification (list)
     - Copy blocks due for refresh (list)
cabinetPath: cabinets/brand-hub
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
