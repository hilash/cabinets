id: weekly-action-item-followup
name: Weekly Action-Item Follow-up
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: qa-agent
agentSlug: qa-agent
timeout: 600
prompt: |-
  Run the weekly postmortem action-item follow-up.

  Read incident-postmortem/postmortems/action-items.md — the running register of all open
  action items across incidents.

  For each action item with status "open" or "in-progress":
  1. Check if the due date has passed. Flag as OVERDUE if so.
  2. Check if the linked Jira/Linear ticket has moved to Done. If yes, mark as ready-to-close.
  3. Flag any item that has been open for >14 days with no status change.

  Write the follow-up report to:
  incident-postmortem/postmortems/followup-<YYYY-MM-DD>.md

  The report format:
  ## Postmortem Action-Item Follow-up — <date>

  ### Overdue Items (due date passed, status not Done)
  For each: incident ID, action description, owner, original due date, days overdue.

  ### Due This Week (due date within next 7 days)
  For each: incident ID, action description, owner, due date, current ticket status.

  ### Ready to Close (ticket Done, awaiting register update)
  List items to close. Update action-items.md to mark them as "done" with closed date.

  ### No Movement >14 Days
  Items open >14 days with no status change. Include a one-line note to the owner.

  Update incident-postmortem/postmortems/action-items.md with any status changes identified
  (mark done items as done; note overdue items).
cabinetPath: cabinets/incident-postmortem
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
