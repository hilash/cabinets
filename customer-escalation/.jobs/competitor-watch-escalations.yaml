id: competitor-watch-escalations
name: Escalation Competitor Watch — Switching Risk from Incidents
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: escalation-summary
agentSlug: escalation-summary
timeout: 600
prompt: |-
  Produce the weekly competitor watch focused on escalation-driven switching risk.

  Review all escalations from the past 30 days in `escalations/` (both open and
  recently resolved). For each escalation, check the comms log and timeline for:
  - Competitor mentions by the customer during the incident
  - Customer statements expressing dissatisfaction that could drive switching intent
  - Accounts with escalation history AND an upcoming renewal (cross-reference with
    the renewal-risk cabinet at `../renewal-risk/renewals/index.md`)

  Cross-reference competitor signals from [[../competitive-intelligence]]:
  - Is the escalated issue a known area where a competitor is marketing superiority?
  - Is there a pricing or feature move from a competitor that could amplify the
    escalation's impact on the renewal?

  For each at-risk account: escalation ID, customer, renewal proximity, competitor
  named (if any), switching risk rating (Low / Medium / High), and recommended
  pre-emptive action.

  Write the analysis to `escalations/competitor-watch.md`.
  Lead with "escalation accounts most at risk of churning" — not raw competitor moves.
cabinetPath: cabinet-examples/cabinets/customer-escalation
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
