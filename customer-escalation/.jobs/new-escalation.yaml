id: new-escalation
name: New Escalation — Generate Packet
enabled: false
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: escalation-summary
agentSlug: escalation-summary
timeout: 900
prompt: |-
  Generate a new escalation packet from an incoming escalation trigger.

  Required inputs (set before running):
  - ESCALATION_ID: e.g. "ESC-2026-0048"
  - CUSTOMER_NAME: account name
  - TRIGGER_SOURCE: "Zendesk ticket #XXXX" / "Slack #escalations" / "CSM report"
  - SEVERITY: P1 / P2 / P3
  - INITIAL_DESCRIPTION: what the customer reported

  Step 1 — Create the packet directory:
  Create `escalations/<ESCALATION_ID>/` with:
  - `packet.md`: incident header (ID, customer, ARR from CRM, severity, trigger,
    initial description, escalation owner, status: Open, opened timestamp)
  - `timeline.md`: first entry with trigger event timestamp and source
  - `comms-log.md`: header only (will be filled by Escalation CSM)
  - `technical.md`: header only (will be filled by Engineering Liaison)

  Step 2 — Engineering context (delegate):
  Ask the Engineering Liaison to read the Jira/Linear ticket linked in the trigger
  and write the initial technical section to `escalations/<ESCALATION_ID>/technical.md`.

  Step 3 — Customer communications (delegate):
  Ask the Escalation CSM to send the initial acknowledgement to the customer's
  primary contact within 30 minutes (for P1/P2) and log it in the comms log.

  Step 4 — Executive summary:
  Write the 3-sentence executive summary in `packet.md`:
  what happened, current customer impact, and when it will be resolved.

  Step 5 — Update open escalations:
  Add this escalation to `escalations/open.md`.

  Confirm completion: escalation packet path and severity.
cabinetPath: cabinet-examples/cabinets/customer-escalation
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
