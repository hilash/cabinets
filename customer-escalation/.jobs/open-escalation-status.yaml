id: open-escalation-status
name: Daily Open Escalation Status
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: escalation-summary
agentSlug: escalation-summary
timeout: 600
prompt: |-
  Run the daily open escalation status review.

  Read `escalations/open.md` for all currently open escalations.

  For each open escalation, read `escalations/<id>/packet.md` and `escalations/<id>/timeline.md`.
  Check for any of the following flag conditions:
  - No timeline update in > 24 hours (P1) or > 48 hours (P2/P3)
  - Committed resolution time passed without resolution
  - Severity increased since last review
  - Customer comms log has no entry in > 24 hours (P1) or > 48 hours (P2)

  For each flagged escalation: add a FLAG entry to `escalations/<id>/timeline.md`
  and update the status in `escalations/open.md`.

  Also check for escalations that Engineering Liaison has marked as technically resolved:
  ask the Escalation CSM to confirm customer acknowledgement, then mark the packet
  as Pending Close.

  Write the daily digest to `escalations/open.md`:
  - Open count, P1 count, P2 count, oldest open escalation and age
  - Flagged escalations (stale or SLA breach)
  - Escalations pending closure

  Rules:
  - P1 with no update in > 24 hours = immediately notify VP CS.
  - Do not mark an escalation resolved without customer acknowledgement in the comms log.
  - Every open escalation must have a next-action and a named owner after this review.
cabinetPath: cabinet-examples/cabinets/customer-escalation
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
