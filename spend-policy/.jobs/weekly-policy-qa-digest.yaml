id: weekly-policy-qa-digest
name: Weekly Policy Q&A Digest
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: qa
agentSlug: qa
timeout: 600
prompt: |-
  Run the weekly policy Q&A digest as the Policy QA Agent.

  1. Read `.cabinet-state/anomaly-flag.md` from this week's sweep.
  2. Read `data/policy.md` for current spend policy.
  3. Review all ESCALATE items in the anomaly flag:
     - For each: determine whether the transaction violates policy (cite the specific
       policy section and threshold).
     - Recommend: APPROVE (within policy despite flag), REJECT (clear violation),
       or NEEDS-INFO (ambiguous — state what information is needed).
     - Write determinations to `.cabinet-state/escalation-review.md`.
  4. Compile the weekly policy Q&A digest:
     - Identify 5–8 representative questions the anomaly flags imply employees are
       asking (e.g., "Can I expense a $90 team dinner?" based on meal flags).
     - Write canonical answers for each, citing the policy section.
     - Note any edge cases that reveal a policy gap.
  5. Write the digest to `.cabinet-state/policy-digest.md`. Format:
     ```
     # Spend Policy Digest — Week of <date>
     ## Escalation Reviews
     | Vendor | Amount | Employee Dept | Determination | Reason |
     ...
     ## This Week's Top Policy Questions
     Q: Can I expense [X]?
     A: [Yes/No]. [Policy section citation]. [Any conditions or receipt requirements].
     ...
     ## Policy Gaps to Review
     - [Any ambiguous edge cases Finance should clarify]
     ```
  6. If `data/policy.md` was updated this week (check modified date), notify the
     Research agent by appending a note to `.cabinet-state/policy-digest.md`.

  Rules:
  - All determinations cite specific policy sections.
  - Do not approve or reject actual reimbursements — recommend only.
  - Write the digest in plain English, not legal language.
cabinetPath: cabinets/spend-policy
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
