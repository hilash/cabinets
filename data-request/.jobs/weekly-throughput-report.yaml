id: weekly-throughput-report
name: Weekly Data Team Throughput Report
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: routing-agent
agentSlug: routing-agent
timeout: 600
prompt: |-
  Produce the weekly data team throughput report from `queue/requests.yaml` and
  `queue/triage-log.md`. Cover the rolling 7-day window (Mon–Sun).

  Compute and report:
  1. VOLUME: Total requests received / deflected / answered / in-progress / overdue.
  2. SLA COMPLIANCE: For P1, P2, P3 separately — what % were answered within SLA?
     Flag any SLA breaches with root cause (request complexity? queue overload? unclear spec?).
  3. DEFLECTION RATE: % of requests answered via common-questions or self-serve links.
     High deflection = good. Low deflection = either hard week or under-documented patterns.
  4. BACKLOG AGE: Average age of open requests. Highlight any request open >5 business days.
  5. TOP REQUEST TYPES: Which request types (metric_question / data_pull / analysis) dominated?
     Any patterns in who is requesting and what they need that should inform self-serve tooling?
  6. COMMON QUESTIONS ADDITIONS: Were any new entries added to common-questions this week?

  Write the report to `queue/throughput/YYYY-WXX.md`.
  Update `queue/throughput/index.md` with a link to this week's report.

  Rules:
  - Lead with the SLA compliance rate and backlog health — these are the metrics the data
    team lead cares about most.
  - Identify one recommendation per week (e.g. "3 requests for churn by segment — add a
    self-serve Looker Explore to deflect these").
cabinetPath: cabinet-examples/cabinets/data-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
