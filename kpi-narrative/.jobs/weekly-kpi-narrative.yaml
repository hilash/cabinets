id: weekly-kpi-narrative
name: Weekly KPI Narrative
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 900
prompt: |-
  Produce this week's KPI narrative from `data/kpis.csv`.

  STAGE 1 — ANALYST: Load `data/kpis.csv`. For every metric, compute the WoW delta
  (current week vs prior week) and MoM delta (vs 4 weeks ago). Cluster metrics by
  business area: Growth (new signups, activation rate, trial starts), Revenue (ARR,
  MRR, expansion MRR), Retention (NRR, churn rate, logo retention), and Engagement
  (DAU, WAU, feature adoption). Identify the 3–5 most significant changes (magnitude,
  direction reversal, or threshold breach). For each, write a one-sentence root-cause
  hypothesis with confidence level (confirmed / likely / unclear).

  STAGE 2 — WRITER: Take the Analyst's structured brief and write the weekly narrative:
  - EXECUTIVE SUMMARY: One paragraph, ≤5 sentences, top 3 moves and their business meaning.
  - Per business area: metric moves with WoW delta, plain-English explanation, and a
    "watch next week" callout where relevant.
  - ANOMALIES THIS WEEK: Any flagged anomalies from the daily scan, in plain English.
  - Do NOT use jargon. Lead with business meaning, then the number.

  OUTPUT:
  - Write the narrative to `narratives/YYYY-WXX.md` (use ISO week number).
  - Update the "what changed & why" snippets in `dashboard/index.html` for each KPI tile.
  - Update `narratives/index.md` with a link to this week's report.
  Rules: Every delta cited must match `data/kpis.csv`. Ship by 08:30 Monday. If a
  metric looks like a pipeline issue (null, flat for 3+ days), flag it explicitly.
cabinetPath: cabinet-examples/cabinets/kpi-narrative
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
