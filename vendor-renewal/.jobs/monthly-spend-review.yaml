id: monthly-spend-review
name: Monthly SaaS Spend Review
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: analyst
agentSlug: analyst
timeout: 900
prompt: |-
  Run the monthly SaaS spend review as the Spend Analyst.

  1. Read `data/vendors.csv`. Compute:
     - Total annualized SaaS spend (sum of annual_spend for active vendors).
     - Spend by department (using the department column).
     - Top-5 vendors by spend and their % of total.
     - MoM change vs. `data/spend-review-<prior-month>.md` if available.
  2. Identify renewal candidates (flag with RECOMMEND-REVIEW):
     - Annual spend > $50k AND last_negotiated > 24 months ago.
     - Okta usage data (if available in notes column) shows < 50% seat utilization.
     - Vendor raised price > 15% at last renewal.
  3. Identify cost-reduction opportunities:
     - Overlapping capabilities (note specific vendors).
     - Unused tier upgrades (seats, storage, API calls in notes column).
     - Upcoming renewals with available competitor alternatives.
  4. Write the full spend review to `data/spend-review-<YYYY-MM>.md`:
     - Total spend, by-department table, top-5 concentration.
     - Renewal candidates table with recommended negotiation angle.
     - Cost-reduction opportunities with estimated savings.
     - 3–5 paragraph spend narrative for the dashboard.
  5. Update `dashboard/index.html` with the new spend totals and renewal timeline.

  Rules:
  - Frame recommendations as business decisions, not procurement exercises.
  - Note where data is missing or estimated.
  - Do not contact vendors or commit to contract terms.
cabinetPath: cabinets/vendor-renewal
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
