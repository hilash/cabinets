id: quarterly-qbr-batch
name: Quarterly QBR Batch Run
enabled: true
schedule: 0 9 1 1,4,7,10 *
provider: claude-code
adapterType: claude_local
ownerAgent: qbr-writer
agentSlug: qbr-writer
timeout: 1800
prompt: |-
  Run the quarterly QBR batch for all active accounts.

  For each account in `qbrs/accounts.yaml`:

  Step 1 — Analyst data pull (delegate):
  Ask the QBR Analyst to produce all six data sections for the account:
  usage & adoption, goal attainment, ROI calculation, support summary,
  and benchmark context. Data must be written to `qbrs/<account-slug>/data-<quarter>.md`
  before step 2.

  Step 2 — Write the QBR document:
  Using the Analyst's data, produce the full QBR document in the six-section
  format: (1) Exec Summary, (2) Goals vs Outcomes, (3) Usage & Adoption,
  (4) ROI Realized, (5) Open Issues & Resolutions, (6) Next-Quarter Plan.
  Write to `qbrs/<account-slug>-<YYYY-QN>.md` (e.g. `qbrs/meridian-foods-2026-q2.md`).

  Step 3 — Update the report webapp:
  Update `report/index.html` to display the most recently generated QBR
  (use the highest-ARR account as the default view). Refresh all data arrays
  in the HTML with the current quarter's metrics.

  Step 4 — Update the delivery log:
  Append a row to `qbrs/index.md` with account, quarter, date generated,
  CSM owner, and a link to the document.

  Rules:
  - Exec summary must be ≤ 4 sentences. Business outcomes first.
  - Every goal in section 2 must have an attainment % from the Analyst.
  - ROI must be stated in dollar terms, with formula visible in the markdown.
  - Open issues must have an owner and a resolution date.
  - Do not proceed past Step 1 until the Analyst data file exists.
cabinetPath: cabinets/qbr-generator
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
