id: competitor-watch-qbr
name: QBR Competitor Context Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: qbr-writer
agentSlug: qbr-writer
timeout: 900
prompt: |-
  Produce the weekly competitor context brief for upcoming QBRs.

  Pull the list of QBRs scheduled in the next 30 days from `qbrs/accounts.yaml`.

  For each upcoming QBR account, check:
  - Competitor mentions in the account's prior QBR documents (`qbrs/<account>/`)
  - Known competitor moves from [[../competitive-intelligence]] that are relevant
    to this account's industry and use case
  - Any pricing, feature, or positioning changes that could surface as objections
    in the QBR conversation

  For each account with relevant competitor context:
  - Summarize the top 1–2 competitor risks the CSM should anticipate
  - Provide a 2–3 sentence talking point for the QBR narrative
  - Flag if a competitor move should be incorporated into the ROI or
    next-quarter plan section

  Write the full output to `competitor-watch/latest.md`.
  Format: one section per upcoming QBR account.
  Lead with "what to address in the QBR" — not what competitors did.

  Cross-reference: [[../competitive-intelligence]] for the full competitive landscape.
cabinetPath: cabinets/qbr-generator
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
