id: per-account-qbr
name: Per-Account QBR (On-Demand)
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: qbr-writer
agentSlug: qbr-writer
timeout: 900
prompt: |-
  Generate a QBR for a single account on demand.

  Required inputs (set before running):
  - ACCOUNT_SLUG: the account directory name in `qbrs/`
  - QUARTER: e.g. "2026-Q2"
  - MEETING_DATE: e.g. "2026-06-10"

  Step 1 — Check account context:
  Read `qbrs/<ACCOUNT_SLUG>/goals.md` for the account's stated goals.
  Read `qbrs/<ACCOUNT_SLUG>/` for any prior QBR documents.

  Step 2 — Analyst data pull (delegate):
  Ask the QBR Analyst to produce all data sections for the account and quarter.
  Analyst writes to `qbrs/<ACCOUNT_SLUG>/data-<QUARTER>.md`.

  Step 3 — Write the QBR:
  Produce the full six-section QBR document. Personalize section 1 (Exec Summary)
  to reference the account's specific goals from the prior QBR or kickoff.
  Write to `qbrs/<ACCOUNT_SLUG>-<QUARTER>.md`.

  Step 4 — Update report webapp:
  Update `report/index.html` to display this account's QBR.
  Refresh all metric arrays with the Analyst's data.

  Confirm completion with the file path of the generated QBR document.
cabinetPath: cabinets/qbr-generator
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
