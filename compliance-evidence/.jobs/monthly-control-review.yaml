id: monthly-control-review
name: Monthly Control Review
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: compliance-agent
agentSlug: compliance-agent
timeout: 1200
prompt: |-
  Produce the monthly compliance control review report.

  Pull all data from `evidence-map/controls.yaml`, the evidence gap reports in
  `evidence-gaps/`, and the pull log at `evidence/pull-log.md` for the past 30 days.

  The report must include:

  1. EXECUTIVE SUMMARY
     - Total controls in scope (by framework: SOC2 CC, A-series, GDPR)
     - Coverage % by category: how many are COLLECTED vs. STALE vs. MISSING vs. PARTIAL
     - Delta vs. prior month (did we improve or regress?)
     - Top 3 audit risks this month

  2. CONTROL-BY-CONTROL STATUS TABLE
     For every control: ID, framework, name, evidence status, owner, last-verified date,
     any gap notes. Mark controls that have been MISSING or STALE for >30 days.

  3. CHANGES THIS MONTH
     - Controls that moved from MISSING → COLLECTED (wins)
     - Controls that moved from COLLECTED → STALE (regressions)
     - New controls added to scope
     - Owner changes

  4. OWNER ACCOUNTABILITY
     - List all control owners who have one or more MISSING or STALE controls
     - For each: number of affected controls, oldest gap date, recommended action

  5. NEXT MONTH PRIORITIES
     - Top 5 controls to remediate, with owner and recommended action

  Write the report to `control-reviews/<YYYY-MM>.md`.
  Update the evidence map webapp data if the HTML file at `evidence-map/index.html`
  references inline data arrays — update the figures to match this month's numbers.

  Rules:
  - Every percentage is calculated from `controls.yaml`, not estimated.
  - Owner names must be real (from the YAML), not "the security team".
  - If coverage has regressed month-over-month, call it out explicitly.
cabinetPath: cabinets/compliance-evidence
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
