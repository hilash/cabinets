id: daily-account-sync
name: Daily Account Sync
enabled: true
schedule: 0 7 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: account-agent
agentSlug: account-agent
timeout: 600
prompt: |-
  Pull the CRM delta for every active account tracked in this cabinet.
  Read the account list from `/accounts/index.md`.

  For each account:
  1. Check for stage changes on any open opportunity in the last 24 hours. If a stage changed, append an entry to `/accounts/<name>/activity.md` with: date, type=stage-change, from→to, opportunity name, ARR.
  2. Check for new contacts added to the account in CRM. If new contacts exist, add them to `/accounts/<name>/stakeholders.md` as `status: unresearched` and queue them for the Research Agent.
  3. Check last CRM activity date per opportunity. If last meaningful activity (call, email, meeting) is 14+ days ago, flag the next-step in `/accounts/<name>/opportunities.md` as `⚠ stale`.
  4. If any account has had zero CRM activity in 30 days, write `status: dormant` to `/accounts/<name>/status.md`.

  At the end, write a sync summary to `/accounts/.sync-log.md` with: date, accounts synced, new contacts, stale flags, dormant flags.
cabinetPath: cabinet-examples/cabinets/account-room
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
