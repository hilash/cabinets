id: stakeholder-research
name: Stakeholder Research
enabled: false
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 600
prompt: |-
  Enrich the stakeholder profile for a specific contact flagged by the Account Agent.
  The contact to research is specified in `/accounts/.research-queue.md` (read the first
  unresolved entry).

  For the contact:
  1. Research their LinkedIn profile: current title, tenure at the company, previous roles,
     and any publicly stated priorities (posts, articles, conference talks).
  2. Check for recent company news that would affect their priorities or decision-making.
  3. Identify their likely role in the buying process based on title and department.
  4. Flag any signals relevant to our deal: a recent promotion, a new initiative they're
     leading, a public statement about vendor consolidation or technology investment.

  Write the enriched profile to the stakeholder's entry in
  `/accounts/<name>/stakeholders.md`. Mark the research-queue entry as resolved.

  Source every claim. If you can't verify a detail, mark it `unverified` rather than
  inferring from the job title.
cabinetPath: cabinet-examples/cabinets/account-room
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
