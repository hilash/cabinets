id: weekly-account-brief
name: Weekly Account Brief
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: summary-agent
agentSlug: summary-agent
timeout: 900
prompt: |-
  Regenerate the account brief for every active account in `/accounts/index.md`
  that is marked `tier: strategic` or `tier: growth` (skip `tier: maintenance` unless
  there is an open opportunity > $50k).

  For each qualifying account, read:
  - `/accounts/<name>/activity.md` — last 30 days of activity log
  - `/accounts/<name>/stakeholders.md` — current stakeholder map
  - `/accounts/<name>/opportunities.md` — open opportunities
  - `/accounts/<name>/company-intel.md` — latest company intelligence from Research Agent

  Produce the account brief at `/accounts/<name>/brief.md` with sections:
  1. Account Summary (ARR, tier, relationship health: green/yellow/red)
  2. Open Opportunities (stage, ARR, close date, risk flags)
  3. Stakeholder Map (name, role, sentiment, last touch)
  4. Recent Activity (3 most relevant events in last 30 days)
  5. Key Objections (top 2 that could affect the deal)
  6. Next Actions (3–5 concrete actions, owner, target date)

  Keep the brief under 600 words. Timestamp it. Do not publish if the next-actions
  list has entries older than 14 days that haven't been resolved — flag for the AE first.
cabinetPath: cabinet-examples/cabinets/account-room
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
