id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: research-agent
agentSlug: research-agent
timeout: 900
prompt: |-
  Produce this cabinet's weekly competitor cut for active deals.

  Pull competitor signals from the past 7 days that are relevant to open opportunities
  in this account room. Focus on: pricing moves, new features, positioning shifts,
  and win/loss mentions that affect accounts we're actively selling.

  For each material competitor signal:
  - What happened (sourced — link or reference)
  - Which accounts / opportunities it affects (cross-reference `/accounts/index.md`)
  - The implication for our positioning in that specific deal
  - The recommended response for the AE

  Cross-reference the company Competitive Intelligence cabinet at
  `../competitive-intelligence` for the full landscape and recent briefings.

  Write findings to `/competitor-watch/weekly-<date>.md`.
  Surface the top 3 signals in `/competitor-watch/latest.md` (overwrite each week).
  Lead every finding with "so what for us in this deal."
cabinetPath: cabinet-examples/cabinets/account-room
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
