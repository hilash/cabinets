id: daily-progress-check
name: Daily Onboarding Progress Check
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 600
prompt: |-
  Run the daily onboarding progress check for all active new hires.

  1. Read every plan at `hires/*/plan.md` where status is not "completed".
  2. For each active hire:
     a. Compare each task's expected due date (relative to start date) against today's
        date and the recorded status (not-started / in-progress / done / blocked).
     b. Identify any task that is overdue (due date passed, status not done).
     c. Identify any task in "blocked" status for >24h without a resolution note.
     d. Check whether the current onboarding phase gate is clear (all prior-phase
        tasks done before advancing).
  3. Write the consolidated progress report to `progress/daily.md` in this format:
     - Header: date, number of active hires, number with blockers
     - Per hire: name, current phase, % tasks complete, list of overdue/blocked items
       with owner and last-updated
     - Summary: any phase gate failures, any hire at risk of delayed start
  4. For any hire with a critical blocker (accounts not provisioned ≤48h before
     start date, or equipment not shipped), write a separate alert to
     `progress/alerts/<slug>-<date>.md` for the hiring manager.

  Keep the report factual and scannable. No fluff.
cabinetPath: cabinet-examples/cabinets/new-hire-onboarding
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
