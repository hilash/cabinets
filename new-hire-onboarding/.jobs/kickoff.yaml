id: kickoff
name: New Hire Onboarding Kickoff
enabled: false
schedule: 0 9 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 900
prompt: |-
  Kick off onboarding for a new hire. You will be given the new hire's details (name,
  role, department, start date, hiring manager, buddy) either inline or in a pending
  file at `hires/pending/`.

  Steps:
  1. Create the directory `hires/<first-last-slug>/` and copy the template from
     `templates/onboarding-plan.md` into `hires/<first-last-slug>/plan.md`.
     Populate: name, role, department, start date, hiring manager, buddy, HRIS ID,
     and the task list with due dates calculated from the start date.
  2. Create `hires/<first-last-slug>/equipment.md` from `templates/equipment.md`
     with the requested equipment (default: MacBook Pro 14" M4, external display,
     keyboard, mouse; adjust for role).
  3. Create `hires/<first-last-slug>/meetings.md` with the standard intro meeting set:
     - HR orientation (Day 1, 10:00)
     - Hiring manager 1:1 (Day 1, 14:00)
     - Team intro (Day 2, 10:00)
     - Buddy coffee (Day 3, 10:00)
     - 30-day check-in (Day 30, 11:00)
  4. Instruct the Workflow Coordinator to execute all Pre-boarding provisioning tasks
     listed in the plan and log actions to `hires/<first-last-slug>/actions.md`.
  5. Draft the welcome email to `hires/<first-last-slug>/comms/welcome-email.md`
     for hiring manager review. Warm, specific, not generic.
  6. Write a kickoff summary to `progress/kickoff-<slug>.md` confirming all items
     initiated and flagging any immediate blockers.
cabinetPath: cabinet-examples/cabinets/new-hire-onboarding
