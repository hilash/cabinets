name: Activation Rate
slug: activation-rate
domain: Growth
definition: >
  The percentage of new users who complete the core activation event within 7 days of
  signup. Activation is defined as: connecting at least one integration AND completing
  the first workflow. This is the primary onboarding health metric and the strongest
  leading indicator of 30-day retention.
formula: "COUNT(DISTINCT user_id WHERE activation_event_completed AND days_since_signup <= 7) / COUNT(DISTINCT user_id WHERE signup_date IN period)"
source_table: fct_activation_events
dbt_model: models/product/fct_activation_events.sql
owner: Priya Mehta (priya.mehta@example.com)
freshness_sla: daily
certified: true
certified_date: '2026-04-01'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Internal users (domain: @acmecorp-internal.com) are excluded from both
  numerator and denominator. Edge case 2: Trial users are INCLUDED — activation rate
  applies to all signups regardless of plan. Edge case 3: The activation event requires
  BOTH conditions (integration + workflow) — completing only one does not count.
  See also: activation-rate-growth (growth team variant that uses a 14-day window).
