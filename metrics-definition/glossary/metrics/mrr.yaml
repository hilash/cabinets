name: Monthly Recurring Revenue
slug: mrr
domain: Revenue
definition: >
  The normalized monthly value of all active recurring subscription contracts at a point
  in time. Annual contracts are divided by 12. MRR is the operational building block
  for ARR and the primary metric for tracking month-to-month revenue momentum.
formula: "SUM(mrr_amount) WHERE subscription_status = 'active' AND contract_type = 'recurring'"
source_table: fct_subscriptions
dbt_model: models/finance/fct_subscriptions.sql
owner: Ana Reyes (ana.reyes@example.com)
freshness_sla: daily
certified: true
certified_date: '2026-03-10'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Annual contracts contributing to MRR use `annual_value / 12` — the monthly
  normalized amount, not the actual cash received. Edge case 2: Multi-year contracts with
  step-up pricing use the current year's rate, not the total contract value / total months.
  Edge case 3: Freemium accounts with $0 MRR are excluded from the sum but tracked separately
  in `fct_accounts` for conversion funnel analysis.
