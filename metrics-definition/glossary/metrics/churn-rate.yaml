name: Churn Rate (MRR)
slug: churn-rate
domain: Retention
definition: >
  The percentage of MRR lost in a given period due to customer cancellations and
  downgrades (contraction), relative to MRR at the start of that period. Reported
  on a monthly basis. Does not include expansion — see NRR for a net view.
formula: "(churned_mrr + contraction_mrr) / mrr_at_period_start"
source_table: fct_subscriptions
dbt_model: models/finance/fct_churn_monthly.sql
owner: Ana Reyes (ana.reyes@example.com)
freshness_sla: daily
certified: true
certified_date: '2026-03-10'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Contraction (downgrade) is included in the numerator — this is gross
  revenue churn, not logo churn. Edge case 2: Involuntary churn (payment failure with
  dunning resolution within 30 days) is excluded from the numerator until day 30.
  Edge case 3: Customers on pause plans are NOT counted as churned until the pause
  period ends and they do not reactivate.
