name: Annual Recurring Revenue
slug: arr
domain: Revenue
definition: >
  The annualized value of all active subscription contracts at a point in time.
  Includes recurring charges only — excludes one-time fees, professional services,
  and usage-based overages. The primary top-line revenue health metric.
formula: "SUM(mrr_amount * 12) WHERE subscription_status = 'active' AND contract_type = 'recurring'"
source_table: fct_subscriptions
dbt_model: models/finance/fct_subscriptions.sql
owner: Ana Reyes (ana.reyes@example.com)
freshness_sla: daily
certified: true
certified_date: '2026-03-10'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Month-to-month contracts count at their current monthly rate × 12 — no
  discount applied for cancellability. Edge case 2: Multi-year contracts with a locked rate
  use the locked rate, not the current list price. Edge case 3: Contracts in non-USD
  currencies are converted at the exchange rate on the contract start date, not today
  (see `fct_subscriptions.fx_rate_at_start`).
