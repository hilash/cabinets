name: Daily Active Users
slug: dau
domain: Engagement
definition: >
  The count of unique users who perform at least one qualifying engagement event on a
  given calendar day. Qualifying events are defined as any action that creates, modifies,
  or reads data within the product (excludes passive page views and API-only interactions).
formula: "COUNT(DISTINCT user_id WHERE event_date = target_date AND event_type IN qualifying_events AND is_internal = false)"
source_table: fct_daily_active
dbt_model: models/product/fct_daily_active.sql
owner: Priya Mehta (priya.mehta@example.com)
freshness_sla: daily
certified: true
certified_date: '2026-04-15'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Internal users (flagged `is_internal = true` in `dim_users`) are
  excluded. Edge case 2: API-only users (bots, integrations) are excluded — they must
  have at least one browser session event to count. Edge case 3: A single user across
  multiple workspaces counts once per workspace per day — DAU is workspace-level, not
  account-level. Use `dau_account` for account-level aggregation.
