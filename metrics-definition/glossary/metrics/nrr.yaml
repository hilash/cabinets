name: Net Revenue Retention
slug: nrr
domain: Retention
definition: >
  The percentage of recurring revenue retained from an existing customer cohort over a
  12-month period, including expansion (upsells, seat growth) and net of contraction and
  churn. NRR >100% means the existing customer base is growing without new logo acquisition.
formula: "(MRR at end of period from customers active at start of period) / (MRR at start of period from same cohort)"
source_table: fct_subscriptions
dbt_model: models/finance/fct_nrr_cohort.sql
owner: Ana Reyes (ana.reyes@example.com)
freshness_sla: weekly
certified: true
certified_date: '2026-03-10'
certified_by: Definition QA
last_reviewed: '2026-05-19'
notes: >
  Edge case 1: Trial and freemium accounts are excluded from both numerator and denominator —
  only paying customers count. Edge case 2: Customers who churned and reacquired within the
  period are excluded from the cohort (treated as new logos). Edge case 3: The 12-month
  rolling window is used for reported NRR; monthly NRR snapshots in fct_nrr_cohort use a
  trailing 3-month annualized rate for recency.
