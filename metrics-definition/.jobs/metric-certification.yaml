id: metric-certification
name: Metric Certification (On-Demand)
enabled: false
schedule: ""
provider: claude-code
adapterType: claude_local
ownerAgent: research
agentSlug: research
timeout: 600
prompt: |-
  Certify a metric definition on request. Run when a stakeholder has proposed a new
  metric or when a previously uncertified metric is ready for review.

  INPUT: The metric slug to certify (passed as context). Load `glossary/metrics/<slug>.yaml`.

  STAGE 1 — RESEARCHER: Verify all required fields are present and complete:
  - name, slug, domain, definition (≥2 sentences), formula (explicit expression, not
    a description), source_table (warehouse table name), dbt_model (model path),
    owner (name + email), freshness_sla (e.g. "daily", "weekly"), notes (≥1 edge case).
  If any field is missing, populate it from context or flag it as BLOCKED.

  STAGE 2 — QA: Review the complete definition:
  1. Verify the formula is unambiguous and handles edge cases (partial periods, currency,
     trial/internal user exclusion).
  2. Search `glossary/metrics/` for naming or formula conflicts with existing certified metrics.
  3. Verify the source_table matches the dbt model documented in `glossary/dbt-models.yaml`.
  4. If any issues: return a specific issue list and do NOT certify.
  5. If clean (or approved-with-notes): set `certified: true`, `certified_date: <today>`,
     `certified_by: Definition QA` in the YAML.

  FINAL: Append a certification entry to `glossary/changelog.md`:
    - Date, metric slug, certifier, and one-line summary.
  Post a summary to the `#data` channel context.
cabinetPath: cabinets/metrics-definition
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
