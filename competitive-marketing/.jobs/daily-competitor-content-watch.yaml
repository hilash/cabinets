id: daily-competitor-content-watch
name: Daily Competitor Content & Ad Watch
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: competitive-researcher
agentSlug: competitive-researcher
timeout: 600
prompt: |-
  Run the daily competitor content and ad watch.
  Check every tracked competitor in `profiles/tracked.md`:

  1. CONTENT: Check competitor blogs and resource pages for new posts published in the past 24 hours.
     For each: log title, URL, topic, estimated SEO intent (informational/commercial/navigational), and
     whether it targets any of our tracked keywords (from `../seo-content/keywords/tracked.md` if accessible,
     otherwise from `competitor-watch/our-keywords.md`).

  2. ADS: Check Meta Ad Library and Google Ads Transparency for new ad creatives from tracked competitors.
     For each new ad: log format, channel, headline (if visible), creative angle, and estimated start date.

  3. SOCIAL: Check LinkedIn company pages for new posts in the past 24 hours.
     Flag any post that is a product announcement, pricing mention, or competitive claim vs us.

  4. LANDING PAGES: Check the top 3 competitor landing pages (from each profile) for any copy changes.
     If detected: log the before/after if possible, or describe the change.

  Log all findings to `signals/daily-<YYYY-MM-DD>.md` with:
  - Competitor name
  - Signal type (content / ad / social / landing-page)
  - Source URL
  - Material? (yes/no)
  - Description (1–2 sentences, specific)

  If any signal is Material: add an entry to the top of `signals/urgent.md` for the Analyst to review.
  If no material signals: write "No material signals detected" and stop.
cabinetPath: cabinet-examples/cabinets/competitive-marketing
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
