id: weekly-competitive-marketing-brief
name: Weekly Competitive Marketing Brief
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: competitive-researcher
agentSlug: competitive-researcher
timeout: 1200
prompt: |-
  Produce this week's competitive marketing brief.

  RESEARCHER STEP (runs first):
  1. Compile all material signals from `signals/` (last 7 days) into `signals/weekly-package-<YYYY-MM-DD>.md`.
     Group by competitor. Include: signal type, source, date, brief description, material/noise classification.
  2. For each Tier-1 competitor (Northwind, Helios): verify that `profiles/<competitor>.md` is current.
     If any section is >4 weeks stale, update it based on available signals or mark [unverified].

  ANALYST STEP (runs after Researcher):
  3. Read `signals/weekly-package-<YYYY-MM-DD>.md`.
  4. For each tracked competitor (Northwind first, Helios second, others if material):
     a. Messaging & positioning: what changed vs last week? What does it imply for our own messaging?
     b. Campaign/ad presence: any new campaigns, channels, formats, creative angles spotted?
     c. Content/SEO: any new pages targeting our keywords? Blog cadence change?
     d. Pricing page: any changes (offer, structure, social proof)?
  5. Estimate relative share of voice for the week (qualitative: rising/steady/falling per competitor).
  6. Write 3 implications for our campaigns — specific, actionable, with named owners.
  7. Write the brief to `briefs/weekly-<YYYY-MM-DD>.md`.
  8. Update `competitive-brief/index.html` with current week's findings.
  9. Cross-reference the competitive-intelligence cabinet for any pricing or product signals.

  Rules: no claim without a source link or signal reference. Lead with "so what for us" on every material move.
cabinetPath: cabinet-examples/cabinets/competitive-marketing
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
