id: weekly-action-chase
name: Weekly Action Chase
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: workflow-manager
agentSlug: workflow-manager
timeout: 600
prompt: |-
  Run the Friday action-item chase for the CEO operating cabinet.

  1. Read `actions/tracker.md` — the full action item list.
  2. Identify:
     a. Items with status "Overdue" (due date has passed, not Done)
     b. Items with no status update in the last 7 days
     c. Items marked "Blocked" — capture the blocker and who can unblock
  3. For each overdue or blocked item: calculate days overdue, confirm owner name (not team).
  4. Update the status column in `actions/tracker.md` with today's check.
  5. Write `actions/friday-chase-YYYY-MM-DD.md` with:
     - Summary line: X overdue, Y blocked, Z on track
     - Overdue items table: ID, description, owner, days overdue
     - Blocked items: ID, description, blocker, unblock path
     - Items completed this week: what was delivered and where it lives

  Rules:
  - Every overdue item must have a confirmed owner (a person, not a team).
  - Blocked items without an unblock path get escalated in the next leadership memo.
  - Do not mark items Done without a delivery artifact or confirmation.
  - Surface the chase report to the Chief of Staff for the Monday memo.
cabinetPath: cabinet-examples/cabinets/ceo-operating
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
