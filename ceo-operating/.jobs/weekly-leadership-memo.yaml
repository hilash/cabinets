id: weekly-leadership-memo
name: Weekly Leadership Memo
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: chief-of-staff
agentSlug: chief-of-staff
timeout: 900
prompt: |-
  Produce this week's CEO leadership memo. This is the primary weekly artifact — it goes to the
  full leadership team before the Monday meeting.

  Inputs to read first:
  - `kpis/weekly.md` — current KPI snapshot from the Operating Analyst
  - `risks/register.md` — risk register, focus on Critical and High
  - `actions/tracker.md` — action item statuses from the Workflow Manager
  - `decisions/log.md` — any decisions made since last Monday
  - `competitor-watch/latest.md` — this week's competitor cut

  The memo must contain these sections IN ORDER:
  1. HEADLINE — one sentence: the single most important thing for leadership to know this week.
  2. COMPANY PULSE — KPI summary: 4–6 metrics, delta vs last week, and a one-line read on trajectory.
  3. TOP PRIORITIES — status of the top-5 priorities: Green/Yellow/Red with one-line delta.
  4. DECISIONS MADE — any calls made since last memo (from decisions/log.md).
  5. OPEN RISKS — Critical and High risks only; for each: severity, owner, mitigation status.
  6. ACTIONS — overdue or blocked items, with owners and days overdue.
  7. COMPETITIVE PULSE — the 2–3 competitor signals from this week's cut.
  8. NEEDS YOUR CALL — specific decisions or unblocks the CEO must make this week.

  Write to `memos/YYYY-MM-DD-leadership-memo.md` (use today's date).
  Archive previous weekly memo to `memos/archive/` if it exists there.

  Rules:
  - Lead every section with the delta from last week, not the current state.
  - "Needs Your Call" must be specific: "Approve the Series B term sheet by Wed" not "Review options."
  - No section longer than 150 words. This is a memo, not a report.
cabinetPath: cabinet-examples/cabinets/ceo-operating
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
