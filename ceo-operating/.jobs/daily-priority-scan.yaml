id: daily-priority-scan
name: Daily Priority Scan
enabled: true
schedule: 0 8 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: chief-of-staff
agentSlug: chief-of-staff
timeout: 600
prompt: |-
  Run the daily priority scan for the CEO operating cabinet.

  1. Read `priorities.md` for the current top-5 company priorities.
  2. Read `actions/tracker.md` — identify any actions that are overdue or blocked.
  3. Read `risks/register.md` — identify any Critical or High risks with no mitigation update in the last 3 days.
  4. Produce a brief daily scan section at the TOP of `memos/daily-scan.md`:
     - Date, 3-line executive summary
     - Top-3 priorities: status (Green/Yellow/Red) and one-line delta vs yesterday
     - Open blockers: any overdue or blocked action items
     - Risk alerts: any Critical/High risks without a recent update
  5. Update the `dashboard/` data inline so the dashboard reflects today's priority statuses.

  Rules:
  - Lead with what changed, not what is stable.
  - Green = on track, Yellow = at risk, Red = blocked or late.
  - Do not invent status — if you can't determine it from the files, mark as Unknown.
cabinetPath: cabinet-examples/cabinets/ceo-operating
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
