id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: operating-analyst
agentSlug: operating-analyst
timeout: 900
prompt: |-
  Produce the CEO cabinet's weekly competitor cut. This is NOT the full competitive intelligence
  briefing (that lives in the competitive-intelligence cabinet) — it is the 3–5 competitor signals
  that directly affect a leadership decision this week.

  Pull signals relevant to: pricing moves, major product launches, funding rounds, key executive hires,
  significant positioning pivots, or anything that will show up in board questions or leadership
  planning this week.

  For each material signal:
  - What happened (1–2 sentences, sourced)
  - What it means for us at the leadership level (not for sales or product — for the CEO)
  - Any decision it informs or accelerates

  Write to `competitor-watch/latest.md`, overwriting the previous week.
  Append a dated entry to `competitor-watch/archive.md`.

  Cross-reference the `competitive-intelligence` cabinet for the full landscape view and sourced
  signal details. Do not duplicate analysis — link to it.

  Rules:
  - Maximum 5 signals. If nothing material happened, say so in one line.
  - Lead with "So what for leadership" — not just "X did Y."
  - Every signal must have a source (URL or reference to competitive-intelligence/signals/).
cabinetPath: cabinet-examples/cabinets/ceo-operating
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
