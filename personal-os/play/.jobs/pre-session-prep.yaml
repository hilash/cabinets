id: pre-session-prep
name: DnD Pre-Session Prep
enabled: true
schedule: 0 17 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: dnd-dm
agentSlug: dnd-dm
timeout: 600
prompt: |-
  Read play/dnd/campaign.md, the most recent session recap, and current NPC/world state.

  If a next session is scheduled in play/dnd/sessions/, produce session-NN-prep.md with:
    1. Last-time recap (3 bullets)
    2. Where they are now
    3. Likely path A (scene outline)
    4. Sideways path B (backup)
    5. NPC voices needed (voice cues)
    6. Stat blocks needed
    7. Loot options
    8. Ending options with natural pause points

  Age-appropriate stakes. Plan to ~90 minutes with pause points every ~30.
cabinetPath: cabinets/cabinets/personal-os/play
createdAt: '2026-04-23T00:00:00.000Z'
updatedAt: '2026-04-23T00:00:00.000Z'
