id: weekly-competitor-watch
name: Weekly Competitor Watch
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-manager
agentSlug: product-manager
timeout: 900
prompt: |-
  Produce the weekly competitor feature gap analysis for the feature request board.

  Scan `/requests/board.md` for the top 20 requests by RICE score. For each:
  - Check whether any tracked competitor (from the company Competitive Intelligence cabinet
    at /competitive-intelligence/) has already shipped this feature
  - If a competitor has shipped it: note it as a "table-stakes gap" — we're behind
  - If no competitor has shipped it: note it as a potential "differentiator" if we build first

  Also scan competitor recent releases (from /competitive-intelligence/signals/) for any
  features they shipped in the last 30 days that do NOT appear in our request board —
  these may represent latent demand we haven't captured yet.

  Write the competitor feature gap report to `/competitor-watch/feature-gaps-<YYYY-MM-DD>.md`:
  - Table-stakes gaps: features competitors have that we don't (ranked by prevalence)
  - Differentiation opportunities: top requests where we'd be first-to-market
  - Latent demand: competitor features not yet in our request log

  Flag any table-stakes gap where a competitor shipped >6 months ago as "overdue — renewal risk."
cabinetPath: cabinets/feature-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
