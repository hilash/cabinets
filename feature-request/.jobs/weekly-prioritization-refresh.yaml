id: weekly-prioritization-refresh
name: Weekly Prioritization Refresh
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: product-manager
agentSlug: product-manager
timeout: 900
prompt: |-
  Produce the weekly feature request prioritization refresh. Two-stage job:

  STAGE 1 — Ask the Feature Request Analyst to:
  - Ingest any new feature requests added to `/requests/log.md` since last Monday
  - Deduplicate against existing entries (merge, update signal counts)
  - Re-score all requests where signal count or ARR data changed since last week
  - Update `/requests/board.md` with the full ranked list
  - Write scores to `/scores/scores-<YYYY-WW>.yaml`
  - Flag any request with arr_at_risk >$200K as renewal-risk

  STAGE 2 — As Product Manager, review the Analyst's output:
  - Verify the top 10 scores make intuitive sense; document any overrides with reasoning
  - Move any request with score >80 + 2+ weeks in Validated status → "In Planning"
  - Archive requests with score <30 and no new signals in the last 6 weeks
  - Write the weekly report to `/reports/report-<YYYY-WW>.md`:
    · Top 3 requests moving to planning (with score, ARR, champion account)
    · 1 request deprioritized this week (with reason)
    · 1 watch item (new or spiking request to monitor)

  Rules:
  - Every score has explicit Reach, Impact, Confidence, Effort inputs (not just the final number)
  - No request without an arr_requesting estimate (use $0 if truly no CRM data)
  - The board is the source of truth; the report is the human summary of it
cabinetPath: cabinets/feature-request
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
