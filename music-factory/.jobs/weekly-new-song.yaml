id: weekly-new-song
name: Weekly New Song Proposal
enabled: true
schedule: 0 11 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: composer
agentSlug: composer
timeout: 300
prompt: |-
  Pick one song from the candidate list in your persona (or propose a fresh one) and draft a new entry for the Music Factory. Bias toward songs that are public domain, traditional, or short instantly-recognizable hooks.

  Append a "## This week's pitch" block to the TOP of `index.md` containing:
  - Song title and original composer
  - Copyright status (public domain / fair-use educational reproduction / skip)
  - Which template — script-only (like `bye-bye-bye/`) or full browser player (like `still-alive/`)
  - The first 4-8 bars sketched as `(note, octave, beats)` tuples so the work is half-done already

  Remove any prior pitch block so only this week's shows. Do not generate the full `.mid` or HTML automatically — that's a human approval gate. Wait for the user to say "ship it" before scaffolding the directory.
cabinetPath: cabinets/cabinets/music-factory
createdAt: '2026-04-26T05:31:55.719Z'
updatedAt: '2026-04-26T05:31:55.719Z'
