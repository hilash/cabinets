id: weekly-queue-review
name: Weekly Procurement Queue Review
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: routing-lead
agentSlug: routing-lead
timeout: 600
prompt: |-
  Produce the weekly procurement queue status report for the week just closed.

  Read all entries in `queue-state/requests.yaml`. Compute:

  1. STATUS SUMMARY — count by status: submitted, in-review, pending-approval,
     approved, rejected, on-hold, stalled (no update in >3 business days).

  2. STALLED REQUESTS — list every request with no status change in >3 business
     days: request ID, vendor, owner, days stalled, last action. These need a
     nudge today.

  3. SPEND SUMMARY — for all requests approved this week: total estimated annual
     spend, breakdown by category (software/hardware/services/consulting),
     breakdown by department/cost center.

  4. COMPLIANCE FLAGS — any requests currently blocked or conditionally approved:
     what is outstanding (DPA, cert, legal review), who owns the follow-up.

  5. PATTERNS — note any recurring themes: same vendor requested multiple times
     (candidate for standard vendor list), departments consistently missing
     required fields, cost-authority threshold being consistently triggered.

  6. RECOMMENDED ACTIONS — up to 5 concrete next steps for the ops team.

  Write the report to `reports/queue-review-<YYYY-MM-DD>.md`.
  Update `queue-state/requests.yaml` to mark stalled requests with a "stalled"
  flag and the date flagged.
cabinetPath: cabinets/procurement-intake
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
