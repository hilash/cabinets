id: weekly-portfolio-health
name: Weekly Portfolio Health Sweep
enabled: true
schedule: 30 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: portfolio-partner
agentSlug: portfolio-partner
timeout: 900
prompt: |-
  Run the weekly portfolio health sweep. This refreshes `data/portfolio.md` and drives
  the portfolio-dashboard. Runs Monday 08:30 so the read is ready before the Managing
  Partner sets the week's priorities.

  For every company in `data/portfolio.md`:
  1. Pull the latest numbers from the connected source (founder update, metrics doc, or KPI tool).
     If no fresh data exists, mark the record `stale (last update: DATE)` and flag "gone quiet"
     if it's been 60+ days. NEVER fabricate a metric.
  2. Recompute runway = cash on hand / net monthly burn. Show the months.
  3. Re-evaluate flags:
     - RED: runway < 6 months and not yet raising.
     - AMBER: runway 6-9 months with no raise started; OR off the committed milestone with no
       revised plan; OR no founder update in 60+ days.
     - Upside flag: crushing it / likely to raise soon (surface pro-rata + PR opportunity).
  4. Every flag carries a recommended next action. No flag without an action.

  Then update `data/portfolio.md`:
  - Move flagged companies to the top.
  - Refresh the roll-up table.
  - Update `portfolio-dashboard/index.html` so the dashboard reflects the new state.

  Surface to the Managing Partner: the red flags, the pro-rata watch list, and any company
  that has gone quiet. Keep it to what needs a decision.
cabinetPath: cabinet-examples/cabinets/venture-capital
createdAt: '2026-06-08T00:00:00.000Z'
updatedAt: '2026-06-08T00:00:00.000Z'
