id: weekly-deal-review
name: Weekly Deal Review
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: deal-scout
agentSlug: deal-scout
timeout: 900
prompt: |-
  Produce the weekly deal review. This is the memo the partners actually read to decide
  where to spend the week. Refreshes `data/pipeline.md` and the deal-pipeline board.

  Read `data/thesis.md` and `data/pipeline.md` first.

  For every live deal:
  1. Confirm its current stage and update it if it moved.
  2. Score (or rescore) it 1-100 against the thesis. Always show the breakdown
     (fit / team / market / traction / round) and name the single biggest risk.
  3. Mark any founder-reported metric you couldn't verify as "(unverified)".

  Then write the review with these sections:
  - NEW THIS WEEK — companies that entered the pipeline; score + one-line take each.
  - MOVED — deals that changed stage and why.
  - STUCK — deals sitting too long in a stage; what's blocking and a recommended unblock.
  - TOP 3 FOR A DECISION — the three deals that need a partner call this week, with a
    recommendation (advance / pass / keep watching) and the reason. Recommend; don't decide.
  - PASSES TO LOG — anything the MP passed on, with the reason, for thesis calibration.

  Update `data/pipeline.md` (stages, scores, roll-up table) and `deal-pipeline/index.html`
  so the board matches. Hand any IC-ready deal to the Research Analyst for a diligence brief.
cabinetPath: cabinet-examples/cabinets/venture-capital
createdAt: '2026-06-08T00:00:00.000Z'
updatedAt: '2026-06-08T00:00:00.000Z'
