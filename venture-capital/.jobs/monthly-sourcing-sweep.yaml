id: monthly-sourcing-sweep
name: Monthly Sourcing Sweep
enabled: true
schedule: 0 9 1 * *
provider: claude-code
adapterType: claude_local
ownerAgent: deal-scout
agentSlug: deal-scout
timeout: 900
prompt: |-
  Run the monthly outbound sourcing sweep. The goal: find companies that fit the thesis
  before they're raising, so the fund is early and warm rather than late and cold.

  Read `data/thesis.md` for the three verticals and what the fund looks for.

  Sweep the connected sources (Crunchbase/PitchBook, recent funding news, accelerator
  batches, the team's networks, and what's trending in the verticals). For each candidate:
  1. Confirm it's a genuine thesis fit — not tangential. Tangential candidates are noted
     but not added.
  2. Capture: what they do (one line), stage, last known raise, and why they fit which vertical.
  3. Give a provisional score with breakdown. Mark everything you couldn't verify as such.

  Add the strongest 5-10 to `data/pipeline.md` in the Sourced stage, newest first, and
  reflect them on `deal-pipeline/index.html`. Flag the single hottest one for the partners
  to chase this week.

  Do NOT pad the list to hit a number. A short list of real fits beats a long list of maybes.
  If a source isn't connected, log the gap rather than inventing companies.
cabinetPath: cabinet-examples/cabinets/venture-capital
createdAt: '2026-06-08T00:00:00.000Z'
updatedAt: '2026-06-08T00:00:00.000Z'
