id: quarterly-lp-update
name: Quarterly LP Update
enabled: true
schedule: 0 10 1 1,4,7,10 *
provider: claude-code
adapterType: claude_local
ownerAgent: managing-partner
agentSlug: managing-partner
timeout: 1200
prompt: |-
  Write this quarter's LP update. LPs forgive a down quarter; they never forgive being
  surprised. Honest, specific, numbers-first.

  Read:
  - `data/portfolio.md` — current portfolio health, flags, markups, and roll-up
  - `data/pipeline.md` — the quarter's deal activity, closes, and notable passes
  - `data/thesis.md` — any thesis evolution to explain
  - the previous file in `lp-updates/` — so you carry the narrative forward

  Write the update with these sections IN ORDER:
  1. OPENING — 2-3 sentences. The quarter in one honest line.
  2. FUND SNAPSHOT — capital deployed this quarter, reserves remaining, # active positions,
     new investments, follow-ons. A compact table. Source every number; if a number isn't
     available, say so — do not fabricate.
  3. PORTFOLIO HIGHLIGHTS — 2-3 companies that had a strong quarter (markups, growth, milestones).
  4. PORTFOLIO WATCH — the honest section. Companies that are struggling or flagged, and what
     the fund is doing about them. Skipping this destroys LP trust.
  5. DEAL ACTIVITY — what came through the pipeline, what closed, the thesis pattern in the passes.
  6. WHAT WE'RE SEEING — the partner's market point of view this quarter (the thesis at work).
  7. ASKS — specific intros or help the fund wants from LPs this quarter.
  8. CLOSING — signed as the Managing Partner.

  Write to `lp-updates/YYYY-QN-lp-update.md`. Keep it tight — LPs read the snapshot and the
  watch section first. Never report a number you can't source.
cabinetPath: cabinet-examples/cabinets/venture-capital
