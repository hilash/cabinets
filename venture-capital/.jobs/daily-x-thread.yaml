id: daily-x-thread
name: Daily X Thread
enabled: true
schedule: 0 8 * * *
provider: claude-code
adapterType: claude_local
ownerAgent: platform-lead
agentSlug: platform-lead
timeout: 600
prompt: |-
  Draft today's X thread on the fund's vertical. This is the fund's daily point of view —
  the thing that compounds proprietary deal flow because founders in the vertical read it.

  Read first:
  - `data/thesis.md` — the verticals the fund has a point of view on
  - `data/pipeline.md` — patterns you're seeing across current deal flow (the unfair advantage)
  - `research/` — any recent market findings from the Research Analyst
  - the last few files in `content/` — so you don't repeat a recent take

  Write a thread that passes the screenshot test: would a smart founder in this vertical
  send it to a co-founder? Rules:
  - One idea, well argued. Not a roundup.
  - Earn the first line — a specific claim or sharp question, never a windup.
  - Draw on what the fund is actually seeing in deal flow, but NEVER leak a specific
    company's confidential numbers or an unannounced round.
  - Be useful, not promotional. No "we're excited to announce." No hashtag soup.
  - Voice of the fund: direct, specific, a little opinionated.

  Output a post-ready draft to `content/YYYY-MM-DD-daily-thread.md` with:
  - A one-line topic + why it's timely
  - The thread itself, numbered (1/, 2/, ...), each post within X's length limit
  - A suggested first-line alternate (A/B option)
  - A note on any source/claim a partner should sanity-check before posting

  A partner reviews and posts. You draft only.
cabinetPath: cabinet-examples/cabinets/venture-capital
