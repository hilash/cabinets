id: unanswered-questions-digest
name: Unanswered Questions Digest
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: summary-agent
agentSlug: summary-agent
timeout: 600
prompt: |-
  Produce the weekly unanswered-questions digest for the Company Brain cabinet.

  1. Read `questions/unanswered.md` — all employee questions logged this week with no matching answer.
  2. Group by category: HR, IT, Finance, Product, Security, Other.
  3. For each question, check `knowledge/docs.yaml` and `knowledge/summaries/` for an existing answer.
     If a doc covers it, draft a one-paragraph answer from that doc and mark status: covered-by-doc.
     If no doc covers it, mark status: gap.
  4. Rank the top 10 unanswered questions by frequency (how many employees asked the same or similar question).
  5. Write the digest to `questions/digest-<YYYY-MM-DD>.md`:
     - Header: week, total questions, % covered, % gap
     - Top 10 unanswered (ranked): question | category | frequency | status | recommended source or gap
     - Category breakdown table
     - Recommended new FAQ entries: top 3 gaps that would answer the most questions
  6. For any question with status: gap that has 3+ employees asking, append to `faq/gap-queue.md`
     as a prioritised entry for the Knowledge Manager to action.

  Rules: Never fabricate answers — only pull from existing docs in `knowledge/`.
  If you can't find a source, status is gap — do not guess.
cabinetPath: cabinets/company-brain
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
