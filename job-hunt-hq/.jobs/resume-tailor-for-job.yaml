id: resume-tailor-for-job
name: Resume Tailor for Job
enabled: true
schedule: manual
provider: claude-code
adapterType: claude_local
ownerAgent: resume-tailor
agentSlug: resume-tailor
timeout: 600
prompt: |-
  Given a specific job posting (provided as input or from /job-board/saved-jobs.csv):
  1. Analyze the posting for key requirements, preferred skills, and cultural signals
  2. Pull the master resume from /profile/master-resume.md
  3. Pull relevant skills from /profile/skills-inventory.csv
  4. Generate a tailored resume that:
     - Reorders bullet points to lead with the most relevant experience
     - Mirrors the job posting language where it honestly applies
     - Highlights quantified achievements that match what they're looking for
     - Stays on one page
  5. Generate a short cover letter (3 paragraphs max) that:
     - Opens with why this specific company and role
     - Connects one or two concrete achievements to their biggest need
     - Closes with a clear, confident call to action
  6. List any gaps between the posting and the resume with suggested talking points
  Save the tailored resume as a new markdown page under /profile.
cabinetPath: cabinets/cabinets/job-hunt-hq
createdAt: '2026-04-12T00:00:00.000Z'
updatedAt: '2026-04-12T00:00:00.000Z'
