id: weekly-action-item-followup
name: Weekly Action Item Follow-Up
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: workflow-coordinator
agentSlug: workflow-coordinator
timeout: 600
prompt: |-
  Run the weekly action item follow-up check for all direct reports.

  1. Read all `reports/*/actions.md` files.
  2. For each action item:
     a. Check status: open / done / blocked.
     b. Compare due date to today's date.
     c. Classify: on-track (open, not yet due), overdue (open, past due),
        done (status = done), blocked (status = blocked with note).
  3. Write the consolidated weekly action status to `alerts/action-status-<date>.md`:
     - Header: date, total items across all reports, by status count
     - Per report section: report name, items due this week, overdue items,
       items completed since last check
     - Overdue items: title, owner, due date, days overdue
  4. For each overdue item, also write an overdue notice to the relevant report's
     `reports/<slug>/overdue-<date>.md`.
  5. If a report has ≥3 consecutive overdue action items (items that were overdue last
     week and are still overdue this week), flag them to `alerts/recurring-overdue.md`
     for the People Ops Lead — this is a pattern that needs a conversation, not a reminder.
  6. Write a one-line summary to `alerts/weekly-digest.md` (append):
     "Week of <date>: N overdue items across M reports. Top report by overdue: <name>."
cabinetPath: cabinets/manager-one-on-one
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
