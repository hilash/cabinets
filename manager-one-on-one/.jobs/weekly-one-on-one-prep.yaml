id: weekly-one-on-one-prep
name: Weekly 1:1 Prep
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: people-ops
agentSlug: people-ops
timeout: 600
prompt: |-
  Prepare the weekly 1:1 prep docs for all reports with a meeting this week.

  1. Read `calendar/one-on-ones.md` and identify all 1:1 meetings scheduled this week
     (Mon–Fri).
  2. For each report with a 1:1 this week:
     a. Read `reports/<report-slug>/actions.md` for open action items.
     b. Read the last 3 session notes from `reports/<report-slug>/notes/` (most recent
        first). Summarize each in 2 sentences.
     c. Read `reports/<report-slug>/goals.md` for the current goal set and status.
     d. Check `reports/<report-slug>/feedback.md` for any recent feedback notes not
        yet discussed in a session.
     e. Write the prep doc to `reports/<report-slug>/prep-<YYYY-MM-DD>.md`:
        - OPEN ITEMS: action items from last session, status, owner
        - AGENDA SUGGESTIONS: 3–4 items based on goals, patterns, open items
        - CONTEXT: last 3 sessions in 2 sentences each
        - BRING UP: any recurring theme from ≥3 sessions that hasn't been resolved
        - FEEDBACK TO DISCUSS: any recent feedback note flagged for discussion
  3. Write a summary of all prep docs generated to `prep/weekly-summary-<date>.md`.
cabinetPath: cabinets/manager-one-on-one
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
