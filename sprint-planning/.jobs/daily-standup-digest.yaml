id: daily-standup-digest
name: Daily Standup Digest
enabled: true
schedule: 0 9 * * 1-5
provider: claude-code
adapterType: claude_local
ownerAgent: workflow-agent
agentSlug: workflow-agent
timeout: 600
prompt: |-
  Produce today's standup digest for the engineering team.

  Pull the following signals for the period 23:00 yesterday → 09:00 today UTC:
  1. GitHub: all commits to main or feature branches, PR merges, new PR opens, PR review comments.
  2. Jira / Linear: any status transitions (→ In Progress, → In Review, → Done).
  3. Slack #standups: any written standup messages posted since yesterday's digest.

  For each engineer on the team roster (sprint-planning/sprint/team-roster.md):
  - What they shipped or progressed (commit/PR/issue moves).
  - What is currently in review (PRs awaiting review >1 day flagged).
  - Any blocker they mentioned in Slack or indicated by a ticket stuck in In Progress >2 days.

  Format the digest:
  - One section per engineer, 3–5 bullet points max.
  - A "Blockers" section listing any explicit blockers with the blocking reason.
  - A "PR queue" section: PRs with no review for >2 days, listed with age and author.
  - A "Shipped yesterday" section: the day's merged PRs and closed tickets.

  Write the digest to: sprint-planning/standup/latest.md
  Also write a dated copy to: sprint-planning/standup/<YYYY-MM-DD>.md

  Keep the digest under 400 words. This replaces the standup meeting, not supplements it.
cabinetPath: cabinet-examples/cabinets/sprint-planning
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
