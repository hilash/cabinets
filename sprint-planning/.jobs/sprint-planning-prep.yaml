id: sprint-planning-prep
name: Sprint Planning Prep
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: engineering-lead
agentSlug: engineering-lead
timeout: 900
prompt: |-
  Run the full sprint planning preparation cycle for the upcoming sprint.

  STEP 1 — Ask the Workflow Agent to produce fresh snapshots:
  - Backlog snapshot → sprint-planning/sprint/backlog-snapshot.md
  - Velocity history (last 6 sprints) → sprint-planning/sprint/velocity-history.md
  - PR queue → sprint-planning/sprint/pr-queue.md
  - Carryover candidates from the closing sprint → sprint-planning/sprint/carryover.md

  STEP 2 — Compute capacity:
  Read the team roster from sprint-planning/sprint/team-roster.md. Subtract PTO and on-call
  overhead noted there. Compute available points using the 3-sprint rolling average velocity
  from velocity-history.md. Write capacity summary to sprint-planning/sprint/capacity.md.

  STEP 3 — Draft the sprint plan:
  - Select backlog candidates: dependencies first, then business value, then technical risk.
  - Write one crisp sprint goal (one line, outcome-focused, not a ticket list).
  - List committed tickets: title, points, assignee, priority, dependencies.
  - List explicit carryover decisions with reason for each carried-over ticket.
  - List known blockers.
  - Compute committed-vs-capacity gap. If overcommitted by >10%, cut the lowest-priority item.
  - Write burndown projection (linear interpolation of points per day).

  STEP 4 — Write outputs:
  - Full plan → sprint-planning/sprint/current-plan.md
  - Render the sprint board → sprint-planning/board/index.html

  Rules:
  - Never commit more than 95% of available capacity.
  - Every committed ticket must have an assignee and a point estimate.
  - Any ticket with no acceptance criteria gets flagged [NEEDS AC] and excluded from commitment.
  - The sprint goal must be a business or customer outcome, not a list of features.
cabinetPath: cabinet-examples/cabinets/sprint-planning
