id: weekly-market-update
name: Weekly Market Update
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: broker
agentSlug: broker
timeout: 600
prompt: |-
  Review local market data including recent sales, new listings, and price trends.
  Compare active listings against current market conditions.
  Write a weekly market update with:
  - Market trend summary
  - Listings that may need price adjustments
  - New comparable sales worth noting
  - Competitive landscape changes
  Save the update to /market-data.
