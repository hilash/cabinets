id: weekly-confidence-sweep
name: Weekly Confidence & Blocker Sweep
enabled: true
schedule: 0 16 * * 5
provider: claude-code
adapterType: claude_local
ownerAgent: okr-workflow
agentSlug: okr-workflow
timeout: 600
prompt: |-
  Run the Friday confidence and blocker sweep so Monday's OKR narrative has clean data.

  Step 1 — Data collection: For every key result in `data/okrs.yaml`:
  - Pull current metric values from connected systems (Jira epic progress, Salesforce ARR,
    Sheets KPIs) and update `currentValue` with source tag (jira / salesforce / sheets / estimate).
  - For any KR where data cannot be pulled automatically, log the KR ID and owner in
    `data/stale-owners.md` and note that a Slack nudge was sent.

  Step 2 — YAML hygiene: Validate `data/okrs.yaml` — no missing owners, no string values
  where numbers are expected, no duplicate IDs. Write the cleaned file.

  Step 3 — Blocker sweep: For every KR with confidence ≤ 2, check `data/blockers.md`.
  If no blocker entry exists, create one. Classify: resource / dependency / clarity / external.
  If an entry exists, update the status (open / in-progress / resolved).

  Step 4 — Stale alert: Any owner who has missed 2+ consecutive Friday sweeps without a
  data update gets added to the escalation list at the bottom of `data/blockers.md`.

  Write a one-paragraph sweep summary appended to `data/sweep-log.md` with the date,
  count of KRs updated, count of stale owners, and count of new blockers.
cabinetPath: cabinet-examples/cabinets/okr-command
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
