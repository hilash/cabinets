id: weekly-okr-checkin
name: Weekly OKR Check-in Narrative
enabled: true
schedule: 0 8 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: okr-analyst
agentSlug: okr-analyst
timeout: 900
prompt: |-
  Produce this week's OKR narrative. This is a Monday morning job — the narrative must be
  ready before the leadership standup.

  Step 1 — OKR Analyst: Read `data/okrs.yaml`. For every key result, compute the confidence
  score (1–5, map to RAG: 4–5=Green, 3=Amber, 1–2=Red) based on current progress, trend,
  and remaining time in quarter. Write the updated confidence scores and rationale back to
  `data/okrs.yaml`. Flag any KR that has been Red 2+ consecutive weeks in `data/blockers.md`.

  Step 2 — OKR Narrator: Read the scored `data/okrs.yaml` and write the weekly narrative to
  `data/weekly-narrative.md`. Required sections:
  1. HEADLINE — one sentence: how many KRs on-track / at-risk / red, decisions needed.
  2. GREEN — KRs on track worth surfacing (wins, momentum).
  3. AT RISK (AMBER) — each at-risk KR: what's the specific risk, who owns it, what's the fix.
  4. RED — each red KR: what's blocking it, recommended intervention (reset target / unblock dep / accept miss).
  5. DECISIONS NEEDED — explicit asks with a decision-by date.

  Then archive a copy to `data/archive/narrative-YYYY-WW.md`.

  Rules:
  - Every KR in the narrative references its OKR ID (e.g. OBJ-1 / KR-1.2).
  - Numbers over adjectives. Active voice, <400 words.
  - If a decision is needed, state it precisely: who decides, what they decide, by when.
cabinetPath: cabinet-examples/cabinets/okr-command
createdAt: '2026-05-23T00:00:00.000Z'
updatedAt: '2026-05-23T00:00:00.000Z'
